<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزل Chems الرقمي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #050000 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* أنيميشن خلفية النيون الأحمر */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.08) 0%, transparent 60%);
            animation: pulse 6s infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .casino-container {
            background: rgba(10, 2, 2, 0.85);
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4), inset 0 0 15px rgba(255, 0, 0, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .casino-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
        }

        .casino-icon {
            font-size: 3.5rem;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 15px;
            animation: spin 4s infinite linear;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .highlight {
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        p {
            color: #b3b3b3;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 50%;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        }

        .btn-yes:hover {
            background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
            transform: scale(1.05);
        }

        .btn-no {
            background: #111;
            color: #ff3333;
            border: 2px solid #ff3333;
        }

        .btn-no:hover {
            background: #ff3333;
            color: black;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .decorations {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.2;
            z-index: 0;
        }
        .d1 { top: 10%; left: 10%; transform: rotate(15deg); color: #ff0000; }
        .d2 { bottom: 15%; right: 10%; transform: rotate(-20deg); }
        .d3 { top: 20%; right: 12%; transform: rotate(45deg); color: #ff0000; }
        .d4 { bottom: 10%; left: 15%; transform: rotate(-10deg); }
    </style>
</head>
<body>

    <!-- ديكورات كازينو خفيفة في الخلفية -->
    <div class="decorations d1">♠</div>
    <div class="decorations d2">♦</div>
    <div class="decorations d3">♣</div>
    <div class="decorations d4">♥</div>

    <div class="casino-container">
        <div class="casino-icon">🎰</div>
        <h1>مرحباً بك في كازينو <span class="highlight">Chems</span></h1>
        <p>المكان غامض، الأجواء VIP، والأحمر والأسود هما ملوك السهرة. هل أنت مستعد للمجازفة والدخول؟</p>
        
        <div class="btn-group">
            <button class="btn btn-yes" onclick="alert('أهلاً بك في جناح الـ VIP الخاص بـ شمس! 🎰🔥')">نعم</button>
            <button class="btn btn-no" onclick="alert('المكان للقلوب القوية فقط.. نراك لاحقاً! 🃏')">لا</button>
        </div>
    </div>

</body>
</html>
