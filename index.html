<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFIA ♦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#060606;
    --charcoal:#141414;
    --gold:#d4af37;
    --gold-light:#f4e4a6;
    --blood:#8a0f1c;
    --blood-bright:#c81e34;
    --silver:#cfd3d8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:var(--black);
    overflow:hidden;
    font-family:'Playfair Display',serif;
    color:#eee;
  }

  #stars{ position:fixed; inset:0; z-index:0; pointer-events:none; }

  /* ---------- GATE ---------- */
  #gate{
    position:fixed;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse at center, rgba(138,15,28,0.25) 0%, var(--black) 70%);
    transition:opacity 1.1s ease, visibility 1.1s ease;
  }
  #gate.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .gate-box{
    text-align:center;
    padding:55px 50px;
    border-radius:6px;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid rgba(212,175,55,0.4);
    box-shadow:0 0 60px rgba(212,175,55,0.15), inset 0 0 40px rgba(138,15,28,0.15);
    backdrop-filter:blur(6px);
    animation:floatBox 5s ease-in-out infinite;
    max-width:90vw;
    position:relative;
  }
  .gate-box::before, .gate-box::after{
    content:"";
    position:absolute; width:26px; height:26px;
    border:2px solid var(--gold);
  }
  .gate-box::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .gate-box::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  @keyframes floatBox{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-8px);}
  }
  .gate-icon{
    font-size:34px;
    margin-bottom:14px;
    color:var(--gold);
    letter-spacing:14px;
    text-shadow:0 0 18px rgba(212,175,55,0.8);
  }
  .gate-title{
    font-family:'Cinzel', serif;
    font-weight:900;
    font-size:38px;
    letter-spacing:6px;
    background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin-bottom:8px;
  }
  .gate-sub{
    font-size:15px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#a8a8a8;
    margin-bottom:30px;
    font-weight:400;
    font-family:'Playfair Display', serif;
  }
  #gate-input{
    width:260px;
    max-width:70vw;
    text-align:center;
    padding:14px 18px;
    border-radius:4px;
    border:1px solid rgba(212,175,55,0.5);
    background:rgba(255,255,255,0.04);
    color:#fff;
    font-size:20px;
    letter-spacing:5px;
    outline:none;
    font-family:'Cinzel',serif;
    transition:.3s;
  }
  #gate-input:focus{
    border-color:var(--blood-bright);
    box-shadow:0 0 18px rgba(200,30,52,0.5);
  }
  #gate-btn{
    display:block;
    margin:24px auto 0;
    padding:13px 46px;
    border:1px solid var(--gold);
    border-radius:2px;
    background:linear-gradient(90deg,var(--blood),var(--blood-bright));
    color:#fff;
    font-weight:700;
    font-size:15px;
    letter-spacing:4px;
    text-transform:uppercase;
    cursor:pointer;
    font-family:'Cinzel',serif;
    transition:.3s;
    box-shadow:0 6px 20px rgba(200,30,52,0.35);
  }
  #gate-btn:hover{ transform:translateY(-2px); box-shadow:0 10px 26px rgba(212,175,55,0.4); border-color:var(--gold-light); }
  #gate-err{
    margin-top:14px;
    height:18px;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--blood-bright);
  }

  /* ---------- MAIN SCENE ---------- */
  #scene{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:1;
    perspective:1400px;
  }

  .aura{
    position:absolute;
    width:640px;height:640px;
    background:radial-gradient(circle, rgba(212,175,55,0.18) 0%, rgba(138,15,28,0.12) 40%, transparent 70%);
    filter:blur(10px);
    animation:auraPulse 6s ease-in-out infinite;
    z-index:0;
  }
  @keyframes auraPulse{
    0%,100%{ transform:scale(1); opacity:0.8; }
    50%{ transform:scale(1.2); opacity:1; }
  }

  /* 3D rotating diamond / gem */
  #gem-stage{
    width:180px;height:220px;
    position:relative;
    transform-style:preserve-3d;
    animation:rotateGem 9s linear infinite;
    z-index:2;
    margin-bottom:6px;
  }
  @keyframes rotateGem{
    from{ transform:rotateY(0deg) rotateX(10deg); }
    to{ transform:rotateY(360deg) rotateX(10deg); }
  }
  .facet{
    position:absolute;
    left:50%; top:50%;
    width:120px; height:120px;
    margin:-60px 0 0 -60px;
    background:linear-gradient(135deg, rgba(244,228,166,0.9), rgba(212,175,55,0.35) 45%, rgba(138,15,28,0.35));
    border:1px solid rgba(244,228,166,0.6);
    box-shadow:0 0 35px rgba(212,175,55,0.55);
  }
  .facet:nth-child(1){ transform:rotateY(0deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
  .facet:nth-child(2){ transform:rotateY(72deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
  .facet:nth-child(3){ transform:rotateY(144deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
  .facet:nth-child(4){ transform:rotateY(216deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
  .facet:nth-child(5){ transform:rotateY(288deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); }
  .facet:nth-child(6){ transform:rotateX(90deg) translateZ(70px); clip-path:polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%); background:linear-gradient(135deg, rgba(244,228,166,0.6), rgba(212,175,55,0.2)); }

  /* orbiting sparks */
  #orbit{
    position:absolute;
    width:360px;height:360px;
    transform-style:preserve-3d;
    animation:rotateOrbit 13s linear infinite;
    z-index:3;
  }
  @keyframes rotateOrbit{
    from{ transform:rotateY(0deg) rotateX(68deg); }
    to{ transform:rotateY(-360deg) rotateX(68deg); }
  }
  .spark{
    position:absolute;
    width:7px;height:7px;
    border-radius:50%;
    background:var(--gold-light);
    box-shadow:0 0 12px var(--gold), 0 0 22px var(--blood-bright);
    top:50%;left:50%;
    margin:-3.5px;
  }

  /* SOFIA title */
  .name-wrap{
    z-index:4;
    text-align:center;
    margin-top:14px;
    transform-style:preserve-3d;
  }
  #sofia-name{
    font-family:'Cinzel', serif;
    font-weight:900;
    font-size:min(17vw, 130px);
    line-height:1;
    letter-spacing:8px;
    background:linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 25%, #fff 45%, var(--gold-light) 65%, var(--gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:drop-shadow(0 0 28px rgba(212,175,55,0.55));
    animation:nameFloat 4s ease-in-out infinite, shine 5s linear infinite;
    background-size:220% auto;
  }
  @keyframes nameFloat{
    0%,100%{ transform:translateY(0) rotateX(0deg); }
    50%{ transform:translateY(-8px) rotateX(4deg); }
  }
  @keyframes shine{
    0%{ background-position:0% center; }
    100%{ background-position:220% center; }
  }
  .subtitle{
    font-family:'Bebas Neue', serif;
    font-weight:400;
    font-size:clamp(14px,2.2vw,20px);
    letter-spacing:8px;
    text-transform:uppercase;
    color:var(--blood-bright);
    margin-top:10px;
    text-shadow:0 0 14px rgba(200,30,52,0.6);
  }

  .msg{
    z-index:4;
    max-width:640px;
    margin-top:36px;
    padding:0 24px;
    text-align:center;
    font-size:clamp(16px,2vw,20px);
    font-weight:400;
    line-height:1.9;
    color:#e8e2d5;
    opacity:0;
    animation:fadeIn 2s ease forwards 1.2s;
  }
  @keyframes fadeIn{ to{ opacity:1; } }
  .msg span{
    color:var(--gold-light);
    font-weight:700;
    font-style:italic;
  }

  .footer-note{
    position:absolute;
    bottom:22px;
    font-family:'Bebas Neue', serif;
    font-size:13px;
    letter-spacing:6px;
    color:rgba(212,175,55,0.45);
    z-index:4;
  }

  /* rising embers/diamonds */
  .float-ember{
    position:fixed;
    bottom:-40px;
    font-size:20px;
    color:var(--gold);
    opacity:0.8;
    pointer-events:none;
    z-index:2;
    text-shadow:0 0 10px rgba(212,175,55,0.8);
    animation-name:rise;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.9; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ===== GATE ===== -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-icon">♦ ♦ ♦</div>
    <div class="gate-title">RESTRICTED</div>
    <div class="gate-sub">Enter the code to unlock this page</div>
    <input id="gate-input" type="password" placeholder="• • • • •" autocomplete="off" />
    <button id="gate-btn">Unlock</button>
    <div id="gate-err"></div>
  </div>
</div>

<!-- ===== MAIN SCENE ===== -->
<div id="scene">
  <div class="aura"></div>

  <div id="gem-stage">
    <div class="facet"></div>
    <div class="facet"></div>
    <div class="facet"></div>
    <div class="facet"></div>
    <div class="facet"></div>
    <div class="facet"></div>
  </div>

  <div id="orbit"></div>

  <div class="name-wrap">
    <div id="sofia-name">SOFIA</div>
    <div class="subtitle">✦ Untouchable ✦</div>
  </div>

  <div class="msg">
    Real ones don't shout, they shine. This whole page bends around one name —<br>
    every gem, every light, every line built for <span>Sofia</span>.<br>
    No cap, no filter — you're just built different. 💎
  </div>

  <div class="footer-note">BUILT FOR SOFIA ONLY</div>
</div>

<script>
  /* ---------- Gate logic ---------- */
  const gate = document.getElementById('gate');
  const input = document.getElementById('gate-input');
  const btn = document.getElementById('gate-btn');
  const err = document.getElementById('gate-err');
  const CODE = 'sofia';

  function tryEnter(){
    if(input.value.trim().toLowerCase() === CODE){
      gate.classList.add('hidden');
      launchEmbers();
    } else {
      err.textContent = 'WRONG CODE — TRY AGAIN';
      input.style.borderColor = '#c81e34';
      setTimeout(()=>{ input.style.borderColor=''; }, 900);
    }
  }
  btn.addEventListener('click', tryEnter);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });

  /* ---------- Orbit sparkles ---------- */
  const orbit = document.getElementById('orbit');
  const N = 20;
  for(let i=0;i<N;i++){
    const s = document.createElement('div');
    s.className='spark';
    const angle = (i/N)*360;
    const radius = 170;
    s.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
    s.style.animationDelay = (i*0.1)+'s';
    orbit.appendChild(s);
  }

  /* ---------- Starfield canvas ---------- */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W,H,stars=[];
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();
  for(let i=0;i<170;i++){
    stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+0.3,
      s:Math.random()*0.5+0.15,
      tw:Math.random()*Math.PI*2
    });
  }
  function drawStars(){
    ctx.clearRect(0,0,W,H);
    for(const st of stars){
      st.tw += 0.02;
      const alpha = 0.4+Math.sin(st.tw)*0.4;
      ctx.beginPath();
      ctx.fillStyle = `rgba(244,228,166,${alpha})`;
      ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
      ctx.fill();
      st.y -= st.s;
      if(st.y < -5){ st.y = H+5; st.x = Math.random()*W; }
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();

  /* ---------- Rising embers/diamonds ---------- */
  function launchEmbers(){
    setInterval(()=>{
      const h = document.createElement('div');
      h.className='float-ember';
      h.textContent = Math.random() > 0.5 ? '♦' : '✦';
      h.style.left = Math.random()*100+'vw';
      h.style.setProperty('--drift', (Math.random()*160-80)+'px');
      h.style.fontSize = (14+Math.random()*20)+'px';
      h.style.color = Math.random() > 0.5 ? '#d4af37' : '#c81e34';
      h.style.textShadow = '0 0 10px currentColor';
      const dur = 6+Math.random()*6;
      h.style.animationDuration = dur+'s';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(), dur*1000+500);
    }, 450);
  }

  input.focus();
</script>
</body>
</html>
