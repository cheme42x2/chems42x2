<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chems1off</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', sans-serif;
  background: #080808;
  color: #f0ede8;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Animated background ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
}

.bg-canvas canvas {
  width: 100%; height: 100%;
}

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(120,80,200,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, rgba(200,80,120,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 70%, rgba(80,120,200,0.1) 0%, transparent 45%);
  animation: bgShift 8s ease-in-out infinite alternate;
}

@keyframes bgShift {
  from { opacity: 0.7; }
  to   { opacity: 1; }
}

/* ── Page ── */
.page {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px;
  padding: 60px 28px 80px;
  display: flex; flex-direction: column;
  align-items: center;
}

/* ── Avatar ── */
.avatar-section {
  position: relative;
  margin-bottom: 32px;
  display: flex; align-items: center; justify-content: center;
}

.avatar-glow {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(150,100,255,0.4), transparent 70%);
  animation: glowPulse 3s ease-in-out infinite;
  filter: blur(20px);
}

@keyframes glowPulse {
  0%, 100% { transform: scale(0.9); opacity: 0.6; }
  50%       { transform: scale(1.1); opacity: 1; }
}

.avatar-rings {
  position: relative; width: 140px; height: 140px;
}

.ring {
  position: absolute; border-radius: 50%;
  border: 1.5px solid transparent;
}

.ring-1 {
  inset: -16px;
  border-color: rgba(150,100,255,0.4);
  animation: rotate 8s linear infinite;
}

.ring-2 {
  inset: -28px;
  border-top-color: rgba(200,80,120,0.3);
  border-right-color: rgba(200,80,120,0.3);
  animation: rotate 12s linear infinite reverse;
}

.ring-3 {
  inset: -40px;
  border-bottom-color: rgba(80,160,255,0.2);
  border-left-color: rgba(80,160,255,0.2);
  animation: rotate 16s linear infinite;
}

@keyframes rotate { to { transform: rotate(360deg); } }

.avatar-img {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a1020, #0d0818);
  border: 2px solid rgba(150,100,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  position: relative; z-index: 2;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 20px 60px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.avatar-img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(150,100,255,0.2), transparent 50%);
  border-radius: 50%;
}

/* ── Name block ── */
.name-block {
  text-align: center;
  margin-bottom: 40px;
  animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.username {
  font-family: 'Playfair Display', serif;
  font-size: 40px; font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
  background: linear-gradient(135deg, #ffffff 0%, #c8a8ff 50%, #ffffff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
  position: relative;
}

.username::after {
  content: attr(data-text);
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(200,168,255,0.15));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: blur(8px);
}

.bio-line {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(200,168,255,0.6);
}

.bio-line::before, .bio-line::after {
  content: '';
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,168,255,0.4));
}
.bio-line::after {
  background: linear-gradient(90deg, rgba(200,168,255,0.4), transparent);
}

/* ── Links ── */
.links {
  width: 100%;
  display: flex; flex-direction: column;
  gap: 12px;
  margin-bottom: 48px;
}

.link-card {
  position: relative;
  display: flex; align-items: center; gap: 16px;
  padding: 0;
  border-radius: 16px;
  text-decoration: none;
  overflow: hidden;
  animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.link-card:nth-child(1) { animation-delay: 0.15s; }
.link-card:nth-child(2) { animation-delay: 0.25s; }
.link-card:nth-child(3) { animation-delay: 0.35s; }

.link-card:hover { transform: scale(1.03) translateY(-2px); }
.link-card:active { transform: scale(0.98); }

.link-inner {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  width: 100%;
  position: relative; z-index: 1;
}

/* Instagram */
.card-ig .link-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a0e1a, #120810);
  border: 1px solid rgba(225,48,108,0.2);
  border-radius: 16px;
  transition: border-color 0.3s;
}
.card-ig:hover .link-bg { border-color: rgba(225,48,108,0.5); }
.card-ig .link-glow {
  position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(240,148,51,0.1), rgba(230,104,60,0.08), rgba(220,39,67,0.1));
  opacity: 0; transition: opacity 0.3s;
}
.card-ig:hover .link-glow { opacity: 1; }

/* TikTok */
.card-tt .link-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #080c14, #060a10);
  border: 1px solid rgba(0,242,234,0.15);
  border-radius: 16px;
  transition: border-color 0.3s;
}
.card-tt:hover .link-bg { border-color: rgba(0,242,234,0.4); }
.card-tt .link-glow {
  position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(0,242,234,0.08), rgba(255,0,80,0.06));
  opacity: 0; transition: opacity 0.3s;
}
.card-tt:hover .link-glow { opacity: 1; }

/* Telegram */
.card-tg .link-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #080e18, #060c14);
  border: 1px solid rgba(41,182,246,0.15);
  border-radius: 16px;
  transition: border-color 0.3s;
}
.card-tg:hover .link-bg { border-color: rgba(41,182,246,0.4); }
.card-tg .link-glow {
  position: absolute; inset: 0; border-radius: 16px;
  background: linear-gradient(135deg, rgba(41,182,246,0.08), rgba(0,136,204,0.06));
  opacity: 0; transition: opacity 0.3s;
}
.card-tg:hover .link-glow { opacity: 1; }

/* Icon */
.link-icon {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  position: relative;
}

.card-ig .link-icon {
  background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  box-shadow: 0 4px 16px rgba(220,39,67,0.4);
}
.card-tt .link-icon {
  background: #010101;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
.card-tg .link-icon {
  background: linear-gradient(135deg, #2AABEE, #229ED9);
  box-shadow: 0 4px 16px rgba(34,158,217,0.4);
}

/* Text */
.link-text { flex: 1; }
.link-name {
  font-size: 15px; font-weight: 700;
  color: #f0ede8; letter-spacing: 0.3px;
  margin-bottom: 3px;
}
.link-handle {
  font-size: 12px; color: rgba(255,255,255,0.35);
  font-weight: 400;
}

/* Arrow */
.link-arrow {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: rgba(255,255,255,0.3);
  transition: background 0.3s, color 0.3s, transform 0.3s;
  flex-shrink: 0;
}
.link-card:hover .link-arrow {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
  transform: translateX(-3px);
}

/* ── Stats row ── */
.stats {
  display: flex; gap: 32px;
  margin-bottom: 48px;
  animation: slideUp 0.8s ease 0.4s both;
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #fff, #c8a8ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-label {
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 2px;
}

.stat-divider {
  width: 1px;
  background: rgba(255,255,255,0.08);
  align-self: stretch;
}

/* ── Footer ── */
.footer {
  text-align: center;
  animation: slideUp 0.8s ease 0.5s both;
}

.footer-logo {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* ── Particles canvas ── */
#particles {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-overlay"></div>

<div class="page">

  <!-- Avatar -->
  <div class="avatar-section">
    <div class="avatar-glow"></div>
    <div class="avatar-rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="avatar-img">🎬</div>
    </div>
  </div>

  <!-- Name -->
  <div class="name-block">
    <div class="username" data-text="chems1off">chems1off</div>
    <div class="bio-line">content creator</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num">3</div>
      <div class="stat-label">منصات</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">محتوى</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">1</div>
      <div class="stat-label">هوية</div>
    </div>
  </div>

  <!-- Links -->
  <div class="links">

    <a href="https://www.instagram.com/chems1off" target="_blank" rel="noopener" class="link-card card-ig">
      <div class="link-bg"></div>
      <div class="link-glow"></div>
      <div class="link-inner">
        <div class="link-icon">📸</div>
        <div class="link-text">
          <div class="link-name">Instagram</div>
          <div class="link-handle">@chems1off</div>
        </div>
        <div class="link-arrow">←</div>
      </div>
    </a>

    <a href="https://www.tiktok.com/@chems1off" target="_blank" rel="noopener" class="link-card card-tt">
      <div class="link-bg"></div>
      <div class="link-glow"></div>
      <div class="link-inner">
        <div class="link-icon">🎵</div>
        <div class="link-text">
          <div class="link-name">TikTok</div>
          <div class="link-handle">@chems1off</div>
        </div>
        <div class="link-arrow">←</div>
      </div>
    </a>

    <a href="https://t.me/chems1off" target="_blank" rel="noopener" class="link-card card-tg">
      <div class="link-bg"></div>
      <div class="link-glow"></div>
      <div class="link-inner">
        <div class="link-icon">✈️</div>
        <div class="link-text">
          <div class="link-name">Telegram</div>
          <div class="link-handle">@chems1off</div>
        </div>
        <div class="link-arrow">←</div>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-logo">chems1off · 2026</div>
  </div>

</div>

<script>
// ── Particle system ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function Particle() {
  this.reset = function() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.5 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -Math.random() * 0.5 - 0.1;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.life = 0;
    this.maxLife = Math.random() * 200 + 100;
    const colors = [
      [150, 100, 255],
      [200,  80, 150],
      [ 80, 160, 255],
      [255, 200, 100],
    ];
    this.color = colors[Math.floor(Math.random() * colors.length)];
  };
  this.reset();
  this.y = Math.random() * H; // distribute initially
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function draw() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life++;
    const t = p.life / p.maxLife;
    const a = t < 0.2 ? t / 0.2 : t > 0.8 ? (1 - t) / 0.2 : 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.alpha * a})`;
    ctx.fill();
    if (p.life >= p.maxLife || p.y < -10) p.reset();
  });
  requestAnimationFrame(draw);
}
draw();

// ── Ripple on tap ──
document.querySelectorAll('.link-card').forEach(card => {
  card.addEventListener('pointerdown', function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rip = document.createElement('div');
    rip.style.cssText = `
      position:absolute;
      left:${x}px; top:${y}px;
      width:8px; height:8px;
      margin:-4px;
      border-radius:50%;
      background:rgba(255,255,255,0.2);
      transform:scale(0);
      animation:rip 0.6s ease forwards;
      pointer-events:none;
      z-index:10;
    `;
    if (!document.querySelector('#rip-style')) {
      const s = document.createElement('style');
      s.id = 'rip-style';
      s.textContent = `@keyframes rip{to{transform:scale(30);opacity:0}}`;
      document.head.appendChild(s);
    }
    this.appendChild(rip);
    setTimeout(() => rip.remove(), 700);
  });
});
</script>
</body>
