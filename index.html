<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOU – جادو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Kufi+Arabic:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:       #06030a;
  --deep:      #0e0814;
  --surface:   #160d1a;
  --card:      #1a0f20;
  --border:    #3a1e50;
  --red:       #c8001a;
  --red2:      #ff1a35;
  --red-glow:  rgba(200,0,26,.5);
  --gold:      #d4a017;
  --gold2:     #f5c842;
  --gold3:     #fff3b0;
  --gold-glow: rgba(212,160,23,.4);
  --text:      #f0e6d3;
  --muted:     #6a4a70;
  --jade:      #2d6e4e;
  --jade-lt:   #4aad7a;
  --purple:    #4a1060;
}
html { scroll-behavior: smooth; }
body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

/* ════════════════════════════════
   INTRO SCREEN
════════════════════════════════ */
#intro {
  position: fixed;
  inset: 0;
  background: #06030a;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  transition: opacity .8s ease, visibility .8s;
}
#intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.intro-dragon {
  font-size: 5rem;
  animation: dragonFloat 2s ease-in-out infinite;
  filter: drop-shadow(0 0 30px var(--red-glow));
}
@keyframes dragonFloat {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-12px) rotate(3deg); }
}

.intro-logo {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(3.5rem, 15vw, 7rem);
  letter-spacing: .18em;
  background: linear-gradient(160deg, var(--gold3) 0%, var(--gold2) 35%, var(--gold) 65%, #8a5500 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  animation: introReveal 1.2s cubic-bezier(.16,1,.3,1) .3s both;
  filter: drop-shadow(0 0 40px var(--gold-glow));
}
@keyframes introReveal {
  from { opacity: 0; transform: scale(.6) translateY(30px); letter-spacing: .4em; }
  to   { opacity: 1; transform: scale(1) translateY(0);    letter-spacing: .18em; }
}

.intro-sub {
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 1rem;
  color: var(--muted);
  margin-top: 8px;
  animation: fadeUp .8s ease 1.2s both;
  letter-spacing: .1em;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.intro-enter {
  margin-top: 40px;
  background: linear-gradient(135deg, var(--red), #7a000f);
  border: 1px solid var(--gold);
  border-radius: 4px;
  color: var(--gold2);
  font-family: 'Cinzel', serif;
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: .2em;
  padding: 13px 40px;
  cursor: pointer;
  animation: fadeUp .8s ease 1.8s both;
  box-shadow: 0 0 30px var(--red-glow), inset 0 1px 0 rgba(255,220,100,.2);
  transition: all .2s;
  text-transform: uppercase;
}
.intro-enter:hover {
  box-shadow: 0 0 50px var(--red-glow), 0 0 30px var(--gold-glow);
  transform: translateY(-2px);
}

/* chinese particles on intro */
.intro-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.intro-particle {
  position: absolute;
  font-size: 1.2rem;
  opacity: 0;
  animation: particleFall linear infinite;
}
@keyframes particleFall {
  0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
  10%  { opacity: .6; }
  90%  { opacity: .3; }
  100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
}

/* ════════════════════════════════
   BACKGROUND LAYERS
════════════════════════════════ */
canvas#fx { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

body::before {
  content: '';
  position: fixed;
  top: -150px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(200,0,26,.25) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -100px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(74,16,96,.4) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ════════════════════════════════
   HEADER
════════════════════════════════ */
header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 52px 24px 24px;
  animation: fadeUp .8s ease .2s both;
}
.hanzi-row {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-bottom: 14px;
}
.hanzi {
  font-size: 1.5rem;
  color: var(--red);
  opacity: .5;
  line-height: 1;
  transition: opacity .3s, transform .3s;
  cursor: default;
}
.hanzi:hover { opacity: 1; transform: scale(1.2); }

.logo-wrap { position: relative; display: inline-block; }
.logo-main {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(2.8rem, 9vw, 5rem);
  letter-spacing: .14em;
  background: linear-gradient(160deg, var(--gold3) 0%, var(--gold2) 35%, var(--gold) 65%, #8a5500 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  filter: drop-shadow(0 0 20px var(--gold-glow));
}
.logo-glow {
  position: absolute; inset: 0;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(2.8rem, 9vw, 5rem);
  letter-spacing: .14em;
  color: transparent;
  text-shadow: 0 0 80px rgba(212,160,23,.5), 0 0 40px rgba(200,0,26,.3);
  pointer-events: none; z-index: -1;
}

.ornament-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin: 16px 0 10px;
  color: var(--gold); opacity: .5; font-size: .8rem;
}
.ornament-row::before, .ornament-row::after {
  content: '';
  height: 1px; width: 80px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.ornament-row::after { background: linear-gradient(90deg, var(--gold), transparent); }

.subtitle {
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: .95rem; color: var(--muted);
}

/* ════════════════════════════════
   VIBE SELECTOR
════════════════════════════════ */
.vibe-bar {
  position: relative; z-index: 2;
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center;
  padding: 0 20px 22px;
  animation: fadeUp .8s ease .4s both;
}
.vibe-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-family: 'Space Grotesk', sans-serif;
  font-size: .78rem; font-weight: 500;
  padding: 8px 20px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .05em;
}
.vibe-btn:hover { border-color: var(--gold); color: var(--gold); }
.vibe-btn.active {
  background: linear-gradient(135deg, var(--red) 0%, #6a000c 100%);
  border-color: var(--gold);
  color: var(--gold2);
  box-shadow: 0 0 18px var(--red-glow), inset 0 1px 0 rgba(255,220,100,.15);
}

/* ════════════════════════════════
   MAIN CARD
════════════════════════════════ */
main {
  position: relative; z-index: 2;
  width: 100%; max-width: 800px;
  padding: 0 18px 80px;
  animation: fadeUp .8s ease .5s both;
}

.card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: visible;
  box-shadow:
    0 0 0 1px rgba(212,160,23,.1),
    0 0 60px rgba(200,0,26,.08),
    0 40px 100px rgba(0,0,0,.85);
}

/* corner ornaments */
.corner { position: absolute; width: 24px; height: 24px; z-index: 4; }
.corner::before, .corner::after { content: ''; position: absolute; background: var(--gold); opacity: .6; }
.corner.tl { top: -1px; left: -1px; }
.corner.tr { top: -1px; right: -1px; }
.corner.bl { bottom: -1px; left: -1px; }
.corner.br { bottom: -1px; right: -1px; }
.corner.tl::before, .corner.tr::before, .corner.bl::before, .corner.br::before { height: 2px; width: 24px; top: 0; left: 0; }
.corner.tl::after, .corner.tr::after, .corner.bl::after, .corner.br::after   { width: 2px; height: 24px; top: 0; left: 0; }
.corner.tr::before { left: auto; right: 0; }
.corner.tr::after  { left: auto; right: 0; }
.corner.bl::before { top: auto; bottom: 0; }
.corner.bl::after  { top: auto; bottom: 0; }
.corner.br::before { top: auto; bottom: 0; left: auto; right: 0; }
.corner.br::after  { top: auto; bottom: 0; left: auto; right: 0; }

/* inner card */
.card-inner { overflow: hidden; border-radius: 4px; }

/* top red stripe */
.card-stripe {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
}

/* ── PANELS ── */
.panels { display: grid; grid-template-columns: 1fr 1fr; }
@media (max-width: 580px) { .panels { grid-template-columns: 1fr; } }

.panel { padding: 26px 22px 18px; }

.panel-label {
  font-size: .63rem; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.gem { width: 9px; height: 9px; border-radius: 1px; transform: rotate(45deg); flex-shrink: 0; }
.gem-red  { background: var(--red);  box-shadow: 0 0 10px var(--red-glow); }
.gem-gold { background: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }

.panel-right {
  border-top: 1px solid var(--border);
  background: rgba(212,160,23,.015);
}
@media (min-width: 581px) {
  .panel-right { border-top: none; border-left: 1px solid var(--border); }
}

textarea {
  width: 100%; background: transparent;
  border: none; outline: none; resize: none;
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 1.1rem; color: var(--text);
  line-height: 1.85; min-height: 155px;
  direction: rtl;
  caret-color: var(--red);
}
textarea::placeholder { color: var(--muted); }

.output-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.05rem; font-weight: 500;
  color: var(--text); line-height: 1.85;
  min-height: 155px; white-space: pre-wrap;
  direction: ltr; text-align: left;
}
.output-text.empty { color: var(--muted); font-weight: 300; font-style: italic; }

/* typewriter cursor */
.cursor-blink {
  display: inline-block;
  width: 2px; height: 1em;
  background: var(--gold);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* shimmer */
.shimmer {
  background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer .9s infinite;
  border-radius: 3px; height: 1.1em; margin-bottom: .65em;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── FOOTER ── */
.card-footer {
  border-top: 1px solid var(--border);
  padding: 14px 22px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px; flex-wrap: wrap;
  background: rgba(6,3,10,.5);
}
.char-count { font-size: .72rem; color: var(--muted); }
.actions { display: flex; gap: 10px; align-items: center; }

.btn-copy {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px; color: var(--muted);
  font-size: .78rem; font-family: 'Space Grotesk', sans-serif;
  padding: 9px 18px; cursor: pointer;
  transition: all .2s; letter-spacing: .04em;
}
.btn-copy:hover { border-color: var(--gold); color: var(--gold); }
.btn-copy.copied { border-color: var(--jade-lt); color: var(--jade-lt); }

.btn-send {
  background: linear-gradient(135deg, var(--red) 0%, #7a000c 100%);
  border: 1px solid var(--gold);
  border-radius: 4px; color: var(--gold2);
  font-family: 'Cinzel', serif;
  font-size: .85rem; font-weight: 700;
  padding: 10px 30px; cursor: pointer;
  letter-spacing: .1em;
  transition: all .2s;
  box-shadow: 0 4px 24px var(--red-glow), inset 0 1px 0 rgba(255,220,100,.2);
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase;
}
.btn-send:hover:not(:disabled) {
  box-shadow: 0 6px 36px var(--red-glow), 0 0 24px var(--gold-glow);
  transform: translateY(-1px);
}
.btn-send:disabled { opacity:.3; cursor:not-allowed; }

.spinner {
  width: 13px; height: 13px;
  border: 2px solid rgba(212,160,23,.3);
  border-top-color: var(--gold2);
  border-radius: 50%;
  animation: spin .6s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HISTORY ── */
.history-wrap {
  margin-top: 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--card);
  overflow: hidden;
  display: none;
}
.history-wrap.visible { display: block; }
.history-header {
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  font-size: .65rem; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
  background: rgba(6,3,10,.4);
}
.history-item {
  padding: 12px 18px;
  border-bottom: 1px solid rgba(58,30,80,.4);
  cursor: pointer;
  transition: background .2s;
}
.history-item:last-child { border-bottom: none; }
.history-item:hover { background: rgba(212,160,23,.04); }
.history-ar { font-family:'Noto Kufi Arabic',sans-serif; font-size:.85rem; color:var(--muted); direction:rtl; text-align:right; margin-bottom:4px; }
.history-en { font-family:'Space Grotesk',sans-serif; font-size:.82rem; color:var(--text); direction:ltr; text-align:left; }

/* ── EXAMPLES ── */
.examples {
  margin-top: 20px;
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.ex-label {
  width: 100%; text-align: center;
  font-size: .62rem; letter-spacing: .2em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
}
.ex-chip {
  font-family: 'Noto Kufi Arabic', sans-serif;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 7px 18px; font-size: .8rem;
  color: var(--muted); cursor: pointer;
  transition: all .18s; direction: rtl;
}
.ex-chip:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,160,23,.05); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--card);
  border: 1px solid var(--gold);
  color: var(--gold2);
  border-radius: 4px; padding: 10px 26px;
  font-size: .82rem; font-family: 'Space Grotesk', sans-serif;
  opacity: 0; transition: all .3s;
  pointer-events: none; z-index: 200;
  letter-spacing: .06em;
}
.toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

/* ── RIPPLE ── */
.ripple-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,0,26,.3), transparent 70%);
  transform: scale(0);
  animation: rippleOut .8s ease-out forwards;
}
@keyframes rippleOut {
  to { transform: scale(6); opacity: 0; }
}

/* ── FIRECRACKER ── */
.firecracker-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden;
}
.spark {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  animation: sparkFly linear forwards;
}
@keyframes sparkFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
</style>
</head>
<body>

<!-- ═══ INTRO SCREEN ═══ -->
<div id="intro">
  <div class="intro-particles" id="introParticles"></div>
  <div class="intro-dragon">🐉</div>
  <div class="intro-logo">JADOU</div>
  <div style="font-family:'Noto Kufi Arabic',sans-serif;font-size:.85rem;color:#6a4a70;margin-top:6px;letter-spacing:.1em;">魔法翻译 · جادو الترجمة</div>
  <button class="intro-enter" onclick="enterApp()">ادخل ✦</button>
</div>

<!-- ═══ FX CANVAS ═══ -->
<canvas id="fx"></canvas>
<div class="ripple-overlay" id="rippleOverlay"></div>
<div class="firecracker-container" id="firecrackerContainer"></div>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="hanzi-row">
    <span class="hanzi" title="Magic">魔</span>
    <span class="hanzi" title="Dragon">龍</span>
    <span class="hanzi" title="Fire">火</span>
    <span class="hanzi" title="Gold">金</span>
    <span class="hanzi" title="Style">風</span>
  </div>
  <div class="logo-wrap">
    <div class="logo-main">JADOU</div>
    <div class="logo-glow">JADOU</div>
  </div>
  <div class="ornament-row">◆ جادو الترجمة ◆</div>
  <p class="subtitle">اكتب بالعربية — توصل بلغة الشارع الأمريكي 🔥</p>
</header>

<!-- ═══ VIBE BAR ═══ -->
<div class="vibe-bar">
  <button class="vibe-btn active" data-vibe="street">🏙️ Street</button>
  <button class="vibe-btn" data-vibe="genz">⚡ Gen Z</button>
  <button class="vibe-btn" data-vibe="hype">🔥 Hype</button>
  <button class="vibe-btn" data-vibe="chill">😎 Chill</button>
</div>

<!-- ═══ MAIN ═══ -->
<main>
  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="card-inner">
      <div class="card-stripe"></div>
      <div class="panels">
        <div class="panel">
          <div class="panel-label"><span class="gem gem-red"></span> اكتب بالعربي أو الدارجة</div>
          <textarea id="inputText" placeholder="كتب هنا..." rows="7" oninput="updateCount()"></textarea>
        </div>
        <div class="panel panel-right">
          <div class="panel-label"><span class="gem gem-gold"></span> American Slang</div>
          <div id="outputText" class="output-text empty">your slang drops here...</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="char-count" id="charCount">0 حرف</span>
        <div class="actions">
          <button class="btn-copy" id="copyBtn" onclick="copyResult()" disabled>Copy 📋</button>
          <button class="btn-send" id="sendBtn" onclick="doTranslate()">
            <span id="btnText">ترجم</span>
            <span class="spinner" id="spinner"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-wrap" id="historyWrap">
    <div class="history-header">
      <span class="gem gem-gold" style="width:7px;height:7px"></span>
      آخر الترجمات
    </div>
    <div id="historyList"></div>
  </div>

  <!-- EXAMPLES -->
  <div class="examples">
    <span class="ex-label">◆ جرب مثال ◆</span>
    <div class="ex-chip" onclick="setExample('صباح الخير خويا كيداير؟')">صباح الخير خويا</div>
    <div class="ex-chip" onclick="setExample('واش راك؟ مزيان؟')">واش راك؟</div>
    <div class="ex-chip" onclick="setExample('هادي حاجة مزيانة بزاف صراحة')">مزيانة بزاف</div>
    <div class="ex-chip" onclick="setExample('ماشي معاك غدا إن شاء الله')">ماشي معاك</div>
    <div class="ex-chip" onclick="setExample('روحو بلا ما تبعتو خبري')">روحو بلا</div>
    <div class="ex-chip" onclick="setExample('هذا الراجل ما يفهمش والو')">ما يفهمش</div>
  </div>
</main>

<div class="toast" id="toast">Copied ✓</div>

<script>
/* ══════════════════════════════════════
   INTRO PARTICLES
══════════════════════════════════════ */
(function() {
  const chars = ['龍','火','金','風','魔','福','氣','龍','✦','◆','❋'];
  const container = document.getElementById('introParticles');
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'intro-particle';
    el.textContent = chars[Math.floor(Math.random() * chars.length)];
    el.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      color: ${Math.random()>.5 ? '#c8001a' : '#d4a017'};
      opacity: 0;
      animation-duration: ${4+Math.random()*6}s;
      animation-delay: ${Math.random()*4}s;
    `;
    container.appendChild(el);
  }
})();

function enterApp() {
  document.getElementById('intro').classList.add('hidden');
  fireSparks(window.innerWidth/2, window.innerHeight/2, 40);
}

/* ══════════════════════════════════════
   CANVAS FX — Lanterns + Fireflies
══════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  // Lanterns
  const lanterns = Array.from({length:20}, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: 7 + Math.random() * 10,
    speed: .12 + Math.random() * .22,
    sway: Math.random() * Math.PI * 2,
    swayAmp: 12 + Math.random()*14,
    swaySpeed: .004 + Math.random()*.007,
    alpha: .25 + Math.random()*.45,
    color: Math.random()>.35 ? '#c8001a' : '#d4a017',
    pulsePhase: Math.random()*Math.PI*2,
  }));

  // Fireflies
  const flies = Array.from({length:30}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    vx: (Math.random()-.5)*.4,
    vy: (Math.random()-.5)*.4,
    alpha: Math.random(),
    phase: Math.random()*Math.PI*2,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * .001;

    // Lanterns
    lanterns.forEach(l => {
      l.y -= l.speed;
      l.sway += l.swaySpeed;
      if (l.y < -40) { l.y = canvas.height + 20; l.x = Math.random()*canvas.width; }
      const sx = l.x + Math.sin(l.sway)*l.swayAmp;
      const pulse = 1 + .15*Math.sin(t*2 + l.pulsePhase);
      const r = l.r * pulse;

      // outer glow
      const g = ctx.createRadialGradient(sx, l.y, 0, sx, l.y, r*4);
      g.addColorStop(0, l.color+'99');
      g.addColorStop(1, l.color+'00');
      ctx.globalAlpha = l.alpha * .5;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(sx, l.y, r*4, 0, Math.PI*2); ctx.fill();

      // body
      ctx.globalAlpha = l.alpha;
      ctx.fillStyle = l.color;
      ctx.beginPath(); ctx.ellipse(sx, l.y, r*.65, r, 0, 0, Math.PI*2); ctx.fill();

      // gold top cap
      ctx.fillStyle = '#d4a017';
      ctx.globalAlpha = l.alpha*.9;
      ctx.beginPath(); ctx.ellipse(sx, l.y - r, r*.65, r*.22, 0, 0, Math.PI*2); ctx.fill();

      // gold bottom cap
      ctx.beginPath(); ctx.ellipse(sx, l.y + r, r*.65, r*.22, 0, 0, Math.PI*2); ctx.fill();

      // string
      ctx.globalAlpha = l.alpha * .3;
      ctx.strokeStyle = '#d4a017'; ctx.lineWidth = .8;
      ctx.beginPath(); ctx.moveTo(sx, l.y+r+2); ctx.lineTo(sx, l.y+r+18); ctx.stroke();
    });

    // Fireflies
    flies.forEach(f => {
      f.x += f.vx; f.y += f.vy;
      f.phase += .03;
      if (f.x<0) f.x=canvas.width; if (f.x>canvas.width) f.x=0;
      if (f.y<0) f.y=canvas.height; if (f.y>canvas.height) f.y=0;
      const a = (.3 + .7*Math.abs(Math.sin(f.phase))) * .4;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#d4a017';
      ctx.beginPath(); ctx.arc(f.x, f.y, 1.5, 0, Math.PI*2); ctx.fill();
    });

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════
   RIPPLE + SPARKS
══════════════════════════════════════ */
function fireRipple(x, y) {
  const overlay = document.getElementById('rippleOverlay');
  const el = document.createElement('div');
  el.className = 'ripple';
  el.style.cssText = `width:100px;height:100px;left:${x-50}px;top:${y-50}px;`;
  overlay.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function fireSparks(x, y, count=25) {
  const container = document.getElementById('firecrackerContainer');
  const colors = ['#c8001a','#d4a017','#f5c842','#ff1a35','#fff3b0','#ff6b35'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    const angle = (Math.PI*2/count)*i + Math.random()*.3;
    const dist = 60 + Math.random()*120;
    el.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-duration:${.5+Math.random()*.5}s;
      width:${2+Math.random()*4}px;
      height:${2+Math.random()*4}px;
      box-shadow:0 0 6px currentColor;
    `;
    container.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

/* ══════════════════════════════════════
   TYPEWRITER
══════════════════════════════════════ */
function typewrite(el, text, speed=18) {
  el.innerHTML = '';
  el.classList.remove('empty');
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  el.appendChild(cursor);

  const interval = setInterval(() => {
    if (i >= text.length) {
      clearInterval(interval);
      setTimeout(() => cursor.remove(), 1500);
      return;
    }
    el.insertBefore(document.createTextNode(text[i]), cursor);
    i++;
  }, speed);
}

/* ══════════════════════════════════════
   HISTORY
══════════════════════════════════════ */
const history = [];
function addHistory(ar, en) {
  history.unshift({ ar, en });
  if (history.length > 5) history.pop();
  renderHistory();
}
function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  const list = document.getElementById('historyList');
  if (!history.length) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="reuseHistory(${i})">
      <div class="history-ar">${h.ar}</div>
      <div class="history-en">${h.en}</div>
    </div>
  `).join('');
}
function reuseHistory(i) {
  document.getElementById('inputText').value = history[i].ar;
  updateCount();
  doTranslate();
}

/* ══════════════════════════════════════
   VIBE
══════════════════════════════════════ */
let currentVibe = 'street';
let lastTranslation = '';

document.querySelectorAll('.vibe-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.vibe-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentVibe = b.dataset.vibe;
  });
});

const vibeMap = {
  street: `Translate to authentic American street slang — urban NYC/LA style. Use: "bro", "fam", "yo", "ngl", "lowkey", "no cap", "bussin", "what's good", "real talk", "on god", "bet", "fr", "deadass", "aight", "word". Sound natural, like a real person texting their friend, not forced.`,
  genz:   `Translate to Gen Z internet/TikTok slang. Use: "slay", "it's giving", "rent free", "vibe check", "based", "fr fr", "ate that", "main character energy", "periodt", "understood the assignment", "lowkey slay", "no cap", "iykyk", "we move", "understood", "that's sending me".`,
  hype:   `Translate with MAXIMUM hype energy! Use selective ALL CAPS for key words, exclamations. Words: "BRO", "SHEESH", "LETS GOOO", "W move", "GOATED", "INSANE", "THIS IS IT", "NO WAY", "ACTUAL LEGEND", "CERTIFIED", "COOKED". Very high energy, hyped up.`,
  chill:  `Translate to super chill, laid-back American casual. Use: "yeah man", "for sure", "totally", "honestly", "vibe", "it's all good", "no worries", "dude", "bro", "lowkey", "kinda", "you feel me", "makes sense", "solid". Keep it mellow and easy.`
};

function updateCount() {
  const len = document.getElementById('inputText').value.length;
  document.getElementById('charCount').textContent = len + ' حرف';
}

function setExample(text) {
  document.getElementById('inputText').value = text;
  updateCount();
  doTranslate();
}

async function doTranslate() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;

  const output  = document.getElementById('outputText');
  const btn     = document.getElementById('sendBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  const copyBtn = document.getElementById('copyBtn');

  // ripple from button
  const btnRect = btn.getBoundingClientRect();
  fireRipple(btnRect.left + btnRect.width/2, btnRect.top + btnRect.height/2);

  btn.disabled = true;
  copyBtn.disabled = true;
  btnText.textContent = '...';
  spinner.style.display = 'block';
  output.classList.remove('empty');
  output.innerHTML = '<div class="shimmer" style="width:80%"></div><div class="shimmer" style="width:55%"></div><div class="shimmer" style="width:65%"></div>';

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `You are JADOU (جادو), an elite Arabic-to-American-slang translator. ${vibeMap[currentVibe]}

STRICT RULES:
- NEVER use formal English. ALWAYS use natural slang.
- Return ONLY the translated slang text — zero explanation, zero quotes, zero preamble.
- Keep emojis if they fit the vibe.
- Sound like a real human texting, not a translator.
- Match the energy and length of the original message.`,
        messages: [{ role: "user", content: input }]
      })
    });

    const data = await res.json();
    const translated = data.content?.[0]?.text?.trim() || 'something went wrong bro 😅';
    lastTranslation = translated;
    copyBtn.disabled = false;

    // typewriter reveal
    typewrite(output, translated, 20);

    // sparks from output area
    const outRect = output.getBoundingClientRect();
    setTimeout(() => fireSparks(outRect.left + outRect.width/2, outRect.top + 20, 20), 300);

    // add to history
    addHistory(input, translated);

  } catch (err) {
    output.classList.add('empty');
    output.textContent = 'error fam, try again 😬';
  } finally {
    btn.disabled = false;
    btnText.textContent = 'ترجم';
    spinner.style.display = 'none';
  }
}

function copyResult() {
  if (!lastTranslation) return;
  navigator.clipboard.writeText(lastTranslation).then(() => {
    const cb = document.getElementById('copyBtn');
    cb.textContent = 'Copied ✓';
    cb.classList.add('copied');
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => {
      cb.textContent = 'Copy 📋';
      cb.classList.remove('copied');
      t.classList.remove('show');
    }, 2200);
  });
}

document.getElementById('inputText').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doTranslate();
});
</script>
