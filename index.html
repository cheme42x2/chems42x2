<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الخدمات الرقمية المتقدمة</title>
    <style>
        :root {
            --premium-gold: #d4af37;
            --premium-gold-dark: #aa8416;
            --premium-gold-light: #fff3cc;
            --bg-main: #0a0a0a;
            --bg-card: rgba(20, 20, 20, 0.85);
            --border-color: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-muted: #b0b0b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        /* الهيدر الرئيسي */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .brand-logo span {
            color: var(--premium-gold);
        }

        .system-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* حاوية المحتوى المركزي */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .main-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .card-title {
            color: var(--premium-gold);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* إدارة خطوات العرض */
        .panel-view {
            display: none;
        }

        .panel-view.active {
            display: block;
        }

        /* عناصر الإدخال والأزرار */
        .action-button {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s ease;
        }

        .action-button:hover {
            border-color: var(--premium-gold);
            background: rgba(212, 175, 55, 0.05);
            color: var(--premium-gold);
        }

        .action-button::after {
            content: '←';
            color: var(--premium-gold);
        }

        .input-field {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: var(--premium-gold);
        }

        .submit-button {
            background: linear-gradient(135deg, var(--premium-gold-dark), var(--premium-gold));
            color: #000;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, cubic-bezier(0.175, 0.885, 0.32, 1);
        }

        .submit-button:hover {
            transform: translateY(-2px);
        }

        /* الفوتر */
        footer {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">PREMIUM <span>PORTAL</span></div>
        <div class="system-badge">
            <div class="indicator-dot"></div>
            <span>الخادم متصل</span>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="main-card">
            <h1 class="card-title">بوابة العمليات الرقمية</h1>
            <p class="card-desc">منصة موحدة لإدارة وتأكيد المعاملات السحابية المشفرة</p>

            <!-- القسم الأول: اختيار الخدمة -->
            <div id="view-selection" class="panel-view active">
                <button class="action-button" onclick="navigateToView('view-identity', 'خدمة تهيئة الحسابات الرقمية')">تهيئة الحسابات الرقمية</button>
                <button class="action-button" onclick="navigateToView('view-identity', 'خدمة فحص وتدقيق البيانات')">فحص وتدقيق البيانات المعقدة</button>
            </div>

            <!-- القسم الثاني: إدخال المعرف -->
            <div id="view-identity" class="panel-view">
                <p id="target-service-display" style="color: var(--premium-gold); margin-bottom: 15px; font-weight: 600;"></p>
                <input type="text" id="account-id" class="input-field" placeholder="أدخل معرف الحساب المعني">
                <button class="submit-button" onclick="processIdentityVerification()">مزامنة وتحليل المعطيات</button>
            </div>

            <!-- القسم الثالث: معالجة البيانات -->
            <div id="view-processing" class="panel-view">
                <p style="margin-bottom: 15px;">جاري إرسال الطلب وتحليل المدخلات الموفرة...</p>
                <div style="width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--premium-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>

        </div>
    </div>

    <footer>
        حقوق الطبع والنشر © 2026 جميع الحقوق محفوظة للمنصة المطورة.
    </footer>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        let selectedServiceType = "";

        // التنقل بين واجهات العرض المختلفة
        function navigateToView(viewId, serviceName = "") {
            if (serviceName) {
                selectedServiceType = serviceName;
                document.getElementById('target-service-display').innerText = selectedServiceType;
            }

            // إخفاء كافة الأقسام
            document.querySelectorAll('.panel-view').forEach(view => {
                view.classList.remove('active');
            });

            // إظهار القسم المطلوب
            const targetView = document.getElementById(viewId);
            if (targetView) {
                targetView.classList.add('active');
            }
        }

        // التحقق من صحة المدخلات وبدء المعالجة
        function processIdentityVerification() {
            const inputData = document.getElementById('account-id').value;
            if (!inputData.trim()) {
                alert("يرجى تزويد النظام بالمعرف المطلوب للاستمرار.");
                return;
            }

            // الانتقال إلى واجهة الانتظار
            navigateToView('view-processing');

            // محاكاة انتهاء العملية بعد فترة زمنية
            setTimeout(() => {
                alert("اكتملت مرحلة فحص المدخلات الأولوية بنجاح.");
                navigateToView('view-selection');
                document.getElementById('account-id').value = ""; // تفريغ الخانة
            }, 3000);
        }
    </script>
</body>
</html>
