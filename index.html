<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاذ السكون | الفخامة والنوم</title>
    <style>
        /* Reset and Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #11151c; color: #e2e8c0; overflow: hidden; }

        /* Background Elements */
        .bg-lines { position: absolute; top: 0; left: 10%; width: 1px; height: 100%; background: rgba(212, 175, 55, 0.2); z-index: 0; }
        .bg-lines::after { content: ''; position: absolute; top: 0; left: 80vw; width: 1px; height: 100%; background: rgba(212, 175, 55, 0.2); }
        .bg-square { position: absolute; top: 20%; right: 15%; width: 300px; height: 300px; background-color: #2c698d; opacity: 0.8; z-index: 0; box-shadow: 0 0 50px rgba(44, 105, 141, 0.2); }
        .bg-orb { position: absolute; top: 5%; right: 25%; width: 150px; height: 150px; background: radial-gradient(circle, #a2d2d9 0%, transparent 70%); border-radius: 50%; opacity: 0.9; z-index: 0; filter: blur(5px); }

        /* App Container */
        #app { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(40px); background: rgba(17, 21, 28, 0.6); }

        /* Views Configuration */
        .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .view.active { display: flex; opacity: 1; }

        /* View 1: Luxury Anti-Anxiety */
        h1 { font-size: 4.5rem; color: #e2e8c0; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 4px 20px rgba(226, 232, 192, 0.1); }
        p.subtitle { font-size: 1.3rem; color: #a2d2d9; max-width: 600px; line-height: 1.8; margin-bottom: 50px; font-weight: 300; }

        .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        .btn-premium { background: transparent; border: 1px solid rgba(212, 175, 55, 0.4); color: #e2e8c0; padding: 15px 45px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; transition: all 0.5s ease; position: relative; overflow: hidden; letter-spacing: 1px; }
        .btn-premium::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), transparent); transition: all 0.7s ease; }
        .btn-premium:hover::before { left: 100%; }
        .btn-premium:hover { background: rgba(212, 175, 55, 0.05); border-color: rgba(212, 175, 55, 0.8); box-shadow: 0 0 40px rgba(212, 175, 55, 0.15); transform: translateY(-3px); }

        .btn-sleep { border-color: rgba(44, 105, 141, 0.5); color: #a2d2d9; }
        .btn-sleep::before { background: linear-gradient(90deg, transparent, rgba(44, 105, 141, 0.2), transparent); }
        .btn-sleep:hover { background: rgba(44, 105, 141, 0.05); border-color: rgba(44, 105, 141, 0.8); box-shadow: 0 0 40px rgba(44, 105, 141, 0.2); }

        .message-display { margin-top: 40px; font-size: 1.6rem; height: 60px; color: #fff; font-weight: 300; opacity: 0; transition: opacity 0.8s ease; text-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* View 2: The Sleep Trap (Hypnosis) */
        .hypno-trap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #020406; overflow: hidden; cursor: none; }
        .hypno-text { position: absolute; z-index: 100; font-size: 1.8rem; color: rgba(226, 232, 192, 0.6); font-weight: 100; letter-spacing: 5px; animation: breatheText 10s infinite ease-in-out; pointer-events: none; text-shadow: 0 0 20px rgba(226, 232, 192, 0.3); }

        .spiral-container { position: absolute; width: 120vmax; height: 120vmax; display: flex; align-items: center; justify-content: center; animation: spin 90s linear infinite; }
        
        .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(44, 105, 141, 0.15); box-shadow: inset 0 0 60px rgba(44, 105, 141, 0.05), 0 0 60px rgba(44, 105, 141, 0.05); }
        
        /* Generating hypnotic concentric rings */
        .r1 { width: 5%; height: 5%; animation: pulseRing 10s infinite alternate ease-in-out; background: rgba(44, 105, 141, 0.1); }
        .r2 { width: 15%; height: 15%; animation: pulseRing 10s infinite alternate-reverse ease-in-out; border-color: rgba(212, 175, 55, 0.05); }
        .r3 { width: 25%; height: 25%; animation: pulseRing 10s infinite alternate ease-in-out; }
        .r4 { width: 35%; height: 35%; animation: pulseRing 10s infinite alternate-reverse ease-in-out; border-color: rgba(212, 175, 55, 0.05); }
        .r5 { width: 50%; height: 50%; animation: pulseRing 10s infinite alternate ease-in-out; }
        .r6 { width: 65%; height: 65%; animation: pulseRing 10s infinite alternate-reverse ease-in-out; border-color: rgba(212, 175, 55, 0.05); }
        .r7 { width: 80%; height: 80%; animation: pulseRing 10s infinite alternate ease-in-out; }
        .r8 { width: 100%; height: 100%; animation: pulseRing 10s infinite alternate-reverse ease-in-out; border-color: rgba(212, 175, 55, 0.05); }

        .black-hole { position: absolute; width: 2%; height: 2%; background: #000; border-radius: 50%; box-shadow: 0 0 150px 80px #000; z-index: 50; }

        .exit-sleep { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 200; opacity: 0; transition: opacity 2s; cursor: pointer; }
        .hypno-trap:hover .exit-sleep { opacity: 0.1; }
        .exit-sleep:hover { opacity: 1; }

        /* Animations */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseRing { 0% { transform: scale(0.85); opacity: 0.2; } 100% { transform: scale(1.15); opacity: 0.9; } }
        @keyframes breatheText { 0%, 100% { opacity: 0; transform: scale(0.9); } 50% { opacity: 0.8; transform: scale(1.05); } }
    </style>
</head>
<body>

    <!-- Abstract Background -->
    <div class="bg-lines"></div>
    <div class="bg-square"></div>
    <div class="bg-orb"></div>

    <div id="app">
        <!-- Interface 1: Minimalist Anti-Anxiety & Dopamine -->
        <div id="view-joy" class="view active">
            <h1>ملاذ السكون</h1>
            <p class="subtitle">صُمم هذا الفضاء الفاخر خصيصاً ليأخذك بعيداً عن ضجيج العالم. لا يوجد هنا ما يزعجك، فقط هدوء نقي، طاقة إيجابية، وراحة بال تامة لا تُقدر بثمن.</p>

            <div class="btn-container">
                <button class="btn-premium" onclick="givePeace()">تفريغ القلق ✦</button>
                <button class="btn-premium btn-sleep" onclick="goToSleep()">بوابة النوم العميق ☾</button>
            </div>

            <div class="message-display" id="msg-box"></div>
        </div>

        <!-- Interface 2: The Sleep Hypnosis Trap -->
        <div id="view-sleep" class="view">
            <div class="hypno-trap">
                <div class="spiral-container">
                    <div class="ring r1"></div>
                    <div class="ring r2"></div>
                    <div class="ring r3"></div>
                    <div class="ring r4"></div>
                    <div class="ring r5"></div>
                    <div class="ring r6"></div>
                    <div class="ring r7"></div>
                    <div class="ring r8"></div>
                </div>
                <div class="black-hole"></div>
                <!-- Slow, hypnotic text guiding the subconscious -->
                <div class="hypno-text" id="hypno-words">استسلم للهدوء... عيناك تزداد ثقلاً...</div>
                
                <button class="btn-premium btn-sleep exit-sleep" onclick="goBack()">العودة للواقع</button>
            </div>
        </div>
    </div>

    <script>
        // -- View Management (Smooth Transitions) --
        const viewJoy = document.getElementById('view-joy');
        const viewSleep = document.getElementById('view-sleep');
        const hypnoWords = document.getElementById('hypno-words');

        const sleepMantras = [
            "استسلم للهدوء... عيناك تزداد ثقلاً...",
            "تنفس ببطء... دع العالم يتلاشى...",
            "لا تفكر في شيء... فقط راقب المركز...",
            "عقلك يهدأ... جسدك يسترخي تماماً...",
            "أنت تغوص في نوم عميق... عميق جداً..."
        ];

        let mantraInterval;

        function goToSleep() {
            // Fade out the joy view
            viewJoy.style.opacity = '0';
            
            setTimeout(() => {
                viewJoy.classList.remove('active');
                viewSleep.classList.add('active');
                
                // Slight delay before fading in the sleep view for a dramatic dark transition
                setTimeout(() => {
                    viewSleep.style.opacity = '1';
                }, 100);

                // Request fullscreen to enhance the hypnosis trap
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch((e) => console.log("Fullscreen blocked by browser, continuing gracefully."));
                }

                // Cycle hypnotic text
                let mIndex = 0;
                mantraInterval = setInterval(() => {
                    mIndex = (mIndex + 1) % sleepMantras.length;
                    // The text animation handles opacity fading naturally
                    setTimeout(() => {
                        hypnoWords.innerText = sleepMantras[mIndex];
                    }, 5000); // Change text at the invisible point of the breathing animation
                }, 10000);

            }, 1500); // 1.5s transition time matches CSS
        }

        function goBack() {
            viewSleep.style.opacity = '0';
            clearInterval(mantraInterval);
            
            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen().catch((e) => console.log(e));
            }

            setTimeout(() => {
                viewSleep.classList.remove('active');
                viewJoy.classList.add('active');
                setTimeout(() => viewJoy.style.opacity = '1', 50);
            }, 1500);
        }

        // -- Elegant Anti-Anxiety Engine (No annoying popups) --
        const peaceMessages = [
            "أنت بأمان هنا. خذ نفساً عميقاً وارخِ كتفيك الآن.",
            "كل تلك الأفكار المزعجة هي مجرد وهم. الحقيقة هي أنك أقوى منها.",
            "اسمح لنفسك بالراحة. أنت تستحق هذا الهدوء الفاخر.",
            "تخيل أن كل قلقك يذوب ويتلاشى في هذا الفراغ الهادئ.",
            "أنت لست متأخراً في أي شيء، أنت تعيش بتوقيتك الخاص والمثالي.",
            "بمجرد أن تتوقف عن المقاومة، سيبدأ السلام الداخلي بالتدفق إليك."
        ];

        let lastIndex = -1;
        function givePeace() {
            const msgBox = document.getElementById('msg-box');
            
            // Fade out current message
            msgBox.style.opacity = '0';

            // Wait for fade out, then change text and fade in
            setTimeout(() => {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * peaceMessages.length);
                } while (newIndex === lastIndex);
                lastIndex = newIndex;

                msgBox.innerText = peaceMessages[newIndex];
                msgBox.style.opacity = '1';
            }, 800);
        }
    </script>
</body>
</html>
