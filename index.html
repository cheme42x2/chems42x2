<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP TikTok Unban | المنصة الملكية</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --gold-light: #fff3cc; --gold: #d4af37; --gold-dark: #aa8416; --dark-bg: #030303; --card-bg: rgba(18, 18, 18, 0.75); --text-color: #ffffff; --text-muted: #a0a0a5; --neon-glow: rgba(212, 175, 55, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }
        header { width: 100%; max-width: 1200px; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .nav-logo { font-size: 20px; font-weight: 900; color: var(--text-color); }
        .nav-logo span { color: var(--gold); cursor: pointer; }
        .server-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); background: rgba(255, 255, 255, 0.03); padding: 6px 14px; border-radius: 20px; }
        .status-dot { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; }
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 20px; z-index: 5; }
        .container { width: 100%; max-width: 440px; background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 24px; padding: 35px 25px; text-align: center; backdrop-filter: blur(15px); }
        .step { display: none; } .step.active { display: block; }
        .vip-btn { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; border: none; padding: 16px; font-weight: 700; border-radius: 14px; cursor: pointer; width: 100%; margin-top: 15px; }
        .option-btn { background: rgba(255, 255, 255, 0.02); color: #fff; border: 1px solid rgba(212, 175, 55, 0.25); padding: 18px; border-radius: 14px; width: 100%; margin-bottom: 14px; cursor: pointer; }
        .vip-input { width: 100%; padding: 16px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; text-align: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #0d0d0d; border: 1px solid var(--gold); border-radius: 20px; padding: 30px; width: 90%; max-width: 380px; text-align: center; }
        .modal-btn { padding: 14px; border-radius: 12px; border: none; cursor: pointer; width: 48%; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <div class="nav-logo">TIKTOK <span id="vip-trigger" onclick="handleVipClick()">VIP</span></div>
        <div style="cursor:pointer; font-size: 24px;" onclick="toggleHistory()">📜</div>
        <div class="server-status"><div class="status-dot"></div><span>نشط</span></div>
    </header>

    <div class="main-content">
        <div class="container">
            <h1>VIP UNBAN</h1>
            <div id="step1" class="step active">
                <button class="option-btn" onclick="nextStep(2, 'استرداد حساب')">استرداد وفك حظر الحساب</button>
            </div>
            <div id="step2" class="step">
                <input type="text" id="username" class="vip-input" placeholder="@username">
                <button class="vip-btn" onclick="nextStep(3)">متابعة</button>
            </div>
            <div id="step3" class="step">
                <div style="font-size: 30px; color: var(--gold);">200$</div>
                <button class="vip-btn" onclick="confirmVipMagic()">تأكيد الدفع (خصم 200$)</button>
            </div>
            <div id="step4" class="step"><h3>جاري المعالجة...</h3></div>
            <div id="step5" class="step"><h2 style="color: #2ecc71;">تمت العملية بنجاح!</h2></div>
        </div>
    </div>

    <!-- نافذة السجل -->
    <div id="history-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>سجل العمليات</h3>
            <div id="history-list" style="margin: 20px 0; color: #fff; text-align: right;">لا توجد عمليات.</div>
            <button class="modal-btn" style="background:#444; color:#fff;" onclick="toggleHistory()">إغلاق</button>
        </div>
    </div>

    <script>
        let balance = 6082;
        function toggleHistory() { document.getElementById('history-modal').classList.toggle('active'); }
        function nextStep(n, s) { document.querySelectorAll('.step').forEach(e => e.classList.remove('active')); document.getElementById('step'+n).classList.add('active'); }
        
        function confirmVipMagic() {
            balance -= 200;
            let user = document.getElementById('username').value || "User";
            document.getElementById('history-list').innerHTML = `<div>عملية ناجحة لـ ${user}<br>خصم: 200$<br>الرصيد المتبقي: ${balance}$</div>`;
            nextStep(4);
            setTimeout(() => nextStep(5), 2000);
        }
        
        function handleVipClick() { alert("نظام VIP متاح فقط عند إتمام عملية دفع."); }
        particlesJS("particles-js", {"particles": {"number": {"value": 50}, "color": {"value": "#d4af37"}, "line_linked": {"enable": true, "color": "#d4af37"}}});
    </script>
</body>
</html>
