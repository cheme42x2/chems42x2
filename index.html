<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واحة السكينة | الفخامة والهدوء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0f18;
            --primary-gold: #d4af37;
            --light-gold: #f3e5ab;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color), #1a2536);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: var(--primary-gold);
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        p.subtitle {
            color: var(--light-gold);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            opacity: 0.8;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(212, 175, 55, 0.15);
        }

        .card h2 {
            font-family: 'Amiri', serif;
            color: var(--primary-gold);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        /* Breathing Circle */
        .breathe-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,0.2) 0%, rgba(10,15,24,0) 70%);
            border: 2px solid var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: all 0.1s linear;
        }

        .breathe-text {
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 10;
            color: var(--light-gold);
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: opacity 0.5s;
        }

        /* Dopamine Button */
        .btn-dopamine {
            background: linear-gradient(45deg, #d4af37, #b8860b);
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            color: #0a0f18;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-dopamine:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.6);
        }

        .btn-dopamine:active {
            transform: scale(0.95);
        }

        .message-box {
            min-height: 80px;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #fff;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Bubble Game */
        .bubble-area {
            width: 100%;
            height: 200px;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
            cursor: crosshair;
        }

        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(212,175,55,0.6));
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5), 0 0 10px rgba(212,175,55,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #0a0f18;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .bubble:hover {
            transform: scale(1.1);
        }

        .score-board {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: var(--light-gold);
        }

    </style>
</head>
<body>

    <h1>واحة السكينة</h1>
    <p class="subtitle">ملاذك الفخم لتجديد الطاقة، الاسترخاء، ورفع هرمون السعادة</p>

    <div class="container">
        <!-- Section 1: Breathing -->
        <div class="card">
            <h2>تنفس بعمق</h2>
            <p style="margin-bottom: 1rem; text-align: center; font-size: 0.9rem; color: #ccc;">علمياً: التنفس العميق يوقف هرمون التوتر فوراً.</p>
            <div class="breathe-container">
                <div class="circle" id="breatheCircle"></div>
                <div class="breathe-text" id="breatheText">ابدأ</div>
            </div>
            <button class="btn-dopamine" onclick="startBreathing()" style="margin-top: 1rem; padding: 0.5rem 1.5rem; font-size: 1rem;">بدء التمرين</button>
        </div>

        <!-- Section 2: Dopamine & Comfort -->
        <div class="card">
            <h2>جرعة دوبامين</h2>
            <p style="margin-bottom: 1rem; text-align: center; font-size: 0.9rem; color: #ccc;">اضغط هنا لتحصل على جرعة من السعادة والراحة النفسية.</p>
            <button class="btn-dopamine" onclick="generateDopamine()">أريد أن أبتسم</button>
            <div class="message-box" id="messageBox"></div>
        </div>

        <!-- Section 3: Stress Relief Game -->
        <div class="card">
            <h2>فرقعة القلق</h2>
            <p style="margin-bottom: 1rem; text-align: center; font-size: 0.9rem; color: #ccc;">اضغط على فقاعات التوتر لتدميرها وتحويلها إلى طاقة إيجابية.</p>
            <div class="bubble-area" id="bubbleArea" onclick="createBubble(event)"></div>
            <div class="score-board">مستوى الروقان: <span id="score">0</span>%</div>
        </div>
    </div>

    <script>
        // --- 1. Breathing Exercise Logic ---
        let breathingInterval;
        function startBreathing() {
            clearInterval(breathingInterval);
            const circle = document.getElementById('breatheCircle');
            const text = document.getElementById('breatheText');
            
            let phase = 0; // 0: Inhale, 1: Hold, 2: Exhale
            
            const breathe = () => {
                if (phase === 0) {
                    text.innerText = "شهيـــق...";
                    circle.style.transform = "scale(1.5)";
                    circle.style.transition = "transform 4s ease-in-out";
                    setTimeout(() => phase = 1, 4000);
                } else if (phase === 1) {
                    text.innerText = "احتفظ به...";
                    circle.style.transform = "scale(1.5)";
                    setTimeout(() => phase = 2, 2000);
                } else if (phase === 2) {
                    text.innerText = "زفيـــر...";
                    circle.style.transform = "scale(1)";
                    circle.style.transition = "transform 4s ease-in-out";
                    setTimeout(() => phase = 0, 4000);
                }
            };
            
            breathe();
            breathingInterval = setInterval(breathe, 10000); // 4s + 2s + 4s = 10s cycle
        }

        // --- 2. Dopamine Messages Logic ---
        const messages = [
            "أنت شخص رائع جداً، ومجرد وجودك يصنع فارقاً! ✨",
            "خذ نفساً.. ما يقلقك الآن سيكون مجرد ذكرى عابرة غداً. 💛",
            "هل تعلم؟ عقلك الباطن يصدق كل ما تقوله له، قل لنفسك الآن: أنا قوي وسعيد! 🧠",
            "ابتسم! نعم الآن.. الابتسامة تفرز الإندورفين حتى لو كانت مصطنعة في البداية. 😊",
            "كل شيء سيكون على ما يرام، ليس لأن الحياة مثالية، بل لأنك تستطيع التعامل معها. 👑",
            "أنت لست مطالباً بأن تكون مثالياً، أنت مطالب بأن تكون بخير فقط. ☕",
            "تخيل أسوأ شيء ممكن؟ حسناً.. الآن تخيل أنه لن يحدث وأن القادم أجمل بكثير! 🌟",
            "مرة واحد قلقان راح لدكتور نفسي، قاله أنا حاسس إني محدش مهتم بيا.. الدكتور قاله: نعم؟ كنت بتقول حاجة؟ 😂 (اضحك الدنيا ما تسواش!)"
        ];

        function generateDopamine() {
            const msgBox = document.getElementById('messageBox');
            msgBox.style.opacity = 0;
            
            setTimeout(() => {
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                msgBox.innerText = randomMsg;
                msgBox.style.opacity = 1;
            }, 300);
        }

        // --- 3. Pop the Stress Game Logic ---
        let score = 0;
        const bubbleArea = document.getElementById('bubbleArea');
        const scoreSpan = document.getElementById('score');
        const badThoughts = ["توتر", "قلق", "ضغط", "خوف", "حزن", "تفكير مفرط"];

        function spawnRandomBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            const size = Math.random() * 30 + 40; // 40px to 70px
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            
            const x = Math.random() * (bubbleArea.clientWidth - size);
            const y = Math.random() * (bubbleArea.clientHeight - size);
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            
            bubble.innerText = badThoughts[Math.floor(Math.random() * badThoughts.length)];
            
            bubble.onclick = (e) => {
                e.stopPropagation();
                popBubble(bubble);
            };
            
            bubbleArea.appendChild(bubble);
            
            // Remove bubble if not clicked after 3 seconds
            setTimeout(() => {
                if(bubble.parentElement) {
                    bubble.remove();
                }
            }, 3000);
        }

        function popBubble(bubble) {
            // Popping effect
            bubble.style.transform = "scale(1.5)";
            bubble.style.opacity = "0";
            
            // Increment score (Caps at 100%)
            score += 5;
            if(score > 100) score = 100;
            scoreSpan.innerText = score;
            
            setTimeout(() => bubble.remove(), 200);
        }

        // Auto spawn bubbles slowly
        setInterval(() => {
            if(document.querySelectorAll('.bubble').length < 5) {
                spawnRandomBubble();
            }
        }, 1500);

    </script>
</body>
</html>
