<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_FINANCE_OPERATING_SYSTEM_V.1.0.0</title>
    <!-- مكتبة الجرافيك الثقيلة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* CSS_CORE_STRUCTURE - PART 1 */
        body { margin: 0; background: #000; color: #00f0ff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; }
        .system-interface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .data-stream { position: absolute; bottom: 50px; left: 50px; border: 1px solid #00f0ff; padding: 20px; background: rgba(0,20,20,0.9); pointer-events: auto; }
        input, button { background: #000; border: 1px solid #00f0ff; color: #00f0ff; padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="render-core"></canvas>

<div class="system-interface">
    <div class="data-stream" id="main-panel">
        <h2 id="core-balance">SYSTEM_BALANCE: 11700 DZD</h2>
        <input type="text" id="command-input" placeholder="INPUT_COMMAND">
        <button onclick="System.process()">EXECUTE_TRANSACTION</button>
        <div id="log-view" style="margin-top: 10px; height: 100px; overflow-y: scroll;"></div>
    </div>
</div>

<script>
    /* 
     * SYSTEM_CORE_ARCHITECTURE: 
     * نقوم بتعريف كائنات النظام (System Objects) 
     * هذه الميزات الأربع التي طلبتها مدمجة في منطق النظام:
     */
    
    const System = {
        // Feature 1: الميزانية المتقدمة (FinanceEngine)
        balance: 11700,
        history: [],

        // Feature 2: محرك الجرافيك (Shader_Core)
        initGraphics: function() {
            this.scene = new THREE.Scene();
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('render-core'), antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            
            // قمر معقد (Complex Geometry)
            const geometry = new THREE.IcosahedronGeometry(2, 32); 
            const material = new THREE.PointsMaterial({ color: 0x00f0ff, size: 0.005 });
            this.moon = new THREE.Points(geometry, material);
            this.scene.add(this.moon);
            this.camera.position.z = 5;
            this.animate();
        },

        animate: function() {
            requestAnimationFrame(() => this.animate());
            this.moon.rotation.y += 0.002;
            // تفتت الجسيمات ببطء
            this.moon.geometry.verticesNeedUpdate = true;
            this.renderer.render(this.scene, this.camera);
        },

        // Feature 3: معالجة الأوامر (Command_Parser)
        process: function() {
            let input = document.getElementById('command-input').value;
            let val = parseInt(input);
            if(!isNaN(val) && val <= this.balance) {
                this.balance -= val;
                this.history.push({ cmd: input, time: new Date().toLocaleTimeString() });
                this.updateUI();
            }
        },

        // Feature 4: وحدة الإحصائيات والتسجيل (Log_System)
        updateUI: function() {
            document.getElementById('core-balance').innerText = "SYSTEM_BALANCE: " + this.balance + " DZD";
            let log = document.getElementById('log-view');
            log.innerHTML = this.history.map(h => `<p>> ${h.time}: DEDUCTED ${h.cmd}</p>`).join('');
        }
    };

    System.initGraphics();
</script>
</body>
</html>
