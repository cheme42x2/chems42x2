<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحترس 70 مسكن تفترس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&family=Amiri:ital,wght@1,700&display=swap');

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Reem Kufi', sans-serif;
            color: #ff0033;
            user-select: none;
        }

        /* شبكة الكانفاس بدقة 4K */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* تأثير الدماء والخلفية السينمائية */
        .horror-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.95) 90%),
                radial-gradient(circle at 50% 30%, rgba(139, 0, 0, 0.25) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* واجهة الرعب الرئيسية */
        .main-container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(1px);
        }

        /* العنوان الخرافي المهتز */
        h1 {
            font-size: 5rem;
            margin: 0 0 10px 0;
            font-family: 'Amiri', serif;
            color: #ff0033;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #8b0000, 0 10px 20px #000;
            animation: glitch 0.8s infinite alternate, pulse 2s infinite alternate;
            letter-spacing: 3px;
        }

        .sub-title {
            font-size: 1.6rem;
            color: #00ff66;
            text-shadow: 0 0 12px rgba(0, 255, 102, 0.8);
            margin-bottom: 50px;
            letter-spacing: 1px;
            animation: flicker 2.5s infinite;
        }

        /* شبكة أفراد العصابة */
        .gang-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            padding: 10px;
        }

        @media (max-width: 900px) {
            .gang-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 3rem; }
        }

        /* كارت الفرد السفاح */
        .gang-card {
            background: rgba(5, 5, 5, 0.85);
            border: 2px solid #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2), inset 0 0 15px rgba(255, 0, 51, 0.1);
            border-radius: 8px;
            padding: 25px 15px;
            font-size: 2rem;
            color: #ffffff;
            font-family: 'Amiri', serif;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: crosshair;
            position: relative;
            overflow: hidden;
        }

        .gang-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 0, 34, 0.15), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .gang-card:hover::before {
            transform: translateX(100%);
        }

        /* تأثير مرعب جدا عند تحريك الماوس فوق الكارت */
        .gang-card:hover {
            color: #ff0033;
            border-color: #ff0033;
            box-shadow: 0 0 25px #ff0033, inset 0 0 20px #8b0000;
            transform: translateY(-8px) scale(1.05);
            text-shadow: 0 0 10px #ff0000;
        }

        /* قطرات ودماء عشوائية */
        .blood-splat {
            position: absolute;
            background: #660000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: multiply;
            animation: fadeBlood 4s forwards;
        }

        /* تأثيرات الحركة والأنيميشن */
        @keyframes glitch {
            0% { transform: skewX(-2deg); }
            5% { transform: skewX(2deg); }
            10% { transform: skewX(0deg); }
            90% { transform: skewX(0deg); }
            95% { transform: skewX(-3deg); }
            100% { transform: skewX(3deg); }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 15px #ff0033, 0 0 20px #8b0000; }
            100% { text-shadow: 0 0 30px #ff0033, 0 0 50px #ff0000, 0 0 10px #00ff66; }
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; filter: drop-shadow(0 0 8px #00ff66); }
            20%, 24%, 55% { opacity: 0.4; filter: none; }
        }

        @keyframes fadeBlood {
            0% { transform: scale(0); opacity: 0.9; }
            50% { transform: scale(1); opacity: 0.8; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- الكانفاس عالي الدقة للشبكة الخضراء -->
    <canvas id="ultraNetworkCanvas"></canvas>
    
    <!-- طبقة تأثير الدماء الخلفية -->
    <div class="horror-overlay"></div>

    <!-- المحتوى الخرافي -->
    <div class="main-container">
        <h1>إحترس 70 مسكن تفترس</h1>
        <div class="sub-title">☣️ مَجْزَرَةُ العِصَابَةِ السَّوْدَاء.. لاَ مَفَرّ ☣️</div>

        <div class="gang-grid">
            <div class="gang-card">🩸 وَرْش السَفّاح</div>
            <div class="gang-card">🩸 مُنْصِف الجَزّار</div>
            <div class="gang-card">🩸 مُسْلِم المَجْهُول</div>
            <div class="gang-card">🩸 إِيَاد الكَابُوس</div>
            <div class="gang-card">🩸 إِلْيَاس مَأْتَم الدَّم</div>
            <div class="gang-card">🩸 جَاد الصَّيَّاد</div>
            <div class="gang-card">🩸 بَقْبَق المُرْعِب</div>
            <div class="gang-card">🩸 يَعْقُوب لِسَان المَوْت</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ultraNetworkCanvas');
        const ctx = canvas.getContext('2d');

        // ضبط الدقة لتكون متوافقة مع شاشات 4K والأجهزة عالية الكثافة البرمجية
        function resizeCanvas() {
            const scale = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * scale;
            canvas.height = window.innerHeight * scale;
            ctx.scale(scale, scale);
        }
        resizeCanvas();

        const particles = [];
        const maxParticles = 90; // عدد مثالي للشبكة الخضراء العجيبة

        class NetworkParticle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.radius = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 1.2;
                this.speedY = (Math.random() - 0.5) * 1.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > window.innerWidth || this.x < 0) this.speedX = -this.speedX;
                if (this.y > window.innerHeight || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff66';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff66';
                ctx.fill();
                ctx.shadowBlur = 0; // إعادة تعيين حتى لا يبطئ الأداء
            }
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(new NetworkParticle());
        }

        // رسم روابط الشبكة بدقة خرافية
        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 160) {
                        const opacity = 1 - (distance / 160);
                        ctx.strokeStyle = `rgba(0, 255, 102, ${opacity * 0.45})`;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            drawLines();
            requestAnimationFrame(loop);
        }
        loop();

        // تأثير بقع الدماء الفجائية الخرافية بالخلفية
        function spawnBloodSplat() {
            const splat = document.createElement('div');
            splat.classList.add('blood-splat');
            const size = Math.random() * 120 + 40;
            splat.style.width = size + 'px';
            splat.style.height = size + 'px';
            splat.style.left = Math.random() * 100 + 'vw';
            splat.style.top = Math.random() * 100 + 'vh';
            
            // أشكال عشوائية مشوهة للدماء
            splat.style.borderRadius = `${Math.random()*40+20}% ${Math.random()*40+20}% ${Math.random()*40+20}% ${Math.random()*40+20}%`;
            
            document.body.appendChild(splat);
            setTimeout(() => splat.remove(), 4000);
        }
        setInterval(spawnBloodSplat, 800);

        window.addEventListener('resize', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
