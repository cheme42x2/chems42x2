<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أميرتي الغالية ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4a0e17;
            overflow-x: hidden;
            position: relative;
        }

        /* قلوب متساقطة في الخلفية */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: fall linear infinite;
            top: -20px;
            z-index: 0;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 3px rgba(0, 0, 0, 0.05), 0 4px 15px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            margin: 40px auto;
            z-index: 1;
            border: 2px solid #ff758f;
        }

        h1 {
            color: #c9184a;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        p.intro {
            font-size: 1.1rem;
            color: #5c1321;
        }

        /* العداد */
        .counter-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 30px 0;
        }

        .time-segment {
            background: #ff4d6d;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .time-segment span {
            display: block;
            font-size: 1.5rem;
        }

        .time-segment label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* الزر والميساج */
        .btn {
            background-color: #c9184a;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 4px 10px rgba(201, 24, 74, 0.3);
        }

        .btn:hover {
            background-color: #ff124f;
            transform: scale(1.05);
        }

        .secret-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff0f3;
            border-right: 5px solid #ff4d6d;
            border-radius: 5px;
            font-size: 1.1rem;
            line-height: 1.6;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>إلى من ملكت قلبي ❤️</h1>
        <p class="intro">كل ثانية جازت وأنا معاكِ هي أجمل وقت في حياتي. ربي يخليكِ ليا.</p>
        
        <h3 style="color: #ff4d6d; margin-top: 20px;">شحال عنا ملي تلاقينا:</h3>
        <div class="counter-box">
            <div class="time-segment"><span id="days">00</span><label>يوم</label></div>
            <div class="time-segment"><span id="hours">00</span><label>ساعة</label></div>
            <div class="time-segment"><span id="minutes">00</span><label>دقيقة</label></div>
            <div class="time-segment"><span id="seconds">00</span><label>ثانية</label></div>
        </div>

        <button class="btn" onclick="toggleMessage()">اضغطي هنا لرؤية رسالتي ليكِ 💌</button>
        
        <div id="message" class="secret-message">
            يا غالية، حبيت نفرحك بهاد العفسة البسيطة أونلاين باش نقولك بلي علابالي بكل التفاصيل اللي بيناتنا، وبلي كل يوم يزيد حبي ليكِ كتر وكتر. ربي يدومنا لبعضنا وميحرمنيش من ضحكتك. 💕
        </div>
    </div>

    <script>
        // 1. تاريخ بداية علاقتكم (بدل هاد التاريخ بالتاريخ تاعكم: السنة، الشهر ناقص 1، اليوم)
        // مثلاً: 14 أكتوبر 2024 نكتبوها: (2024, 9, 14) لأن الأشهر تبدأ من 0 في البرمجة
        const anniversaryDate = new Date(2025, 4, 10); 

        function updateCounter() {
            const now = new Date();
            const difference = now - anniversaryDate;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours;
            document.getElementById('minutes').innerText = minutes;
            document.getElementById('seconds').innerText = seconds;
        }

        setInterval(updateCounter, 1000);
        updateCounter();

        // إظهار الرسالة السرية
        function toggleMessage() {
            const msg = document.getElementById('message');
            if (msg.style.display === 'block') {
                msg.style.display = 'none';
            } else {
                msg.style.display = 'block';
            }
        }

        // صناعة القلوب المتساقطة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);
    </script>
</body>
</html>
