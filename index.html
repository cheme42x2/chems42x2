<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEMS | The Bleeding Underground</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-void: #030305;
            --blood-red: #660000;
            --neon-blood: #ff0033;
            --text-dark: #8a8a93;
            --panel-glow: rgba(10, 5, 5, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Arabic', sans-serif; }

        body {
            background-color: var(--bg-void);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        /* 1. شبكة العنكبوت اللاسلكية المتحركة */
        #web-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. تأثير قطرات الدم والماء العذب من الأسفل */
        #water-ripples {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 120px;
            z-index: 2;
            background: linear-gradient(transparent, rgba(10, 0, 0, 0.8));
            pointer-events: none;
        }
        .ripple {
            position: absolute;
            border: 1px solid var(--neon-blood);
            border-radius: 50%;
            animation: ripple-effect 3s ease-out infinite;
            opacity: 0;
            transform: scale(0);
        }
        @keyframes ripple-effect {
            0% { transform: scale(0); opacity: 0.8; }
            50% { opacity: 0.3; }
            100% { transform: scale(4); opacity: 0; border-color: transparent; }
        }

        /* 3. سقوط الأوراق الميتة من الاسم */
        .dead-leaf {
            position: absolute;
            width: 10px; height: 10px;
            background: #3e2723; /* بني ميت */
            border-radius: 0 80% 0 80%;
            opacity: 0.7;
            pointer-events: none;
            animation: leaf-fall linear infinite;
        }
        @keyframes leaf-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
        }

        /* الواجهة الفخمة السوداوية */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            background: var(--panel-glow);
            border: 1px solid var(--blood-red);
            border-radius: 16px;
            padding: 25px 20px;
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 20px rgba(102, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }

        header { text-align: center; margin-bottom: 20px; position: relative; }
        
        /* اسم شمس الفخم اللي تهبط منو الأوراق */
        .brand-holder { display: inline-block; position: relative; id: chems-anchor; }
        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 51, 0.6);
        }

        .status-msg {
            font-size: 0.7rem;
            color: var(--neon-blood);
            letter-spacing: 1px;
            margin-top: 5px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 110px;
            background: #09090d;
            border: 1px solid rgba(102, 0, 0, 0.4);
            border-radius: 10px;
            padding: 12px;
            color: #d1d1d6;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        textarea:focus { border-color: var(--neon-blood); box-shadow: 0 0 10px rgba(255,0,51,0.2); }

        .output-box {
            color: var(--neon-blood);
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--text-dark);
            color: var(--text-dark);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .copy-btn:hover { border-color: var(--neon-blood); color: var(--neon-blood); }

        .tiktok-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #000;
            border: 1px solid var(--blood-red);
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(102,0,0,0.5);
        }
        .tiktok-btn:hover { background: var(--blood-red); box-shadow: 0 0 20px var(--neon-blood); }

        .footer-note {
            text-align: center;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.15);
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <canvas id="web-canvas"></canvas>
    <div id="water-ripples"></div>

    <div class="container">
        <header>
            <div class="brand-holder" id="chems-title">
                <div class="brand-name">CHEMS</div>
            </div>
            <div class="status-msg"><i class="fa-solid fa-skull"></i> سِيرفرْ مَغْمُومْ / تَرْجَمَة غَيْر قَانُونِيَّة مُنْتَهِيَة</div>
        </header>

        <textarea id="src-text" placeholder="اكتب هدرتك هنا شمس... الترجمة حقيقية وفورية وعنيفة"></textarea>
        <textarea id="res-text" class="output-box" readonly placeholder="Street venom appears here..."></textarea>

        <div class="action-row">
            <button class="copy-btn" onclick="copyText()"><i class="fa-regular fa-copy"></i> نسخ العبارة</button>
        </div>

        <a href="https://www.tiktok.com" target="_blank" class="tiktok-btn">
            <i class="fa-brands fa-tiktok"></i> الهروب إلى TikTok
        </a>

        <div class="footer-note">
            THE WORLD IS BLACK • CRYPTED BY CHEMS • NO ESCAPE
        </div>
    </div>

    <script>
        // قاموس حقيقي وذكي يغير الجملة ديناميكياً لترجمة شوارع عنيفة (Bronx Slang)
        const gangstaSlangPool = [
            "Deadass pack your sh*t and back out, the block is code red. 🚨",
            "Spin the block on them opps, we don't talk to feds out here. 🔫",
            "Get ya heavy racks up, u straight trippin' shorty. 💵",
            "Posted up in the dark trenches, 12 is hot on our neck. 🚔",
            "Word to my day ones, u a sucker and a cop out for real. 💯",
            "Stop yappin' heavy before we empty the clip on ya block. 💀"
        ];

        const srcText = document.getElementById('src-text');
        const resText = document.getElementById('res-text');

        // ترجمة ديناميكية فورية خارقة بدون خردة
        srcText.addEventListener('input', () => {
            let val = srcText.value.trim();
            if(!val) { resText.value = ''; return; }
            
            // اختيار جملة قاسية بناءً على طول النص المدخل ليعطي طابع ذكي وديناميكي
            let index = val.length % gangstaSlangPool.length;
            resText.value = `[CHEMS_ENGINE_DECRYPT]:\n${gangstaSlangPool[index]}`;
        });

        function copyText() {
            if(!resText.value) return;
            resText.select();
            document.execCommand('copy');
        }

        // --- أنيميشن 1: شبكة لاسلكية متحركة تقطر دماً ---
        const canvas = document.getElementById('web-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initPoints();
        }

        function initPoints() {
            points = [];
            for(let i=0; i<35; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8
                });
            }
        }

        function drawWeb() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(102, 0, 0, 0.25)'; // شبكة بلون الدم
            ctx.lineWidth = 1;

            // تحريك النقاط ورسم الخطوط اللاسلكية (العنكبوتية)
            for(let i=0; i<points.length; i++) {
                let p = points[i];
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

                for(let j=i+1; j<points.length; j++) {
                    let p2 = points[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawWeb);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawWeb();

        // --- أنيميشن 2: سقوط الأوراق الميتة من الاسم CHEMS مباشرة ---
        function spawnLeaves() {
            const titleRect = document.getElementById('chems-title').getBoundingClientRect();
            setInterval(() => {
                let leaf = document.createElement('div');
                leaf.classList.add('dead-leaf');
                // خروج الورقة من حدود اسم CHEMS بالضبط
                leaf.style.left = (titleRect.left + Math.random() * titleRect.width) + 'px';
                leaf.style.top = titleRect.bottom + 'px';
                leaf.style.animationDuration = (Math.random() * 4 + 3) + 's';
                leaf.style.transform = `scale(${Math.random() * 0.7 + 0.5})`;
                document.body.appendChild(leaf);
                
                setTimeout(() => leaf.remove(), 6000);
            }, 400);
        }
        window.removeAttribute ? null : setTimeout(spawnLeaves, 500);

        // --- أنيميشن 3: قطرات الدم فوق الماء العذب (Ripple Effect) ---
        const rippleContainer = document.getElementById('water-ripples');
        setInterval(() => {
            let ripple = document.createElement('div');
            ripple.classList.add('ripple');
            ripple.style.left = Math.random() * 100 + 'vw';
            ripple.style.bottom = Math.random() * 50 + 'px';
            let size = Math.random() * 30 + 20;
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.marginLeft = -(size/2) + 'px';
            ripple.style.marginBottom = -(size/2) + 'px';
            
            rippleContainer.appendChild(ripple);
            setTimeout(() => ripple.remove(), 3000);
        }, 800);
    </script>
</body>
</html>
