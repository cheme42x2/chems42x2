<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحترس 70 مسكن تفترس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@1,700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Amiri', serif;
            color: #ff0033;
            user-select: none;
        }

        /* شبكة الكانفاس الخضراء */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* تأثير الدماء الخلفية */
        .blood-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139,0,0,0.15) 0%, rgba(0,0,0,0.9) 80%);
            z-index: 2;
            pointer-events: none;
        }

        /* الحاوية الرئيسية للرعب */
        .horror-container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #800000;
        }

        /* العنوان الرئيسي المرعب */
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #ff0033;
            animation: glitch 1s linear infinite, bloodDrip 3s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        p.warning {
            font-size: 1.5rem;
            color: #00ff66;
            text-shadow: 0 0 8px #00ff33;
            margin-bottom: 40px;
            animation: flicker 2s infinite;
        }

        /* قائمة أفراد العصابة */
        .gang-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
        }

        .gang-member {
            font-size: 2.2rem;
            color: #e6e6e6;
            padding: 10px 20px;
            border: 1px solid rgba(255, 0, 51, 0.3);
            background: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .gang-member:nth-child(odd) {
            animation-delay: 1s;
        }

        .gang-member:hover {
            color: #ff0033;
            border-color: #ff0033;
            box-shadow: 0 0 15px #ff0033;
            transform: scale(1.1) rotate(-2deg);
            text-shadow: 0 0 10px #ff0000;
        }

        /* أنيميشن الرعب والغليتش */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @keyframes bloodDrip {
            0% { text-shadow: 0 0 10px #ff0033, 0 5px 5px #8b0000; }
            100% { text-shadow: 0 0 20px #ff0033, 0 15px 25px #8b0000, 0 20px 40px #5c0000; }
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* قطرات دماء وهمية نازلة */
        .blood-drop {
            position: absolute;
            background: #8b0000;
            width: 3px;
            opacity: 0.7;
            border-radius: 0 0 5px 5px;
            animation: drop 2s linear infinite;
            z-index: 2;
        }

        @keyframes drop {
            0% { top: -10%; height: 0px; }
            50% { height: 50px; }
            100% { top: 110%; height: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="networkCanvas"></canvas>
    
    <div class="blood-overlay"></div>

    <div class="horror-container">
        <h1>إحترس 70 مسكن تفترس</h1>
        <p class="warning">⚠️ الدخول إلى منطقة الموت.. أفراد السفاحين في انتظارك ⚠️</p>

        <div class="gang-list">
            <div class="gang-member">🩸 ورش السفاح</div>
            <div class="gang-member">🩸 منصف الجزار</div>
            <div class="gang-member">🩸 مسلم المجهول</div>
            <div class="gang-member">🩸 اياد الكابوس</div>
            <div class="gang-member">🩸 الياس غسيل الدم</div>
            <div class="gang-member">🩸 جاد الصياد</div>
            <div class="gang-member">🩸 بقبق المرعب</div>
            <div class="gang-member">🩸 يعقوب لسان الموت</div>
        </div>
    </div>

    <script>
        // كود بناء الشبكة الخضراء العجيبة (تتفاعل مع الماوس)
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const count = 75; // عدد النقاط في الشبكة

        const mouse = {
            x: null,
            y: null,
            radius: 150
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // الارتداد عن الحواف
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = '#00ff66'; // لون النقطة أخضر مشع مثل الصورة
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < count; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = `rgba(0, 255, 102, ${opacityValue})`; // خيوط الشبكة الخضراء
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        // صناعة قطرات دماء عشوائية تسقط
        function createBlood() {
            const drop = document.createElement('div');
            drop.classList.add('blood-drop');
            drop.style.left = Math.random() * 100 + "vw";
            drop.style.animationDuration = Math.random() * 2 + 2 + "s";
            document.body.appendChild(drop);
            setTimeout(() => { drop.remove(); }, 4000);
        }
        setInterval(createBlood, 300);

        init();
        animate();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
