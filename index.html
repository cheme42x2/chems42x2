<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID FINANCIAL SYSTEM</title>
    <style>
        :root { --accent: #00f0ff; } /* Default Blue */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Space Mono', monospace; color: white; }
        canvas { display: block; }
        
        /* UI HUD Overlay */
        .hud { position: absolute; top: 50px; left: 50px; z-index: 10; pointer-events: none; }
        .balance { font-size: 5rem; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
        
        .controls { position: absolute; bottom: 50px; right: 50px; z-index: 10; background: rgba(0,0,0,0.6); padding: 20px; border: 1px solid var(--accent); }
        input, button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px; margin: 5px; }
        
        .theme-switcher { position: absolute; top: 20px; right: 20px; z-index: 10; }
        .color-btn { width: 20px; height: 20px; cursor: pointer; border-radius: 50%; border: none; }
    </style>
</head>
<body>

<div class="theme-switcher">
    <button class="color-btn" style="background:#00f0ff" onclick="setTheme('#00f0ff')"></button>
    <button class="color-btn" style="background:#ff0055" onclick="setTheme('#ff0055')"></button>
    <button class="color-btn" style="background:#00ff66" onclick="setTheme('#00ff66')"></button>
</div>

<div class="hud">
    <div style="font-size: 1rem; letter-spacing: 5px;">AVAILABLE LIQUIDITY</div>
    <div class="balance" id="bal">11700</div>
</div>

<div class="controls">
    <input type="text" id="item" placeholder="TARGET...">
    <input type="number" id="amt" placeholder="VAL...">
    <button onclick="deduct()">EXECUTE</button>
</div>

<!-- Three.js Library -->
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

    // 1. SCENE SETUP
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. SHATTERING MOON PARTICLES
    const particles = new THREE.BufferGeometry();
    const count = 5000;
    const pos = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 10;
    particles.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const material = new THREE.PointsMaterial({ size: 0.02, color: 0x00f0ff });
    const moon = new THREE.Points(particles, material);
    scene.add(moon);

    camera.position.z = 5;

    // 3. ANIMATION
    function animate() {
        requestAnimationFrame(animate);
        moon.rotation.y += 0.002;
        moon.rotation.x += 0.001;
        renderer.render(scene, camera);
    }
    animate();

    // 4. LOGIC
    window.setTheme = (color) => {
        document.documentElement.style.setProperty('--accent', color);
        material.color.set(color);
    };

    window.deduct = () => {
        let b = document.getElementById('bal');
        let val = parseInt(document.getElementById('amt').value);
        if(val) b.innerText = parseInt(b.innerText) - val;
    };
</script>
</body>
</html>
