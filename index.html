<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزل Chems الرقمي - خاص بـ ريري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0512;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* خلفية ضبابية ساحرة ثلاثية الأبعاد ثابتة ومتوهجة */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.15) 0%, rgba(75, 0, 130, 0.4) 50%, #05020a 100%);
            z-index: 0;
            animation: bgRotate 15s infinite linear;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* حاوية القلوب والنجوم المتساقطة */
        .magic-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heart-particle {
            position: absolute;
            font-size: 1.5rem;
            will-change: transform, top;
            filter: drop-shadow(0 0 8px rgba(255, 20, 147, 0.8));
        }

        /* بطاقة الترحيب الفخمة والثابتة */
        .luxury-card {
            background: linear-gradient(135deg, rgba(20, 10, 35, 0.85) 0%, rgba(10, 5, 20, 0.95) 100%);
            border: 2px solid #ff1493;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.4), inset 0 0 20px rgba(255, 20, 147, 0.2);
            border-radius: 20px;
            padding: 45px 30px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            z-index: 2;
            backdrop-filter: blur(20px);
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        .luxury-card:hover {
            transform: translateY(-5px) rotateY(2deg);
            box-shadow: 0 0 60px rgba(255, 20, 147, 0.7);
        }

        .avatar-area {
            font-size: 4.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s infinite ease-in-out, glow 2s infinite alternate;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 10px #ff1493); }
            100% { filter: drop-shadow(0 0 25px #ff69b4); }
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
            margin-bottom: 15px;
            font-weight: bold;
        }

        h1 span {
            color: #ff1493;
        }

        p {
            color: #e0d5ea;
            font-size: 1.15rem;
            margin-bottom: 35px;
            line-height: 1.8;
            font-weight: 500;
        }

        /* زر المفاجأة الأسطوري */
        .magic-btn {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.5);
            transition: all 0.3s ease;
            width: 80%;
            display: inline-block;
        }

        .magic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff1493;
            letter-spacing: 1px;
        }

        /* شاشة المفاجأة السعيدة الثابتة */
        #surpriseScreen {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }
