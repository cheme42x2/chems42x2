<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP UNBAN - ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* خلفية الأكواد الذهبية المتحركة */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid var(--gold);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px var(--gold-glow), inset 0 0 20px rgba(255,255,255,0.1);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 50px var(--gold-glow); transform: scale(1); }
            50% { box-shadow: 0 0 70px var(--gold-glow); transform: scale(1.02); }
        }

        h1 {
            color: var(--gold);
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--gold);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: linear-gradient(45deg, #111, #222);
            border: 1px solid var(--gold);
            color: #fff;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold);
        }

        .footer-text {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            color: var(--gold);
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-card">
        <h1>VIP UNBAN</h1>
        <p class="subtitle">نظام الاسترداد السحابي الخارق</p>
        
        <div class="btn" onclick="alert('جاري حقن الكود...')">استرداد وفك حظر الحساب</div>
        <div class="btn" onclick="alert('جاري حقن الكود...')">فك قيود البث المباشر (LIVE)</div>
    </div>

    <div class="footer-text">نظام حماية مشفر 256-بت | بروتوكول VIP لوحة تحكم مطورة © 2026</div>

    <!-- إضافة مكتبة particles.js لإضافة لمسة الفن والاحترافية -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {"value": 80},
                "color": {"value": "#FFD700"},
                "shape": {"type": "circle"},
                "opacity": {"value": 0.5},
                "size": {"value": 3},
                "move": {"enable": true, "speed": 2}
            }
        });
    </script>
</body>
</html>
