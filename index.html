<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اللحظة والأنشطة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .clock-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
            min-width: 300px;
        }

        #date {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        #clock {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            font-family: monospace;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-poop {
            background-color: #8B4513;
            color: white;
        }

        .btn-poop:hover {
            background-color: #A0522D;
        }

        .btn-alert {
            background-color: #e74c3c;
            color: white;
        }

        .btn-alert:hover {
            background-color: #c0392b;
        }

        /* أنميشن حبات البراز لي تهبط */
        .poop-drop {
            position: absolute;
            font-size: 30px;
            top: -50px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(115vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- حاوية الوقت والتاريخ -->
    <div class="clock-container">
        <div id="date">جاري تحميل اليوم...</div>
        <div id="clock">00:00:00</div>
    </div>

    <!-- حاوية الأزرار -->
    <div class="buttons-container">
        <button class="btn-poop" onclick="dropPoop()">إخراج براز 💩</button>
        <button class="btn-alert" onclick="showAlert()">التبول وإخراج الخرية ⚠️</button>
    </div>

    <script>
        // دالة تحديث الوقت والتاريخ لايف
        function updateClock() {
            const now = new Date();
            
            // خيارات عرض التاريخ باللغة العربية
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('ar-DZ', options);
            
            // فورمات الوقت بالثواني
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;

            document.getElementById('date').textContent = dateString;
            document.getElementById('clock').textContent = timeString;
        }

        // تحديث الساعة كل ثانية
        setInterval(updateClock, 1000);
        updateClock(); // تشغيل أولي فوراً

        // دالة إنزال حبات البراز
        function dropPoop() {
            // نديرو 10 حبات يهبطو كي تضغظ
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const poop = document.createElement('div');
                    poop.innerText = '💩';
                    poop.classList.add('poop-drop');
                    
                    // تحديد مكان عشوائي وسرعة عشوائية للهبوط
                    poop.style.left = Math.random() * 100 + 'vw';
                    poop.style.animationDuration = (Math.random() * 2 + 2) + 's'; // بين 2 و 4 ثواني
                    
                    document.body.appendChild(poop);

                    // حذف العنصر بعد ما يكمل الأنميشن باش ما يثقلش الصفحة
                    setTimeout(() => {
                        poop.remove();
                    }, 4000);
                }, i * 150); // تأخير خفيف بين الحبة والأخرى
            }
        }

        // دالة الإنذار للمدير
        function showAlert() {
            alert("⚠️ تنبيه هام:\nيلزم تسقسي او تستاشير المدير احمد شريف شطراح قبل القيام بهذا الفعل!");
        }
    </script>
</body>
</html>
