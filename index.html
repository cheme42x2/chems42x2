<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Auto-Translate Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية للأصدقاء */
        .sidebar {
            width: 30%;
            background-color: #111827;
            border-left: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #1f2937;
            color: #ec4899;
            text-align: center;
        }

        .user-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1f2937;
            transition: background 0.3s;
        }

        .user-item:hover, .user-item.active {
            background-color: #1f2937;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-radius: 50%;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user-info .username {
            font-weight: 600;
            display: block;
        }

        .user-info .insta-tag {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        /* منطقة المحادثة والترجمة */
        .chat-area {
            width: 70%;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
        }

        .chat-header {
            padding: 20px;
            background-color: #111827;
            border-bottom: 1px solid #1f2937;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #6b7280;
        }

        /* واجهة الإدخال والترجمة الذكية */
        .input-panel {
            background-color: #111827;
            padding: 20px;
            border-top: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .translation-boxes {
            display: flex;
            gap: 15px;
        }

        .box-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .box-wrapper label {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        textarea {
            width: 100%;
            height: 80px;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px;
            color: white;
            resize: none;
            font-size: 1rem;
            outline: none;
        }

        textarea:focus {
            border-color: #3b82f6;
        }

        .output-text {
            background-color: #111827;
            border: 1px solid #374151;
            color: #10b981;
            direction: ltr;
            text-align: left;
        }

        .send-btn {
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .status-msg {
            font-size: 0.85rem;
            text-align: center;
            color: #eab308;
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية: الأصدقاء -->
    <div class="sidebar">
        <div class="sidebar-header">📥 قائمة أصدقاء أمريكا</div>
        <ul class="user-list">
            <li class="user-item active" onclick="selectUser('Jessica', 'jessica_usa')">
                <div class="user-avatar">J</div>
                <div class="user-info">
                    <span class="username">Jessica</span>
                    <span class="insta-tag">@jessica_usa</span>
                </div>
            </li>
            <li class="user-item" onclick="selectUser('Alex', 'alex_nyc')">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <span class="username">Alex</span>
                    <span class="insta-tag">@alex_nyc</span>
                </div>
            </li>
            <li class="user-item" onclick="selectUser('Emily', 'emily_smith')">
                <div class="user-avatar">E</div>
                <div class="user-info">
                    <span class="username">Emily</span>
                    <span class="insta-tag">@emily_smith</span>
                </div>
            </li>
        </ul>
    </div>

    <!-- منطقة العمل والترجمة -->
    <div class="chat-area">
        <div class="chat-header">المحادثة الحالية مع: <span id="current-chat-name" style="color: #ec4899;">Jessica</span></div>
        
        <div class="chat-messages">
            <p>اكتب رسالتك بالعربية في الأسفل، وسيتم ترجمتها فوراً وفتح إنستغرام لإرسالها.</p>
        </div>

        <div class="input-panel">
            <div class="translation-boxes">
                <!-- صندوق الكتابة بالعربية -->
                <div class="box-wrapper">
                    <label>اكتب بالعربية:</label>
                    <textarea id="arabic-input" placeholder="اكتب هنا مثلاً: أهلاً، كيف حالك اليوم؟" oninput="startTranslation()"></textarea>
                </div>
                
                <!-- صندوق المعاينة بالإنجليزية -->
                <div class="box-wrapper">
                    <label>الترجمة الفورية (English):</label>
                    <textarea id="english-output" class="output-text" readonly placeholder="Translation will appear here..."></textarea>
                </div>
            </div>

            <div id="status" class="status-msg"></div>

            <!-- زر النسخ والفتح التلقائي في إنستغرام -->
            <button class="send-btn" onclick="sendToInstagram()">
                <span>ترجم وافتح إنستغرام لإرسالها 🚀</span>
            </button>
        </div>
    </div>

    <!-- كود الـ JavaScript للترجمة والربط والتفاعلات -->
    <script>
        let selectedInstagramUser = "jessica_usa";
        let typingTimer;
        const doneTypingInterval = 500; // الانتظار لنصف ثانية بعد التوقف عن الكتابة للترجمة لعدم إرهاق السيرفر

        // تغيير الشخص المراد مراسلته
        function selectUser(name, username) {
            document.getElementById('current-chat-name').innerText = name;
            selectedInstagramUser = username;
            
            // تغيير التأثير البصري في القائمة
            document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // بدء مؤقت الترجمة عند الكتابة
        function startTranslation() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(translateText, doneTypingInterval);
        }

        // كود الاتصال بمحرك الترجمة التلقائي المجاني
        async function translateText() {
            const arabicText = document.getElementById('arabic-input').value;
            const outputBox = document.getElementById('english-output');
            
            if (!arabicText.trim()) {
                outputBox.value = "";
                return;
            }

            document.getElementById('status').innerText = "جاري الترجمة الفورية...";

            try {
                // استخدام سيرفر ترجمة مفتوح وسريع جداً وبدون مفاتيح تعقيد
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q=${encodeURIComponent(arabicText)}`);
                const data = await res.json();
                
                // تجميع النص المترجم وضعه في الصندوق الإنجليزي
                let translatedText = "";
                data[0].forEach(sentence => {
                    if(sentence[0]) translatedText += sentence[0];
                });

                outputBox.value = translatedText;
                document.getElementById('status').innerText = "✨ تمت الترجمة بنجاح وجاهزة للإرسال!";
            } catch (error) {
                document.getElementById('status').innerText = "⚠️ عذراً، حدث خطأ في الاتصال بالترجمة الفورية.";
                console.error(error);
            }
        }

        // كود الفتح التلقائي في إنستغرام والنسخ
        function sendToInstagram() {
            const englishText = document.getElementById('english-output').value;

            if (!englishText.trim()) {
                alert("الرجاء كتابة رسالة أولاً ليتم ترجمتها!");
                return;
            }

            // 1. نسخ النص الإنجليزي تلقائياً لحافظة الهاتف لتقوم بلصقه فوراً
            navigator.clipboard.writeText(englishText).then(() => {
                document.getElementById('status').innerText = "📋 تم نسخ النص الإنجليزي تلقائياً! جاري فتح الحساب...";
                
                // 2. فتح رابط محادثة الشخص مباشرة في تطبيق إنستغرام
                setTimeout(() => {
                    window.open(`https://instagram.com/_u/${selectedInstagramUser}`, '_blank');
                }, 800);
            }).catch(err => {
                // احتياطياً لو لم يمنح المتصفح إذن النسخ
                window.open(`https://instagram.com/_u/${selectedInstagramUser}`, '_blank');
            });
        }
    </script>
</body>
</html>
