<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JadouOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --deep:#050914;
    --blue1:#0B3D91;
    --blue2:#2979FF;
    --cyan:#4FD8FF;
    --violet:#7B5CFF;
    --text:#FFFFFF;
    --dim:#8A94A6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  canvas#network{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.55;
  }

  .app{
    position:relative;
    z-index:2;
    max-width:640px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:36px 18px 18px;
  }

  /* orb */
  .orb-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .orb{
    position:relative;
    width:150px;
    height:150px;
    border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.9), transparent 22%),
      radial-gradient(circle at 65% 70%, var(--cyan), transparent 55%),
      radial-gradient(circle at 40% 60%, var(--blue2), transparent 60%),
      radial-gradient(circle at 60% 30%, var(--violet), transparent 55%),
      radial-gradient(circle at 50% 50%, var(--blue1), #01050f 75%);
    box-shadow:
      0 0 40px rgba(41,121,255,0.55),
      0 0 90px rgba(79,216,255,0.35),
      inset 0 0 40px rgba(0,0,0,0.5);
    animation:orbit 9s ease-in-out infinite, spin 22s linear infinite;
  }
  .orb::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, transparent, rgba(255,255,255,0.25), transparent 30%);
    animation:spin 6s linear infinite;
    mix-blend-mode:screen;
  }
  .orb-letter{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:64px;
    color:#fff;
    text-shadow:0 2px 18px rgba(0,0,0,0.5);
    z-index:2;
  }
  .orb.thinking{
    animation:orbit 9s ease-in-out infinite, spin 4s linear infinite, thinkGlow 1.1s ease-in-out infinite;
  }
  @keyframes thinkGlow{
    0%,100%{ box-shadow:0 0 40px rgba(41,121,255,0.55), 0 0 90px rgba(79,216,255,0.35), inset 0 0 40px rgba(0,0,0,0.5); }
    50%{ box-shadow:0 0 70px rgba(79,216,255,0.9), 0 0 130px rgba(79,216,255,0.55), inset 0 0 40px rgba(0,0,0,0.5); }
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes orbit{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-8px) scale(1.02); }
  }
  @media (prefers-reduced-motion: reduce){
    .orb, .orb::before{ animation:none; }
  }

  .wordmark{
    text-align:center;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:38px;
    letter-spacing:0.5px;
    margin-top:10px;
  }
  .wordmark .dot{ color:var(--cyan); }
  .tagline{
    text-align:center;
    color:var(--dim);
    font-size:13px;
    margin-top:6px;
    margin-bottom:22px;
    letter-spacing:0.5px;
  }

  /* chat card */
  .card{
    flex:1;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg, rgba(11,20,40,0.55), rgba(0,0,0,0.55));
    border:1px solid rgba(79,216,255,0.18);
    border-radius:24px;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    overflow:hidden;
    box-shadow:0 0 40px rgba(41,121,255,0.12), 0 20px 60px rgba(0,0,0,0.5);
    animation:cardIn 0.6s cubic-bezier(.2,.8,.2,1) both, glowPulse 4s ease-in-out infinite;
  }
  @keyframes cardIn{
    from{ opacity:0; transform:translateY(24px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes glowPulse{
    0%,100%{ box-shadow:0 0 40px rgba(41,121,255,0.12), 0 20px 60px rgba(0,0,0,0.5); }
    50%{ box-shadow:0 0 60px rgba(79,216,255,0.22), 0 20px 60px rgba(0,0,0,0.5); }
  }

  .messages{
    flex:1;
    min-height:280px;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:rgba(79,216,255,0.25); border-radius:10px;}

  .msg{
    max-width:80%;
    padding:12px 16px;
    border-radius:16px;
    font-size:15px;
    line-height:1.65;
    animation:pop 0.25s ease;
    white-space:pre-wrap;
  }
  @keyframes pop{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .msg.user{
    align-self:flex-start;
    background:linear-gradient(135deg, var(--violet), #4B2FCC);
    border-bottom-left-radius:5px;
    color:#fff;
  }
  .msg.bot{
    align-self:flex-end;
    background:rgba(41,121,255,0.1);
    border:1px solid rgba(79,216,255,0.2);
    border-bottom-right-radius:5px;
  }
  .msg.bot .name-tag{
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--cyan);
    margin-bottom:4px;
    letter-spacing:0.4px;
  }

  .typing{
    align-self:flex-end;
    display:flex;
    gap:5px;
    padding:14px 18px;
    background:rgba(41,121,255,0.1);
    border:1px solid rgba(79,216,255,0.2);
    border-radius:16px;
    border-bottom-right-radius:5px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--cyan);
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

  .suggestions{
    display:flex;
    gap:8px;
    padding:0 16px 12px;
    overflow-x:auto;
  }
  .chip{
    white-space:nowrap;
    background:rgba(79,216,255,0.08);
    border:1px solid rgba(79,216,255,0.25);
    color:var(--text);
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:transform 0.15s, background 0.15s;
  }
  .chip:hover{background:rgba(79,216,255,0.18); transform:translateY(-2px);}

  .input-row{
    display:flex;
    gap:10px;
    padding:14px;
    border-top:1px solid rgba(79,216,255,0.15);
  }
  .input-row input{
    flex:1;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(79,216,255,0.22);
    border-radius:14px;
    padding:13px 16px;
    color:var(--text);
    font-size:15px;
    font-family:'Tajawal', sans-serif;
    outline:none;
  }
  .input-row input::placeholder{color:var(--dim);}
  .input-row input:focus{border-color:var(--cyan);}

  .send-btn{
    width:48px; height:48px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg, var(--cyan), var(--blue2));
    color:#000;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s;
    flex-shrink:0;
    box-shadow:0 0 20px rgba(79,216,255,0.4);
  }
  .send-btn:hover{transform:scale(1.06);}
  .send-btn:disabled{opacity:0.4; cursor:default; transform:none;}

  /* onboarding modal */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
    padding:20px;
  }
  .modal{
    background:linear-gradient(180deg, #0A1226, #000);
    border:1px solid rgba(79,216,255,0.25);
    border-radius:22px;
    padding:34px 26px;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:0 0 60px rgba(41,121,255,0.25);
  }
  .modal .mini-orb{
    width:70px; height:70px;
    border-radius:50%;
    margin:0 auto 16px;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.9), transparent 22%),
      radial-gradient(circle at 65% 70%, var(--cyan), transparent 55%),
      radial-gradient(circle at 50% 50%, var(--blue1), #01050f 75%);
    box-shadow:0 0 30px rgba(41,121,255,0.5);
    animation:spin 8s linear infinite;
  }
  .modal h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px;
    margin-bottom:8px;
  }
  .modal p{color:var(--dim); font-size:14px; margin-bottom:20px;}
  .modal input{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(79,216,255,0.25);
    border-radius:12px;
    padding:13px 16px;
    color:var(--text);
    font-size:15px;
    font-family:'Tajawal', sans-serif;
    outline:none;
    margin-bottom:14px;
    text-align:center;
  }
  .modal input:focus{border-color:var(--cyan);}
  .modal button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--cyan), var(--blue2));
    color:#000;
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:transform 0.15s;
    box-shadow:0 0 25px rgba(79,216,255,0.4);
  }
  .modal button:hover{transform:translateY(-2px);}

  @media (max-width:480px){
    .wordmark{font-size:30px;}
    .orb{width:120px; height:120px;}
    .orb-letter{font-size:52px;}
  }
</style>
</head>
<body>

<canvas id="network"></canvas>

<div class="app">
  <div class="orb-wrap">
    <div class="orb"><div class="orb-letter">J</div></div>
  </div>
  <div class="wordmark">Jadou<span class="dot">O</span>S</div>
  <div class="tagline" id="tagline">المساعد الذكي ديالك</div>

  <div class="card">
    <div class="messages" id="messages"></div>
    <div class="suggestions" id="suggestions">
      <div class="chip" data-msg="عطيني نصيحة سريعة باش نبدا يومي بحال ما خاص">نصيحة لليوم</div>
      <div class="chip" data-msg="عاوني نظم روتين يومي بسيط">نظم ليا روتيني</div>
      <div class="chip" data-msg="عندي مشكل وبغيت رأيك">بغيت رأيك</div>
      <div class="chip" data-msg="قوليا نكتة باش نضحك شوية">فرجيني شوية 😄</div>
    </div>
    <div class="input-row">
      <input type="text" id="userInput" placeholder="كتب رسالتك هنا..." autocomplete="off">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="onboarding">
  <div class="modal">
    <div class="mini-orb"></div>
    <h2>مرحبا بيك فـ JadouOS</h2>
    <p>كتب اسمك باش نخصص ليك التجربة</p>
    <input type="text" id="nameInput" placeholder="مثلا: ياسين، سارة...">
    <button id="startBtn">دخول ⚡</button>
  </div>
</div>

<script>
/* ---------- animated network background ---------- */
const canvas = document.getElementById('network');
const ctx = canvas.getContext('2d');
let W, H, particles;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const PARTICLE_COUNT = Math.min(90, Math.floor((window.innerWidth*window.innerHeight)/16000));
function initParticles(){
  particles = Array.from({length: PARTICLE_COUNT}, () => ({
    x: Math.random()*W,
    y: Math.random()*H,
    vx: (Math.random()-0.5)*0.35,
    vy: (Math.random()-0.5)*0.35
  }));
}
initParticles();

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function drawNetwork(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = 'rgba(79,216,255,0.8)';
  for(const p of particles){
    if(!reduceMotion){
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0 || p.x > W) p.vx *= -1;
      if(p.y < 0 || p.y > H) p.vy *= -1;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2);
    ctx.fill();
  }
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const a = particles[i], b = particles[j];
      const dx = a.x-b.x, dy = a.y-b.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 130){
        ctx.strokeStyle = `rgba(41,121,255,${(1 - dist/130)*0.5})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(drawNetwork);
}
drawNetwork();

/* ---------- chat logic ---------- */
let userName = "صاحبي";
let history = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const onboarding = document.getElementById('onboarding');
const nameInput = document.getElementById('nameInput');
const startBtn = document.getElementById('startBtn');
const tagline = document.getElementById('tagline');
const suggestions = document.getElementById('suggestions');

async function init(){
  try{
    const stored = await window.storage.get('jadouos-username', false);
    if(stored && stored.value){
      userName = stored.value;
      onboarding.style.display = 'none';
      greet();
    } else {
      onboarding.style.display = 'flex';
    }
  } catch(e){
    onboarding.style.display = 'flex';
  }
}

startBtn.addEventListener('click', async ()=>{
  const val = nameInput.value.trim();
  if(!val){ nameInput.focus(); return; }
  userName = val;
  try{
    await window.storage.set('jadouos-username', userName, false);
  } catch(e){ /* proceed even if storage fails */ }
  onboarding.style.display = 'none';
  greet();
});

nameInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') startBtn.click();
});

function greet(){
  tagline.textContent = 'أهلا ' + userName + '، أنا معاك دابا';
  addMessage('bot', `مرحبا ${userName} ⚡ أنا JadouOS، قوليا شنو خصك ونعاونك فيه بسرعة وسلاسة.`);
}

function addMessage(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if(role === 'bot'){
    div.innerHTML = `<span class="name-tag">JadouOS</span>` + escapeHtml(text);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showTyping(){
  const orbEl = document.querySelector('.orb');
  if(orbEl) orbEl.classList.add('thinking');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){
  const orbEl = document.querySelector('.orb');
  if(orbEl) orbEl.classList.remove('thinking');
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

async function sendMessage(text){
  if(!text || !text.trim()) return;
  addMessage('user', text);
  history.push({role:'user', content:text});
  inputEl.value = '';
  sendBtn.disabled = true;
  suggestions.style.display = 'none';
  showTyping();

  try{
    const systemPrompt = `أنت مساعد ذكاء اصطناعي اسمك "JadouOS". المستخدم اسمه ${userName}. تحدث بالدارجة المغربية بأسلوب ودود وحماسي وخفيف الظل. جاوب بشكل طبيعي وكامل بحال أي محادثة حقيقية: إلا السؤال بسيط جاوب بسرعة وباختصار، وإلا احتاج شرح أو تفصيل خد الوقت اللازم ووضح بالتفصيل بلا ما تقصر الجواب تعسفيا. ساعد المستخدم في أي شيء يطلبه (تقني، شخصي، دراسة، أفكار...). لا تكرر اسمه في كل جملة.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 3000,
        system: systemPrompt,
        messages: history
      })
    });
    const data = await response.json();
    hideTyping();

    let reply = "سمح ليا، وقع مشكل صغير. عاود جرب.";
    if(data && data.content){
      reply = data.content.map(b => b.text || "").filter(Boolean).join("\n").trim() || reply;
    }
    addMessage('bot', reply);
    history.push({role:'assistant', content:reply});
  } catch(err){
    hideTyping();
    addMessage('bot', "سمح ليا، كاين مشكل فالاتصال. عاود حاول من بعد.");
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', ()=> sendMessage(inputEl.value));
inputEl.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') sendMessage(inputEl.value);
});
suggestions.addEventListener('click', (e)=>{
  const chip = e.target.closest('.chip');
  if(chip) sendMessage(chip.getAttribute('data-msg'));
});

init();

/* ---------- orb parallax on pointer move ---------- */
const orbEl = document.querySelector('.orb');
window.addEventListener('pointermove', (e)=>{
  if(reduceMotion || !orbEl) return;
  const relX = (e.clientX / window.innerWidth - 0.5) * 16;
  const relY = (e.clientY / window.innerHeight - 0.5) * 16;
  orbEl.style.transform = `translate(${relX}px, ${relY}px)`;
});
</script>

</body>
</html>
