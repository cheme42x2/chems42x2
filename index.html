<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .app-container { width: 375px; height: 100%; background: #121212; border-left: 1px solid #333; border-right: 1px solid #333; padding: 20px; box-sizing: border-box; overflow-y: auto; transition: all 0.3s ease; }
        
        /* تأثير سلاسة */
        .balance-card { text-align: center; margin: 40px 0; }
        .amount { font-size: 2.8em; font-weight: 800; color: #00ff9d; letter-spacing: -1px; }
        
        .nav-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px; border-radius: 50px; margin-bottom: 20px; }
        .nav-item { cursor: pointer; color: #aaa; transition: 0.3s; }
        .nav-item:hover { color: #fff; }

        .asset { background: #1c1c1c; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; border: 1px solid #2a2a2a; }
        
        button { background: #00ff9d; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="balance-card">
        <div style="color: #666;">Total Balance</div>
        <div class="amount" id="balance">$1,279.00</div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">Tokens</div>
        <div class="nav-item">NFTs</div>
        <div class="nav-item">Activity</div>
    </div>

    <div id="assets">
        <div class="asset"><span>Solana</span> <span>$84.20</span></div>
        <div class="asset"><span>Ethereum</span> <span>$1,194.80</span></div>
    </div>

    <button onclick="refreshPage()">تحديث المحفظة</button>
</div>

<script>
    // خاصية التحديث السلس
    function refreshPage() {
        const balanceEl = document.getElementById('balance');
        balanceEl.style.opacity = '0';
        setTimeout(() => {
            balanceEl.innerText = "$1,279.00";
            balanceEl.style.opacity = '1';
        }, 300);
    }
</script>

</body>
</html>
