<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الألعاب الافتراضي</title>
    <style>
        /* إعدادات الخلفية العامة المستوحاة من ألعاب كرة القدم */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #001f4d 0%, #000a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
        }

        /* محاكاة تأثير الشبكة أو الخطوط الخلفية */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 123, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 123, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        .shop-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 1000px;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-bottom: 5px;
        }

        .header p {
            color: #a0c4ff;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        /* تصميم شبكة البطاقات */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* تصميم البطاقة والتأثيرات المدفوعة */
        .card {
            background: linear-gradient(135deg, rgba(0, 40, 100, 0.8) 0%, rgba(0, 15, 40, 0.9) 100%);
            border: 2px solid #0055ff;
            border-radius: 15px;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        /* تأثير التوهج والحركة عند تمرير الماوس */
        .card:hover {
            transform: translateY(-10px);
            border-color: #00d2ff;
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4);
        }

        /* تأثير ضوئي متحرك يمر عبر البطاقة */
        .card::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 30%; height: 200%;
            background: rgba(255, 255, 255, 0.13);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .card:hover::after {
            left: 130%;
            opacity: 1;
            transition: all 0.5s ease-in-out;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-price {
            font-size: 1.2rem;
            color: #00d2ff;
            margin-bottom: 20px;
        }

        .btn-buy {
            background: linear-gradient(90deg, #0055ff, #00d2ff);
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(0, 85, 255, 0.3);
        }

        .btn-buy:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #00d2ff, #0055ff);
        }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="header">
            <h1>متجر العناصر الافتراضي</h1>
            <p>تصفح الحزم البرمجية المتوفرة للتصميم</p>
        </div>

        <div class="cards-grid">
            <!-- البطاقة الأولى -->
            <div class="card">
                <div class="card-icon">🪙</div>
                <div class="card-title">الحزمة البرونزية</div>
                <div class="card-price">100 نقطة افتراضية</div>
                <button class="btn-buy">استعراض الحزمة</button>
            </div>

            <!-- البطاقة الثانية -->
            <div class="card">
                <div class="card-icon">🪙🪙</div>
                <div class="card-title">الحزمة الفضية</div>
                <div class="card-price">500 نقطة افتراضية</div>
                <button class="btn-buy">استعراض الحزمة</button>
            </div>

            <!-- البطاقة الثالثة -->
            <div class="card">
                <div class="card-icon">💎</div>
                <div class="card-title">الحزمة الذهبية</div>
                <div class="card-price">1000 نقطة افتراضية</div>
                <button class="btn-buy">استعراض الحزمة</button>
            </div>
        </div>
    </div>

</body>
</html>
