<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADOU | Underground Slang Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #07080a;
            --premium-gold: #d4af37;
            --neon-green: #00ff66;
            --text-light: #f0f0f0;
            --panel-bg: rgba(14, 15, 20, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Arabic', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }

        /* Luxury Autumn Dynamic Background */
        #autumn-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 12px; height: 12px;
            background: #d35400;
            opacity: 0.5;
            border-radius: 0 70% 0 70%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* VIP Terminal Interface */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            border: 2px solid rgba(212, 175, 55, 0.25);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9), inset 0 0 30px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(12px);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--premium-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .status-badge {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3333;
            background: rgba(255, 51, 51, 0.1);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid rgba(255, 51, 51, 0.2);
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .box {
            position: relative;
            background: #0d0e12;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .box:focus-within {
            border-color: var(--premium-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .box-label {
            font-size: 0.8rem;
            color: var(--premium-gold);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .chinese-sub {
            font-size: 0.75rem;
            opacity: 0.4;
            font-family: 'Cinzel', serif;
        }

        textarea {
            width: 100%;
            height: 140px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-light);
            font-size: 1.1rem;
            resize: none;
            line-height: 1.6;
        }

        /* Neon Dark Web Output Style */
        .output-area {
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .copy-btn {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: var(--neon-green);
            color: #000;
        }

        /* Premium TikTok Button */
        .tiktok-footer {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .tiktok-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(45deg, #ff0050, #00f2fe);
            color: #fff;
            width: 100%;
            max-width: 380px;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.05rem;
            box-shadow: 0 12px 35px rgba(255, 0, 80, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tiktok-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.5);
        }

        .system-foot {
            text-align: center;
            margin-top: 25px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="autumn-container"></div>

    <div class="container">
        <header>
            <div class="brand-name">JADOU</div>
            <div class="status-badge"><i class="fa-solid fa-bolt"></i> خادم الترجمة السري غير القانوني المطور v9.0</div>
        </header>

        <div class="translator-grid">
            <!-- Input -->
            <div class="box">
                <div class="box-label">
                    <span>النص الأصلي (العربية / الدارجة)</span>
                    <span class="chinese-sub">输入 SOURCE</span>
                </div>
                <textarea id="src-text" placeholder="اكتب أي هدرة هنا خويا... السيستم يترجم فوراً"></textarea>
            </div>

            <!-- Smart Output -->
            <div class="box">
                <div class="box-label">
                    <span>مخرجات شوارع وعصابات نيويورك (Bronx Slang)</span>
                    <span class="chinese-sub">地下 翻訳 OUTPUT</span>
                </div>
                <textarea id="res-text" class="output-area" readonly placeholder="The heavy street talk will appear here instantly..."></textarea>
                <button class="copy-btn" onclick="copyTranslation()">
                    <i class="fa-regular fa-copy"></i> نسخ كود الشارع
                </button>
            </div>
        </div>

        <div class="tiktok-footer">
            <a href="https://www.tiktok.com" target="_blank" class="tiktok-btn">
                <i class="fa-brands fa-tiktok"></i> دخول فوري لمنصة TIKTOK
            </a>
        </div>

        <div class="system-foot">
            CHINESE AUTUMN PARALLEL SYSTEM • CRYPTED BY JADOU • STRICTLY ILLEGAL CONVERSION
        </div>
    </div>

    <script>
        // High-End Intelligent Procedural Slang Engine
        // This ensures ANY input returns a brutal, authentic Bronx gangsta response instantly.
        const slangPhrases = [
            "Yo get the f*ck outta my face, u buggin' heavy shorty! 🐀",
            "Deadass word to my momma, we backin' out the code on the block. 💯",
            "Stop yappin' to the feds, u straight trippin' fam! 🛑",
            "Spin the block on them opps, ain't nobody textin' back! 🔫",
            "You fake out here, get ya money up, them racks don't lie. 💵",
            "Hold on, we posted up in the trenches, 12 is hot right now! 🚔",
            "That's straight fire, we don't do no cop outs on this side. 🐍",
            "Word to everything I love, u a sucker for real, stay out the way!"
        ];

        const specificKeywords = {
            "خويا": "my slime / my day one 💯",
            "دراهم": "them bands / heavy racks 💵",
            "بوليس": "the 12 / them feds 🚔",
            "مكاش": "no shot, fam 🛑",
            "احكم": "hold that up 🔒"
        };

        const srcInput = document.getElementById('src-text');
        const resOutput = document.getElementById('res-text');

        srcInput.addEventListener('input', () => {
            let inputVal = srcInput.value.trim();
            if (!inputVal) {
                resOutput.value = '';
                return;
            }

            // Super fast algorithmic matching
            let words = inputVal.split(/\s+/);
            let detectedSlang = [];

            // 1. Check for specific keywords first to maintain context
            words.forEach(w => {
                let clean = w.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                if (specificKeywords[clean]) {
                    detectedSlang.push(specificKeywords[clean]);
                }
            });

            // 2. Generate procedural high-tier Bronx gangsta structure based on input length
            let seed = inputVal.length % slangPhrases.length;
            let primarySlang = slangPhrases[seed];
            let secondarySlang = slangPhrases[(seed + 2) % slangPhrases.length];

            // 3. Assemble dynamic response instantly
            let finalTranslation = `[ILLEGAL_DECRYPT_SUCCESS] \n`;
            if (detectedSlang.length > 0) {
                finalTranslation += `[TAGS DETECTED: ${detectedSlang.join(' | ')}] \n\n`;
            } else {
                finalTranslation += `[DECODING RAW STREET TONE...] \n\n`;
            }
            
            finalTranslation += `${primarySlang}\n${inputVal.length > 15 ? secondarySlang : ''}`;

            // Inject to text area at lightning speed
            resOutput.value = finalTranslation;
        });

        // Copy Function
        function copyTranslation() {
            if(!resOutput.value) return;
            resOutput.select();
            document.execCommand('copy');
            
            let btn = document.querySelector('.copy-btn');
            btn.innerHTML = `<i class="fa-solid fa-check"></i> تم النسخ`;
            setTimeout(() => {
                btn.innerHTML = `<i class="fa-regular fa-copy"></i> نسخ كود الشارع`;
            }, 2000);
        }

        // Autumn Leaves Simulation
        function initAutumnVibe() {
            const container = document.getElementById('autumn-container');
            const colors = ['#d35400', '#e67e22', '#c0392b', '#f39c12'];
            for (let i = 0; i < 20; i++) {
                let leaf = document.createElement('div');
                leaf.classList.add('leaf');
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = (Math.random() * 4 + 4) + 's';
                leaf.style.animationDelay = (Math.random() * 3) + 's';
                leaf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                leaf.style.transform = `scale(${Math.random() * 0.6 + 0.5})`;
                container.appendChild(leaf);
            }
        }
        initAutumnVibe();
    </script>
</body>
</html>
