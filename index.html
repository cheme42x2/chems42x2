<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JADU CRAFT 3D - VIP EDITION</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* شاشة اللعبة */
        #gameCanvas { width: 100%; height: 100%; display: block; }

        /* اللمسة لي تحير صحابك - الواجهة العلوية */
        .top-ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 90%; }
        .game-title { color: #00ffcc; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #00ffcc; letter-spacing: 1px; }
        .credits { color: #fff; font-size: 11px; opacity: 0.8; margin-top: 2px; }

        /* متجر السلعة باطل (Inventory) من فوق */
        .inventory-bar { position: absolute; top: 55px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 8px; border: 2px solid #00ffcc; max-width: 95%; overflow-x: auto; pointer-events: auto; }
        .slot { width: 45px; height: 45px; border-radius: 4px; border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; background: #222; color: #fff; position: relative; }
        .slot.active { border-color: #00ffcc; background: #333; box-shadow: 0 0 10px #00ffcc; }
        .slot-name { position: absolute; bottom: 1px; font-size: 8px; color: #ccc; }

        /* الـ Joystick تع المشي من تحت على اليسار */
        .joystick-container { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .joystick-knob { width: 45px; height: 45px; background: linear-gradient(45deg, #00ffcc, #0077ff); border-radius: 50%; box-shadow: 0 0 10px rgba(0,255,204,0.5); }

        /* أزرار البناء والتكسير من تحت على اليمين */
        .action-buttons { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; border: none; font-weight: bold; font-size: 14px; color: #000; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-build { background: #00ffcc; }
        .btn-destroy { background: #ff3333; color: #fff; }

        /* نقطة التصويب في الوسط تع المينكرافت (+) */
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.7); font-size: 24px; font-weight: 300; pointer-events: none; }
    </style>
    <!-- استدعاء مكتبة Three.js الرسمية للجرافيكس الـ 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="top-ui">
        <div class="game-title">✨ JADU CRAFT 3D ✨</div>
        <div class="credits">Created by Chems | VIP World</div>
    </div>

    <!-- متجر السلعة (كلش باطل وبدون أموال) -->
    <div class="inventory-bar" id="inventory">
        <div class="slot active" onclick="selectBlock('grass', this)">🌱<span class="slot-name">حشيش</span></div>
        <div class="slot" onclick="selectBlock('stone', this)">🪨<span class="slot-name">حجر</span></div>
        <div class="slot" onclick="selectBlock('wood', this)">🪵<span class="slot-name">لوح</span></div>
        <div class="slot" onclick="selectBlock('gold', this)">👑<span class="slot-name">Jادو</span></div>
        <div class="slot" onclick="selectBlock('fire', this)">🔥<span class="slot-name">نار</span></div>
    </div>

    <div class="crosshair">+</div>

    <!-- الـ Joystick للمشي -->
    <div class="joystick-container" id="joyBounds">
        <div class="joystick-knob" id="joyKnob"></div>
    </div>

    <!-- أزرار البناء والتدمير تع المينكرافت -->
    <div class="action-buttons">
        <button class="action-btn btn-build" onclick="triggerBuild()">BUILD</button>
        <button class="action-btn btn-destroy" onclick="triggerDestroy()">DELETE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. إعداد المشهد، الكاميرا، والإضاءة الـ 3D
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b1d3a); // سماء ليلية فخمة
        scene.fog = new THREE.FogExp2(0x0b1d3a, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        // الإضاءة (الشمس والضوء المحيط)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // 2. مستلزمات البناء والألوان
        let currentBlockType = 'grass';
        const blocksArray = [];
        const animatedFires = []; // لتخزين النيران لي تشعل وتتحرك

        const blockTextures = {
            grass: new THREE.MeshStandardMaterial({ color: 0x55aa44, roughness: 0.6 }),
            stone: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 }),
            wood: new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.5 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 }),
            fire: new THREE.MeshBasicMaterial({ color: 0xff5500, wireframe: false }) // لون النار المشع
        };

        // بناء الأرضية الأساسية تع المينكرافت (15x15 مربع)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        for (let x = -7; x <= 7; x++) {
            for (let z = -7; z <= 7; z++) {
                const mesh = new THREE.Mesh(geometry, blockTextures.grass);
                mesh.position.set(x, 0, z);
                scene.add(mesh);
                blocksArray.push(mesh);
            }
        }

        // وضع الكاميرا فوق الأرضية
        camera.position.set(0, 2, 5);
        let moveForward = 0, moveLeft = 0;

        // 3. نظام تدوير الكاميرا بالتاتش (Touch Look)
        let touchStartX = 0, touchStartY = 0;
        let yaw = 0, pitch = 0;

        window.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX > window.innerWidth / 2) { // التدوير في الجهة اليمنى تع الشاشة
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if(e.touches[0].clientX > window.innerWidth / 2) {
                const deltaX = e.touches[0].clientX - touchStartX;
                const deltaY = e.touches[0].clientY - touchStartY;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;

                yaw -= deltaX * 0.005;
                pitch -= deltaY * 0.005;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch)); // حماية الكاميرا متقلبش

                camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            }
        });

        // 4. نظام الـ Joystick للمشي (الجهة اليسرى)
        const joyBounds = document.getElementById('joyBounds');
        const joyKnob = document.getElementById('joyKnob');
        let joyTouchId = null;

        joyBounds.addEventListener('touchstart', (e) => {
            joyTouchId = e.changedTouches[0].identifier;
        });

        joyBounds.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let touch of e.touches) {
                if(touch.identifier === joyTouchId) {
                    const rect = joyBounds.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    let dx = touch.clientX - centerX;
                    let dy = touch.clientY - centerY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
                    
                    const angle = Math.atan2(dy, dx);
                    joyKnob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;

                    // تحويل قيم الجويستيك للمشي
                    moveForward = -Math.sin(angle) * (dist / 35) * 0.08;
                    moveLeft = -Math.cos(angle) * (dist / 35) * 0.08;
                }
            }
        });

        joyBounds.addEventListener('touchend', () => {
            joyKnob.style.transform = 'translate(0px, 0px)';
            moveForward = 0; moveLeft = 0;
            joyTouchId = null;
        });

        // 5. متجر السلعة والتبديل بين البلوكات
        function selectBlock(type, el) {
            currentBlockType = type;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        // 6. ميكانيزم البناء والتكسير باستخدام الـ Raycaster (التصويب في الوسط)
        const raycaster = new THREE.Raycaster();
        const centerPoint = new THREE.Vector2(0, 0); // وسط الشاشة بالظبط (+)

        function triggerBuild() {
            raycaster.setFromCamera(centerPoint, camera);
            const intersects = raycaster.intersectObjects(blocksArray);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                const position = new THREE.Vector3().copy(intersect.point).add(intersect.face.normal).round();

                // حماية باش ميبنيش فوق نفس البلوكة ديريكت
                let blockMaterial = blockTextures[currentBlockType];
                let currentGeo = geometry;

                // إذا اختار النار، نخدمولها جوميتري خاص يشبه لشعلة النار 🔥
                if(currentBlockType === 'fire') {
                    currentGeo = new THREE.ConeGeometry(0.4, 1, 4);
                }

                const newBlock = new THREE.Mesh(currentGeo, blockMaterial);
                newBlock.position.set(position.x, position.y, position.z);
                scene.add(newBlock);
                blocksArray.push(newBlock);

                // إذا كانت نار، نضيفوها لقائمة الأنيميشن باش تشعل وتتحرك عادي
                if(currentBlockType === 'fire') {
                    animatedFires.push(newBlock);
                }
            }
        }

        function triggerDestroy() {
            raycaster.setFromCamera(centerPoint, camera);
            const intersects = raycaster.intersectObjects(blocksArray);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if(intersect.object.position.y === 0 && blocksArray.length <= 225) return; // حماية الأرضية الأساسية متتكسرش قاع

                scene.remove(intersect.object);
                const index = blocksArray.indexOf(intersect.object);
                if (index > -1) blocksArray.splice(index, 1);

                const fireIndex = animatedFires.indexOf(intersect.object);
                if (fireIndex > -1) animatedFires.splice(fireIndex, 1);
            }
        }

        // 7. حلقة التحديث المستمر للعبة (Game Loop)
        function animate() {
            requestAnimationFrame(animate);

            // تطبيق الحركة للمشي (الأمام/الخلف/اليمين/اليسار) حسب اتجاه الكاميرا
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0; forward.normalize(); right.normalize();

            camera.position.addScaledVector(forward, moveForward);
            camera.position.addScaledVector(right, moveLeft);

            // أنيميشن النار (تتحرك وتكبر وتصغر ديريكت كأنها تشعل عادي)
            const time = Date.now() * 0.01;
            animatedFires.forEach(fire => {
                fire.scale.set(
                    1 + Math.sin(time * 2) * 0.1,
                    1 + Math.cos(time * 3) * 0.15,
                    1 + Math.sin(time * 2) * 0.1
                );
                fire.rotation.y += 0.05;
            });

            renderer.render(scene, camera);
        }

        // إعادة ضبط الشاشة في حالة تدوير التيلفون
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
