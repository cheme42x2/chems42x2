<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎵 مشغل الصوت الفخم</title>
    <!-- خطوط عصرية -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0d0d0d, #000000);
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 40px 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 80px rgba(0, 150, 255, 0.2), 0 0 160px rgba(100, 0, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(245, 87, 108, 0.3);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* منطقة تحميل الملف */
        .file-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .file-zone:hover {
            border-color: #4facfe88;
            background: rgba(79, 172, 254, 0.05);
        }

        .file-zone .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .file-zone p {
            color: #aaa;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
        }

        .file-zone .file-name {
            color: #4facfe;
            font-weight: 700;
            margin-top: 8px;
            font-size: 16px;
            word-break: break-all;
        }

        #fileInput {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* زر التشغيل الضخم */
        .btn-play {
            width: 100%;
            padding: 25px 0;
            font-size: 32px;
            font-weight: 700;
            border: none;
            border-radius: 80px;
            background: linear-gradient(145deg, #f5576c, #ff6a88);
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 0 60px #f5576c66, inset 0 0 30px #ffffff33;
            transition: 0.15s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-play::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, #ffffff44, transparent 70%);
            opacity: 0;
            transition: 0.4s;
            transform: scale(1.2);
        }

        .btn-play:hover {
            transform: scale(1.02);
            box-shadow: 0 0 100px #f5576c99, inset 0 0 40px #ffffff55;
        }

        .btn-play:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        .btn-play:active {
            transform: scale(0.96);
            box-shadow: 0 0 30px #f5576c;
        }

        .btn-play .sub {
            display: block;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 4px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* حالة الصوت */
        .status {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            min-height: 24px;
        }

        .status .highlight {
            color: #4facfe;
            font-weight: 700;
        }

        /* تأثيرات 4K / إضاءة متحركة */
        .glow-ring {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(79, 172, 254, 0.06), transparent 50%);
            z-index: -1;
            transition: 0.1s;
        }

        /* استجابة للجوال */
        @media (max-width: 500px) {
            .container { padding: 25px 20px; }
            .btn-play { font-size: 24px; padding: 20px 0; }
        }
    </style>
</head>
<body>

    <!-- حلقة ضوئية متحركة -->
    <div class="glow-ring" id="glowRing"></div>

    <div class="container">
        <h1>🎧 مشغل الصوت</h1>

        <!-- منطقة رفع الملف -->
        <div class="file-zone" id="fileZone">
            <span class="icon">📂</span>
            <p>اضغط هنا لاختيار ملف MP3</p>
            <div class="file-name" id="fileName">لم يتم اختيار ملف</div>
            <input type="file" id="fileInput" accept=".mp3,.wav,.ogg" />
        </div>

        <!-- زر التشغيل -->
        <button class="btn-play" id="playBtn">
            ▶ تشغيل
            <span class="sub">اضغط بقوة</span>
        </button>

        <div class="status" id="status">⏳ انتظر اختيار ملف...</div>
    </div>

    <script>
        // ====== عناصر ======
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const glowRing = document.getElementById('glowRing');

        let audioElement = null;

        // ====== رفع الملف ======
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // عرض اسم الملف
            fileName.textContent = '📁 ' + file.name;
            status.innerHTML = '✅ تم تحميل الملف: <span class="highlight">' + file.name + '</span>';

            // إنشاء كائن صوت
            const url = URL.createObjectURL(file);
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            audioElement = new Audio(url);
            audioElement.preload = 'auto';

            // جاهزية الصوت
            audioElement.addEventListener('canplaythrough', () => {
                status.innerHTML = '🎵 جاهز للتشغيل: <span class="highlight">' + file.name + '</span>';
            });

            audioElement.addEventListener('ended', () => {
                status.innerHTML = '⏹️ انتهى التشغيل';
                playBtn.innerHTML = '▶ تشغيل <span class="sub">اضغط بقوة</span>';
            });

            audioElement.addEventListener('error', () => {
                status.innerHTML = '❌ خطأ في الملف';
            });
        });

        // ====== زر التشغيل ======
        playBtn.addEventListener('click', function() {
            if (!audioElement) {
                status.innerHTML = '⚠️ يرجى اختيار ملف MP3 أولاً';
                return;
            }

            if (audioElement.paused) {
                audioElement.play();
                playBtn.innerHTML = '⏸ إيقاف <span class="sub">جاري التشغيل</span>';
                status.innerHTML = '🔊 جاري التشغيل...';
            } else {
                audioElement.pause();
                playBtn.innerHTML = '▶ تشغيل <span class="sub">اضغط بقوة</span>';
                status.innerHTML = '⏸ متوقف مؤقتاً';
            }
        });

        // ====== تأثير الـ Glow (حلقة ضوئية خلف الماوس) ======
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glowRing.style.setProperty('--x', x + '%');
            glowRing.style.setProperty('--y', y + '%');
        });

        // ====== تنبيه للمستخدم ======
        status.innerHTML = '📂 اختر ملف MP3 من الأعلى';
    </script>
</body>
</html>
