<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منزل Chems الرقمي - خاص بـ ريري</title>
    <style>
        /* جلب خط إيموجيات الآيفون الرسمي لتظهر عند الجميع بنفس الستايل الفخم */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap');

        /* إقفال الشاشة تماماً لمنع أي حركة جانبية أو اهتزاز */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #040814;
            color: #fff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Apple Color Emoji', 'Noto Color Emoji';
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 1000px;
        }

        /* خلفية ضبابية ساحرة باللون الأزرق الداكن */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.15) 0%, rgba(20, 30, 65, 0.5) 50%, #02050c 100%);
            z-index: 0;
            animation: bgRotate 20s infinite linear;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* حاوية الإيموجيات المتساقطة */
        .magic-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heart-particle {
            position: absolute;
            font-size: 1.6rem;
            will-change: transform, top;
            filter: drop-shadow(0 0 8px rgba(0, 191, 255, 0.6));
            font-family: 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }

        /* بطاقة الترحيب الزرقاء الفخمة والثابتة */
        .luxury-card {
            background: linear-gradient(135deg, rgba(10, 20, 45, 0.85) 0%, rgba(5, 10, 25, 0.95) 100%);
            border: 2px solid #00bfff;
            box-shadow: 0 0 40px rgba(0, 191, 255, 0.3), inset 0 0 20px rgba(0, 191, 255, 0.15);
            border-radius: 25px;
            padding: 40px 25px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            z-index: 2;
            backdrop-filter: blur(20px);
            transform-style: preserve-3d;
            transition: all 0.5s ease;
        }

        /* إطار الصورة الشخصية الماتشي بالنيون الأزرق */
        .avatar-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 3px solid #00bfff;
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.7);
            overflow: hidden;
            position: relative;
            background: #0d1b3e;
            animation: float 3s infinite ease-in-out;
        }

        /* وضع رابط خارجي ثابت ومباشر ومضمون للصورة لتظهر فوراً غصباً عن GitHub */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background-image: url('https://i.ibb.co/v4S8X3N/1000002315-2.jpg'); /* رابط سحابي ثابت يحمل صورتها الزرقاء مع القط */
            background-size: cover;
            background-position: center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 1.8rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
            margin-bottom: 15px;
            font-weight: bold;
        }

        h1 span {
            color: #00bfff;
        }

        p {
            color: #d1dcfa;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        /* زر المفاجأة الأزرق الملكي */
        .magic-btn {
            background: linear-gradient(135deg, #00bfff 0%, #1e90ff 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
            transition: all 0.3s ease;
            width: 85%;
            display: inline-block;
        }

        .magic-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px #00bfff;
        }

        /* شاشة المفاجأة السعيدة الثابتة */
        #surpriseScreen {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .gift-title {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 20px #00bfff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .gift-text {
            font-size: 1.2rem;
            color: #e6eeff;
            line-height: 1.8;
            background: rgba(0, 191, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #00bfff;
            display: inline-block;
            max-width: 95%;
        }
    </style>
</head>
<body>

    <!-- إيموجيات الآيفون المتساقطة الثابتة داخل الحواف -->
    <div class="magic-container" id="magicBox"></div>

    <!-- الواجهة الرئيسية الفخمة -->
    <div class="luxury-card" id="mainCard">
        <div id="cardContent">
            <div class="avatar-container">
                <!-- دمج الصورة بالرابط المباشر لضمان الظهور الفوري -->
                <div class="avatar-img"></div>
            </div>
            <h1>مرحباً بكِ يا <span>ريري 🦋</span></h1>
            <p>المكان غامض، الأجواء VIP، وهناك سر مخبأ هنا من أجلكِ فقط.. هل أنتِ مستعدة لاكتشافه؟ ✨</p>
            <button class="magic-btn" onclick="revealSecret()">اضغطي لرؤية المفاجأة 💙</button>
        </div>

        <!-- شاشة المفاجأة -->
        <div id="surpriseScreen">
            <div class="avatar-container">
                <div class="avatar-img"></div>
            </div>
            <div class="gift-title">أجمل تونسية 🐈💙</div>
            <div class="gift-text">
                الكون يبتسم عندما تبتسمين.. 💎<br>
                أهلاً بكِ في عالم Chems الفخم، نورتِ الموقع بوجودكِ الراقي يا ريري! ✨🇹🇳💙
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('magicBox');
        // دمج إيموجيات الآيفون: قطة، فراشة، ألماس، قلوب زرقاء
        const particles = ['🐈', '🦋', '💎', '💙', '✨', '💎', '💙'];

        for (let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.classList.add('heart-particle');
            p.textContent = particles[Math.floor(Math.random() * particles.length)];
            p.style.left = Math.random() * 95 + '%'; 
            p.style.top = Math.random() * -50 + 'px';

            const duration = Math.random() * 4 + 4;
            const delay = Math.random() * 5;
            p.style.animation = `fallDown ${duration}s linear infinite`;
            p.style.animationDelay = `${delay}s`;

            container.appendChild(p);
        }

        const sheet = document.styleSheets[0];
        sheet.insertRule(`
            @keyframes fallDown {
                0% { top: -50px; transform: translateX(0) rotate(0deg); opacity: 0; }
                15% { opacity: 1; }
                90% { opacity: 1; }
                100% { top: 105vh; transform: translateX(20px) rotate(360deg); opacity: 0; }
            }
        `, sheet.cssRules.length);

        function revealSecret() {
            document.getElementById('cardContent').style.display = 'none';
            document.getElementById('surpriseScreen').style.display = 'block';
            
            // احتفالية الألماس والقلوب الفخمة عند الضغط
            for (let i = 0; i < 20; i++) {
                const burst = document.createElement('div');
                burst.classList.add('heart-particle');
                burst.textContent = '💎';
                burst.style.left = Math.random() * 95 + '%';
                burst.style.top = '25%';
                burst.style.animation = 'fallDown 3s linear infinite';
                container.appendChild(burst);
            }
        }
    </script>

</body>
</html>
