<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Magic</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="magicCanvas"></canvas>

    <script>
        const canvas = document.getElementById("magicCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // دعم تغيير حجم الشاشة تلقائياً
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // دالة الرسم عند تحريك الصبع أو الفأرة
        function draw(x, y) {
            ctx.fillStyle = "rgba(5, 5, 5, 0.08)"; // تأثير التلاشي (Fade effect)
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الدائرة المضيئة
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fillStyle = "#00ffcc"; // لون نيون هبال
            ctx.shadowBlur = 30; // تأثير الإضاءة (Glow)
            ctx.shadowColor = "#00ffcc";
            ctx.fill();
            ctx.shadowBlur = 0; // إلغاء التوهج للعمليات القادمة لخفة الأداء
        }

        // حركة الماوس (للبيسي)
        window.addEventListener("mousemove", (e) => {
            draw(e.clientX, e.clientY);
        });

        // حركة اللمس (للتيلفون)
        window.addEventListener("touchmove", (e) => {
            if (e.touches.length > 0) {
                draw(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
    </script>
</body>
</html>
