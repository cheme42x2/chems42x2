<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تجربة HTML</title>
  <style>
    :root { --bg: #0f172a; --card: #111827; --accent: #38bdf8; --text: #e5e7eb; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b 50%, #111827);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3.5rem); }
    p { margin: 0 0 20px; line-height: 1.9; font-size: 1.05rem; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      appearance: none; border: 0; cursor: pointer;
      background: var(--accent); color: #082f49;
      padding: 12px 18px; border-radius: 999px; font-weight: 700;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 10px 24px rgba(56, 189, 248, 0.25);
    }
    .btn:hover { transform: translateY(-2px); }
    .pill {
      border: 1px solid rgba(229, 231, 235, 0.15);
      padding: 12px 18px; border-radius: 999px; color: #cbd5e1;
    }
    .footer { margin-top: 22px; font-size: .92rem; color: #94a3b8; }
    code { color: #67e8f9; }
  </style>
</head>
<body>
  <main class="card">
    <h1>سلام خويا 👋</h1>
    <p>هذا مثال <strong>HTML</strong> بسيط فيه تصميم، زر، وتفاعل صغير باش تبان الخدمة مليحة وماشي غير صفحة خاوية.</p>
    <div class="row">
      <button class="btn" onclick="document.getElementById('msg').textContent='هاك شفت؟ الكود يخدم ✅'">جرّبني</button>
      <div class="pill" id="msg">اضغط على الزر باش تبدل الرسالة.</div>
    </div>
    <div class="footer">مكتوب بكود نظيف ومرتب، وتقدر تبدلو كيف تحب.</div>
  </main>
</body>
</html>
