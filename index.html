<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0d0d;
            color: #ff2a5f;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Terminal Screen */
        #terminal {
            text-align: left;
            width: 90%;
            max-width: 500px;
            z-index: 10;
            transition: opacity 0.8s ease;
        }

        .system-line {
            color: #ff2a5f;
            font-size: 1rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .status-line {
            color: #ffffff;
            font-size: 0.9.5rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .btn {
            background: transparent;
            border: 1px solid #ff2a5f;
            color: #ffffff;
            background-color: #ff2a5f;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 42, 95, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: transparent;
            color: #ff2a5f;
            box-shadow: 0 0 25px rgba(255, 42, 95, 0.8);
        }

        .hint {
            color: #555;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        /* Heart Canvas Area */
        #heart-container {
            position: absolute;
            width: 700px;
            height: 700px;
            display: none;
            justify-content: center;
            align-items: center;
            animation: heartPulse 1.2s infinite ease-in-out;
        }

        /* The Name Mia in the Center */
        #center-name {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px #ff2a5f, 0 0 20px #ff2a5f, 0 0 40px #ff2a5f;
            z-index: 5;
            letter-spacing: 2px;
            font-family: 'Arial', sans-serif;
            opacity: 0;
            transform: scale(0.5);
            animation: nameAppear 2s 1s forwards ease-out;
        }

        /* Floating 'i love you' particles */
        .love-text {
            position: absolute;
            font-size: 0.75rem;
            font-weight: bold;
            color: #ff2a5f;
            text-shadow: 0 0 4px rgba(255, 42, 95, 0.6);
            opacity: 0;
            transform: scale(0);
            animation: particleFadeIn 2s forwards ease-out;
        }

        /* Animations */
        @keyframes heartPulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.12); }
            60% { transform: scale(1); }
            80% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes particleFadeIn {
            to {
                opacity: 0.85;
                transform: scale(1);
            }
        }

        @keyframes nameAppear {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="system-line">[system] Initializing heart.PROTOCOL_v2.0...</div>
        <div class="status-line">> One encrypted package found for you.</div>
        <button class="btn" onclick="decryptHeart()">Decrypt Message</button>
        <div class="hint">(or just click anywhere)</div>
    </div>

    <div id="heart-container">
        <div id="center-name">Mia</div>
    </div>

    <script>
        // Allow clicking anywhere on screen to trigger it too
        window.onclick = function(e) {
            if(document.getElementById('terminal').style.display !== 'none') {
                decryptHeart();
            }
        }

        function decryptHeart() {
            // Stop propagation so clicking the button doesn't trigger window.onclick twice
            event.stopPropagation(); 
            
            const terminal = document.getElementById('terminal');
            terminal.style.opacity = '0';
            
            setTimeout(() => {
                terminal.style.display = 'none';
                
                const container = document.getElementById('heart-container');
                container.style.display = 'flex';
                generateHeartShape(container);
            }, 800);
        }

        function generateHeartShape(container) {
            const totalParticles = 400; // Dense look like the video
            
            for (let i = 0; i < totalParticles; i++) {
                const t = Math.random() * 2 * Math.PI;
                
                // Heart Mathematical Coordinates
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                // Dynamic scaling to fit screen perfectly
                const scale = 18; 
                const posX = x * scale + 350;
                const posY = -y * scale + 350; 

                // Adding organic scattering/drift effect like the tiktok video
                const driftX = (Math.random() - 0.5) * 35;
                const driftY = (Math.random() - 0.5) * 35;

                const span = document.createElement('span');
                span.className = 'love-text';
                
                // Randomly alternate between text variants for visual texture
                span.innerText = Math.random() > 0.3 ? 'i love you' : 'love you';
                
                span.style.left = `${posX + driftX}px`;
                span.style.top = `${posY + driftY}px`;
                
                // Slow progressive rendering animation delay
                span.style.animationDelay = `${Math.random() * 2.5}s`;
                
                // Random subtle text sizes
                span.style.fontSize = `${0.65 + Math.random() * 0.4}rem`;

                container.appendChild(span);
            }
        }
    </script>
</body>
</html>
