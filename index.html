<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزل Chems الملعون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI';
        }

        body {
            background: #000000;
            color: #ff0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* دماء تسيل */
        .blood-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }

        .blood-drop {
            position: absolute;
            background: linear-gradient(to bottom, #8b0000, #300000);
            width: 3px;
            border-radius: 0 0 5px 5px;
            animation: drip linear infinite;
        }

        @keyframes drip {
            0% { top: -10%; height: 0px; }
            50% { height: 60px; }
            100% { top: 110%; height: 10px; }
        }

        /* الصندوق الرئيسي */
        .horror-box {
            background: rgba(8, 0, 0, 0.95);
            border: 1px solid #5a0000;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.6);
            border-radius: 5px;
            padding: 50px 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            z-index: 2;
            border-left: 4px solid #8b0000;
            transition: all 0.5s ease;
        }

        .horror-icon {
            font-size: 3.5rem;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            color: #8b0000;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        p {
            color: #bbb;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 45%;
            background: #000;
            border: 1px solid #5a0000;
            color: #8b0000;
        }

        .btn:hover {
            color: #fff;
            background: #8b0000;
            box-shadow: 0 0 15px #ff0000;
        }

        /* شاشة الهكر المرعبة المخفية */
        #hackerScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 999;
            color: #00ff00;
            padding: 20px;
            font-size: 0.95rem;
            overflow: hidden;
            direction: ltr;
            text-align: left;
        }

        .glitch-red {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            font-weight: bold;
        }

        /* أنيميشن الرعب والاهتزاز */
        .scary-flash {
            animation: flash 0.1s infinite alternate;
        }

        @keyframes flash {
            0% { background: #000; }
            100% { background: #200000; }
        }
    </style>
</head>
<body>

    <div class="blood-container" id="blood"></div>

    <div class="horror-box" id="mainBox">
        <div class="horror-icon">💀</div>
        <h1>منزل Chems الملعون</h1>
        <p>هل أنت موافق على الدخول؟ لأنك ستندم لاحقاً...</p>
        
        <div class="btn-group">
            <button class="btn" onclick="startHackerAttack()">نعم، أدخل</button>
            <button class="btn" onclick="alert('حاولت الهروب؟ الأرواح لا تترك أحداً يغادر! ⚰️')">لا، هروب</button>
        </div>
    </div>

    <div id="hackerScreen">
        <div id="matrixCode"></div>
    </div>

    <script>
        // قطرات الدم
        const bloodContainer = document.getElementById('blood');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.classList.add('blood-drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = (Math.random() * 3 + 2) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            bloodContainer.appendChild(drop);
        }

        // تفجير شاشة الهكر والرعب كي
