<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sultana Sanctuary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center; align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* تأثير الغبار الذهبي الفخم */
        .gold-dust {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #ffd700 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
        }

        .card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 60px 40px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            animation: appear 1.5s ease-out;
        }

        @keyframes appear {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* التاج الذهبي المتحرك */
        .crown { font-size: 5rem; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        h1 { color: #ffd700; font-size: 2.5rem; text-shadow: 0 0 20px #ffd700; }
        p { color: #fff; font-size: 1.2rem; margin: 20px 0; line-height: 1.6; }

        .btn {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none; padding: 15px 40px;
            border-radius: 30px; font-weight: 900;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ffd700; }
    </style>
</head>
<body>
    <div class="gold-dust"></div>
    <div class="card">
        <div class="crown">👑</div>
        <h1>مملكة ريري</h1>
        <p>في هذا المكان، الذهب ليس معدناً.. بل هو روح المكان. هل أنتِ جاهزة لفتح الباب الملكي؟ ✨</p>
        <button class="btn" onclick="alert('أهلاً بكِ في عالم ريري الذهبي!')">دخول العرش</button>
    </div>
</body>
</html>
