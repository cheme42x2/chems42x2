<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العد التنازلي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        #timer {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="timer">جاري التحميل...</div>

    <script>
        // ضبط وقت النهاية (الساعة 10:00 صباحاً اليوم)
        const targetDate = new Date();
        targetDate.setHours(10, 0, 0, 0);

        function updateTimer() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('timer').innerHTML = "انتهى الوقت!";
                clearInterval(interval);
                return;
            }

            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            // عرض الوقت بالتنسيق المناسب
            document.getElementById('timer').innerHTML = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // تحديث العد كل ثانية
        const interval = setInterval(updateTimer, 1000);
        updateTimer(); // استدعاء الدالة فوراً
    </script>
</body>
</html>
