<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة التوقيت - تحدي 0.67</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.5rem;
        }

        .target {
            background-color: white;
            color: black;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* تصميم الشاشة الرقمية الخضراء */
        #display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 4.5rem;
            font-weight: bold;
            color: #00ff00;
            background: #000;
            padding: 20px 30px;
            border-radius: 10px;
            margin: 20px 0;
            border: 4px solid #444;
            text-shadow: 0 0 15px #00ff00;
            letter-spacing: 2px;
        }

        /* تصميم الزر الدائري */
        #mainBtn {
            font-size: 2rem;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ddd;
            cursor: pointer;
            background-color: #f8f8f8;
            color: #333;
            font-weight: bold;
            transition: all 0.1s ease;
            box-shadow: 0 8px 0 #999, 0 15px 20px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        #mainBtn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #999, 0 5px 10px rgba(0,0,0,0.4);
        }

        #resetBtn {
            font-size: 1.2rem;
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            background-color: #555;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        #resetBtn:hover {
            background-color: #777;
        }

        #result {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="target">الهدف: 0.67 ثانية</div>
        <div id="display">00:00.00</div>
        
        <button id="mainBtn" onclick="toggleTimer()">بدء</button>
        <br>
        <button id="resetBtn" onclick="resetTimer()">إعادة التعيين</button>
        
        <div id="result"></div>
    </div>

    <script>
        // إعدادات الصوت (تم تعديلها ليكون الصوت كبيراً ومسموعاً بوضوح)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTickSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // استخدام الموجة المربعة يعطي صوتاً أعلى وأكثر حدة (كأنه زر مسابقات حقيقي)
            oscillator.type = 'square'; 
            
            // تردد قوي للضغطة
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
            
            // رفع مستوى الصوت (Gain) وتطويل مدة الرنة قليلاً لتبدو أضخم
            gainNode.gain.setValueAtTime(1.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.15);
        }

        let startTime, updatedTime, difference = 0, tInterval;
        let running = false;
        const targetTime = 0.67; 

        const display = document.getElementById('display');
        const mainBtn = document.getElementById('mainBtn');
        const resultDisplay = document.getElementById('result');

        function toggleTimer() {
            playTickSound(); // تشغيل الصوت القوي

            if (!running) {
                startTime = new Date().getTime() - difference;
                tInterval = setInterval(updateDisplay, 10);
                running = true;
                mainBtn.innerText = "إيقاف";
                mainBtn.style.backgroundColor = "#ff4444";
                mainBtn.style.color = "white";
                resultDisplay.innerText = "";
            } else {
                clearInterval(tInterval);
                running = false;
                mainBtn.innerText = "بدء";
                mainBtn.style.backgroundColor = "#f8f8f8";
                mainBtn.style.color = "#333";
                evaluateResult();
            }
        }

        function updateDisplay() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime;

            let seconds = Math.floor((difference % (1000 * 60)) / 1000);
            let milliseconds = Math.floor((difference % 1000) / 10);

            seconds = (seconds < 10) ? "0" + seconds : seconds;
            milliseconds = (milliseconds < 10) ? "0" + milliseconds : milliseconds;

            display.innerText = "00:" + seconds + "." + milliseconds;
        }

        function evaluateResult() {
            let currentSeconds = difference / 1000;
            let diffFromTarget = Math.abs(currentSeconds - targetTime).toFixed(2);

            if (diffFromTarget == 0.00) {
                 resultDisplay.innerText = "🔥 أسطورة! لقد أصبت 0.67 بالضبط! 🔥";
                 resultDisplay.style.color = "#00ff00";
            } else {
                 resultDisplay.innerText = `الفرق بينك وبين الهدف: ${diffFromTarget} ثانية`;
                 resultDisplay.style.color = "#ffcc00";
            }
        }

        function resetTimer() {
            clearInterval(tInterval);
            running = false;
            difference = 0;
            display.innerText = "00:00.00";
            mainBtn.innerText = "بدء";
            mainBtn.style.backgroundColor = "#f8f8f8";
            mainBtn.style.color = "#333";
            resultDisplay.innerText = "";
        }
    </script>
</body>
</html>
