<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الرسائل - الأجواء الصينية</title>
    <style>
        /* تصميم عام مستوحى من الأجواء الليلية في الصور */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a; /* لون ليلي داكن */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)),
                url('image_2.png'); /* خلفية خفيفة من الصورة لتأثير الأجواء */
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        /* الحاوية الرئيسية بتصميم يشبه المعبد الصيني */
        .container {
            background-color: rgba(40, 0, 0, 0.9); /* أحمر داكن عميق */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3); /* ظل ذهبي */
            width: 90%;
            max-width: 550px;
            text-align: center;
            border: 4px solid #d4af37; /* إطار ذهبي */
            position: relative;
            overflow: hidden;
        }

        /* زخارف جانبية تشبه الفوانيس والأعمدة */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.6;
        }
        
        .container::before {
            top: 20px;
            right: 10px;
            background-image: url('image_1.png'); /* فانوس من الصورة 1 */
        }
        
        .container::after {
            bottom: 20px;
            left: 10px;
            background-image: url('image_1.png'); /* فانوس من الصورة 1 */
            transform: scaleX(-1); /* عكس الاتجاه */
        }

        h2 { 
            color: #d4af37; /* ذهبي */
            margin-bottom: 25px; 
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-family: 'Times New Roman', serif; /* خط كلاسيكي */
        }

        h2::before, h2::after {
            content: ' 🏮 '; /* رموز فوانيس */
        }

        /* تصميم مربعات النص */
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #d4af37;
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 17px;
            margin-bottom: 20px;
            color: #fff;
            transition: 0.3s;
        }

        textarea:focus {
            background-color: rgba(255, 255, 255, 0.2);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* تصميم الأزرار - مستوحى من ألوان المعابد والنار */
        button {
            background: linear-gradient(45deg, #b00000, #ff4500); /* أحمر ناري وزخرفي */
            color: white;
            border: 2px solid #d4af37;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px; /* أزرار دائرية */
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover { 
            background: linear-gradient(45deg, #ff4500, #b00000);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }

        /* صندوق النتيجة - مستوحى من الورق الصيني التقليدي */
        .result-box {
            background-color: #fdf5e6; /* لون ورق معتق */
            color: #333;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #b00000;
            margin-top: 20px;
            text-align: left;
            direction: ltr; /* من اليسار لليمين للإنجليزية */
            min-height: 70px;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace; /* خط يشبه الآلة الكاتبة */
            font-size: 16px;
            position: relative;
        }
        
        .result-box::before {
            content: 'ENG: ';
            font-weight: bold;
            color: #b00000;
        }

        /* زر فتح إنستغرام بلون مميز */
        .ig-button {
            background: #0095f6; /* لون إنستغرام الأزرق الرسمي */
            margin-top: 20px;
            border: none;
        }
        
        .ig-button:hover {
            background: #0077c2;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>بوابة الرسائل الشرقية</h2>
    
    <textarea id="arabicText" placeholder="اكتب رسالتك بالعربية..."></textarea>
    
    <button onclick="translateAndPrepare()">ترجم وانسخ النص 🏮</button>
    
    <div class="result-box" id="englishResult">
        الترجمة الإنجليزية (Google) تظهر هنا...
    </div>
    
    <button onclick="openInstagram()" class="ig-button">افتح رسائل إنستغرام</button>
</div>

<script>
async function translateAndPrepare() {
    const text = document.getElementById('arabicText').value;
    if(!text) { alert('اكتب حاجة أولاً!'); return; }
    
    const resultBox = document.getElementById('englishResult');
    resultBox.innerText = "جاري الترجمة...";
    
    try {
        // استخدام سيرفر ترجمة غوغل المباشر
        // ملاحظة: هذه ترجمة غوغل العادية، وليست لغة شارع (Slang).
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        const translatedText = data[0][0][0];
        
        resultBox.innerText = translatedText;
        
        // نسخ النص تلقائياً للـ Clipboard
        navigator.clipboard.writeText(translatedText);
        alert('تمت الترجمة ونسخ النص! تقدر درك تلصقها (Paste) في إنستغرام.');
    } catch (error) {
        resultBox.innerText = "حدث خطأ في الترجمة، جرب اختصر الجملة.";
    }
}

function openInstagram() {
    // تفتح إنستغرام مباشرة في صفحة الرسائل
    window.open('https://www.instagram.com/direct/inbox/', '_blank');
}
</script>

</body>
</html>
