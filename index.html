<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 RIRI • Premium Data</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 0%, #1a0a2e 0%, #0a0a0f 70%);
        }
        /* ===== GLASS CARD ===== */
        .glass-card {
            max-width: 520px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 32px 28px 30px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
            transition: 0.5s;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,0,80,0.05), transparent, rgba(0,255,200,0.05), transparent);
            animation: rotateGlow 20s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-card > * {
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .brand .icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff0050, #ff6b00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 32px rgba(255,0,80,0.3);
        }
        .header .brand h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header .brand h1 span {
            color: #ff0050;
        }
        .header .badge {
            background: rgba(255,0,80,0.15);
            border: 1px solid rgba(255,0,80,0.25);
            color: #ff0050;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== PROFILE FRAME ===== */
        .profile-frame {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 24px 22px 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 22px;
            transition: 0.4s;
        }
        .profile-frame:hover {
            border-color: rgba(255,0,80,0.15);
            background: rgba(255,255,255,0.04);
        }
        .profile-frame .avatar-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }
        .profile-frame .avatar-row .avatar {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0050, #ff6b00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 40px rgba(255,0,80,0.25);
            border: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .profile-frame .avatar-row .info h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .profile-frame .avatar-row .info p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 2px;
        }
        .profile-frame .avatar-row .info .vip {
            display: inline-block;
            background: #ff0050;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 6px;
        }

        /* ===== DATA ROWS ===== */
        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .data-row:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.06);
        }
        .data-row .label {
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .data-row .value {
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            text-align: right;
        }
        .data-row .value .hidden {
            color: #ff2244;
            letter-spacing: 6px;
            font-weight: 700;
        }
        .data-row .value .highlight {
            color: #ff0050;
            font-weight: 600;
        }
        .data-row .value .location {
            color: #00ffc8;
        }
        .data-row .value .device {
            color: #ffaa44;
        }

        /* ===== PHOTO PLACEHOLDER ===== */
        .photo-section {
            margin: 16px 0 18px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 2px dashed rgba(255,255,255,0.06);
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
        }
        .photo-section:hover {
            border-color: rgba(255,0,80,0.2);
            background: rgba(255,255,255,0.03);
        }
        .photo-section .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 6px;
            opacity: 0.6;
        }
        .photo-section p {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .photo-section .count {
            color: rgba(255,255,255,0.15);
            font-size: 11px;
            margin-top: 4px;
        }

        /* ===== PRICE TAG ===== */
        .price-tag {
            background: linear-gradient(135deg, rgba(255,0,80,0.12), rgba(255,107,0,0.08));
            border: 1px solid rgba(255,0,80,0.15);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0 18px;
        }
        .price-tag .label {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .price-tag .amount {
            color: #00ff41;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 0 40px rgba(0,255,65,0.15);
        }
        .price-tag .amount span {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255,255,255,0.3);
        }

        /* ===== BUTTONS ===== */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 6px;
        }
        .btn {
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            letter-spacing: 0.3px;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff0050, #ff6b00);
            color: #fff;
            box-shadow: 0 8px 32px rgba(255,0,80,0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 48px rgba(255,0,80,0.35);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: rgba(255,34,68,0.12);
            color: #ff2244;
            border: 1px solid rgba(255,34,68,0.15);
        }
        .btn-danger:hover {
            background: rgba(255,34,68,0.2);
            transform: translateY(-2px);
        }
        .btn-success {
            background: rgba(0,255,65,0.08);
            color: #00ff41;
            border: 1px solid rgba(0,255,65,0.12);
        }
        .btn-success:hover {
            background: rgba(0,255,65,0.14);
            transform: translateY(-2px);
        }
        .btn-full {
            grid-column: 1 / -1;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.2);
            font-size: 12px;
        }
        .footer .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff41;
            animation: pulseDot 1.8s infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .footer .version {
            color: rgba(255,255,255,0.08);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* ===== GLOW LINE ===== */
        .glow-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0050, transparent);
            margin: 14px 0 10px;
            opacity: 0.3;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .glass-card {
                padding: 22px 16px 22px;
                border-radius: 24px;
            }
            .profile-frame .avatar-row .avatar {
                width: 56px;
                height: 56px;
                font-size: 22px;
            }
            .profile-frame .avatar-row .info h2 {
                font-size: 18px;
            }
            .data-row {
                padding: 10px 12px;
                font-size: 13px;
            }
            .price-tag .amount {
                font-size: 22px;
            }
            .actions {
                grid-template-columns: 1fr;
            }
            .header .brand h1 {
                font-size: 18px;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,0,80,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="mainCard">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="brand">
                <div class="icon">R</div>
                <h1>RIRI<span>•</span>DB</h1>
            </div>
            <div class="badge">✦ premium</div>
        </div>

        <!-- ===== PROFILE FRAME ===== -->
        <div class="profile-frame">
            <div class="avatar-row">
                <div class="avatar">R</div>
                <div class="info">
                    <h2>
                        RIRI
                        <span class="vip">★ vip</span>
                    </h2>
                    <p>_jabonia_x5 • Tunisia</p>
                </div>
            </div>

            <!-- ===== DATA GRID ===== -->
            <div class="data-grid">
                <div class="data-row">
                    <span class="label">Username</span>
                    <span class="value">_jabonia_x5</span>
                </div>
                <div class="data-row">
                    <span class="label">Password</span>
                    <span class="value"><span class="hidden">•••••</span></span>
                </div>
                <div class="data-row">

                </div>
                <div class="data-row">
                    <span class="label">Phone</span>
                    <span class="value"><span class="highlight">+216 98 765 432</span></span>
                </div>
                <div class="data-row">
                    <span class="label">Location</span>
                    <span class="value"><span class="location">🇹🇳 Tunis, Tunisia</span></span>
                </div>
                <div class="data-row">
                    <span class="label">Device</span>
                    <span class="value"><span class="device">📱 Itel A16</span></span>
                </div>
            </div>
        </div>

        <!-- ===== PHOTO SECTION ===== -->
        <div class="photo-section" onclick="alert('📸 Loading media from target...\n\n🔹 23 photos\n🔹 4 videos\n🔹 Last update: 2 min ago')">
            <span class="icon">🖼️</span>
            <p>📸 Target Media</p>
            <div class="count">23 photos • 4 videos • 2 min ago</div>
        </div>

        <!-- ===== PRICE TAG ===== -->
        <div class="price-tag">
            <span class="label">💎 Data Package</span>
            <span class="amount">$80 <span>USD</span></span>
        </div>

        <!-- ===== GLOW LINE ===== -->
        <div class="glow-line"></div>

        <!-- ===== ACTIONS ===== -->
        <div class="actions">
            <button class="btn btn-primary" onclick="executeExploit()">🚀 Execute</button>
            <button class="btn btn-success" onclick="buyData()">💰 Buy Data</button>
            <button class="btn btn-secondary" onclick="showMatrix()">🌀 Matrix</button>
            <button class="btn btn-danger" onclick="wipeData()">💣 Wipe</button>
            <button class="btn btn-secondary btn-full" onclick="alert('📱 Full profile exported.\n\n🔹 Username: _jabonia_x5\n🔹 IG: @_jabonia_x5\n🔹 Phone: +216 98 765 432\n🔹 Location: Tunis, Tunisia\n🔹 Device: Itel A16\n🔹 Price: $80')">
                📋 Export Profile
            </button>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">
            <div class="status">
                <span class="dot"></span>
                <span>Secure • Online</span>
            </div>
            <div class="version">v4.2 • 4K</div>
        </div>
    </div>

    <script>
        // ===== التأثيرات =====

        // 1. Execute Exploit
        function executeExploit() {
            const card = document.getElementById('mainCard');
            const rows = document.querySelectorAll('.data-row');
            
            // تأثير اهتزاز
            card.style.transition = '0.1s';
            card.style.transform = 'scale(0.98)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);

            // تغيير الألوان مؤقتاً
            rows.forEach((row, i) => {
                setTimeout(() => {
                    row.style.background = 'rgba(255,0,80,0.08)';
                    row.style.borderColor = 'rgba(255,0,80,0.2)';
                    setTimeout(() => {
                        row.style.background = 'rgba(255,255,255,0.02)';
                        row.style.borderColor = 'rgba(255,255,255,0.03)';
                    }, 600);
                }, i * 100);
            });

            alert('🚀 Exploit executed successfully!\n\n🔹 Target: _jabonia_x5\n🔹 Status: COMPROMISED\n🔹 Data extracted: 100%');
        }

        // 2. Buy Data
        function buyData() {
            alert('💰 PURCHASE COMPLETE!\n\n🔹 Package: RIRI Premium Data\n🔹 Price: $80 USD\n🔹 Status: Payment confirmed\n🔹 Data sent to your email');
        }

        // 3. Show Matrix
        function showMatrix() {
            const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';
            let text = '';
            for (let i = 0; i < 3000; i++) {
                text += chars[Math.floor(Math.random() * chars.length)] + ' ';
                if (i % 60 === 0) text += '\n';
            }
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #00ff41;
                font-family: 'Courier New', monospace;
                font-size: 14px;
                line-height: 1.2;
                padding: 20px;
                z-index: 9999;
                opacity: 0;
                transition: 0.5s;
                overflow: hidden;
                pointer-events: none;
                word-break: break-all;
                white-space: pre-wrap;
            `;
            overlay.textContent = text;
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                overlay.style.opacity = '0.08';
            }, 50);
            
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    document.body.removeChild(overlay);
                }, 600);
            }, 3500);
        }

        // 4. Wipe Data
        function wipeData() {
            const rows = document.querySelectorAll('.data-row');
            
            rows.forEach((row, i) => {
                setTimeout(() => {
                    row.style.transition = 'all 0.25s ease';
                    row.style.background = 'rgba(255,34,68,0.15)';
                    row.style.borderColor = '#ff2244';
                    row.style.transform = 'scale(0.95)';
                    row.style.opacity = '0';
                    row.style.height = '0';
                    row.style.padding = '0';
                    row.style.margin = '0';
                    row.style.border = 'none';
                    row.style.overflow = 'hidden';
                    
                    if (i === rows.length - 1) {
                        setTimeout(() => {
                            alert('💀 All data has been wiped successfully!\n\n🔹 Target: _jabonia_x5\n🔹 Status: EMPTY');
                        }, 300);
                    }
                }, i * 150);
            });

            // تعطيل الأزرار مؤقتاً
            const btns = document.querySelectorAll('.btn');
            btns.forEach(b => {
                b.style.opacity = '0.4';
                b.style.pointerEvents = 'none';
            });
            setTimeout(() => {
                btns.forEach(b => {
                    b.style.opacity = '1';
                    b.style.pointerEvents = 'auto';
                });
            }, 3000);
        }

        // ===== تأثير الدخول =====
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px) scale(0.96)';
            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0) scale(1)';
            }, 100);
        });
    </script>
</body>
