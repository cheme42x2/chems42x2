<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple of Fortune</title>
    <style>
        :root {
            --bg-color: #0c1a0c;
            --tile-bg: #2d1a0d;
            --tile-border: #4d3320;
            --accent-blue: #3484c2;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-between;
        }

        /* الهيدر */
        .header {
            background: #183318;
            padding: 10px 30px;
            border-radius: 25px;
            margin-top: 15px;
            font-weight: bold;
            border: 1px solid #2d5a2d;
        }

        /* الشبكة */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .tile {
            width: 55px;
            height: 55px;
            background: var(--tile-bg);
            border: 3px solid var(--tile-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
        }

        /* التحكم */
        .footer-controls {
            background: #122212;
            padding: 20px;
            width: 100%;
            border-top: 2px solid #1f3a1f;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .bet-input-box {
            background: #0f1d0f;
            padding: 10px;
            border-radius: 5px;
            width: 80%;
            text-align: center;
            border: 1px solid #333;
        }

        .btn-bet {
            background: var(--accent-blue);
            color: white;
            padding: 12px 60px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">الرصيد: 3000 دج</div>

    <div class="grid-container" id="gameGrid"></div>

    <div class="footer-controls">
        <div class="bet-input-box">
            <input type="number" value="50" style="background:transparent; border:none; color:white; width: 60px; text-align:center;">
            <span>د.ج</span>
        </div>
        <button class="btn-bet" onclick="initGame()">الرهان</button>
    </div>

    <script>
        // المنطق: 7 أسطر، زيادة الفخاخ (التفاح المعضوض)
        // 0: آمن (🍎), 1: فخ (🍏)
        const trapPattern = [1, 1, 2, 2, 3, 3, 4]; 
        
        function initGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            trapPattern.forEach((numTraps) => {
                let row = new Array(5).fill('safe');
                for(let i=0; i<numTraps; i++) row[i] = 'trap';
                row.sort(() => Math.random() - 0.5); // خلط عشوائي

                row.forEach(type => {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.onclick = function() {
                        this.style.background = '#2a1f18';
                        this.innerText = (type === 'trap') ? '🍏' : '🍎';
                        if(type === 'trap') {
                            setTimeout(() => alert('خسرت!'), 200);
                        }
                    };
                    grid.appendChild(tile);
                });
            });
        }
        initGame();
    </script>
</body>
</html>
