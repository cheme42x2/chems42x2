<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .wallet { width: 350px; background: #1a1a1a; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance { font-size: 2.5em; font-weight: bold; margin-bottom: 5px; }
        .currency { color: #888; margin-bottom: 20px; }
        .token { background: #262626; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="wallet">
    <div class="currency">رصيد المحفظة</div>
    <div class="balance">$1,279.00</div>
    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    
    <div class="token">
        <span>Bitcoin (BTC)</span>
        <span>0.02 BTC</span>
    </div>
    <div class="token">
        <span>Ethereum (ETH)</span>
        <span>0.5 ETH</span>
    </div>
</div>

</body>
</html>
