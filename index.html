<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الحالي - القاهرة</title>
    
    <!-- روابط CDN متوافقة وآمنة تماماً مع خوادم GitHub -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" integrity="sha512-Zcn694qR58c15Snpf77tr55JzvwkdKpdBtGgcCnQ16mJcdUeTkp06LJapW5dfN0K4b7bTwsf7C5Z2q17nKzN3A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" integrity="sha512-BwHfrr4c9kmR7FgbQMi5r4stnEQMdBndunQpeOUhtTwQnXq5xn51HjWzA7LI569ES35qE0CDLgOPq9cclWTEog==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .location-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
            border-right: 5px solid #0078ff;
        }

        .location-panel h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 18px;
        }

        .location-panel p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .leaflet-popup-content-wrapper {
            direction: rtl;
            text-align: right;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="location-panel">
        <h3>نظام تحديد المواقع (GPS)</h3>
        <p><strong>الموقع الحالي:</strong> منطقة 70 مسكن، عين شمس، القاهرة، مصر.</p>
        <p><strong>حالة الاتصال:</strong> نشط الآن</p>
        <span class="status-badge">أنت متواجد هنا حالياً</span>
    </div>

    <div id="map"></div>

    <script>
        // إحداثيات منطقة الـ 70 مسكن بالقاهرة
        const lat = 30.1245;
        const lng = 31.3395;

        // تهيئة الخريطة
        const map = L.map('map').setView([lat, lng], 16);

        // استخدام رابط خريطة آمن تماماً ومتوافق
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // إضافة الدليل
        const marker = L.marker([lat, lng]).addTo(map);

        // النافذة التلقائية لتوثيق السكن
        marker.bindPopup(`
            <div style="font-family: sans-serif; padding: 5px; min-width: 150px;">
                <h4 style="margin: 0 0 5px 0; color: #0078ff;">موقعي السكني الحالي</h4>
                <p style="margin: 0; font-size: 13px; color: #555;">
                    <b>العنوان:</b> مساكن الـ 70، القاهرة.<br>
                    <span style="color: #28a745; font-weight: bold;">✓ تم التحقق من الموقع عبر الـ GPS</span>
                </p>
            </div>
        `).openPopup();

        // دائرة دقة الـ GPS الواقعية
        L.circle([lat, lng], {
            color: '#0078ff',
            fillColor: '#0078ff',
            fillOpacity: 0.15,
            radius: 120
        }).addTo(map);
    </script>

</body>
</html>
