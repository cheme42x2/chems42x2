<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131825;
            --accent-primary: #fe2c55;
            --accent-secondary: #25f4ee;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --glow: 0 0 30px rgba(254, 44, 85, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 20% 30%, rgba(254, 44, 85, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(37, 244, 238, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), var(--glow);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .badge-verified {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(37, 244, 238, 0.1);
            color: var(--accent-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(37, 244, 238, 0.2);
        }

        .profile-header {
            text-align: center;
            margin-top: 10px;
        }

        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-secondary);
            box-shadow: 0 0 20px rgba(37, 244, 238, 0.3);
        }

        .username {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .handle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 10px;
            margin-bottom: 25px;
            text-align: center;
        }

        .stat-item .number {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-item .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
        }

        .price-section {
            background: linear-gradient(135deg, rgba(254, 44, 85, 0.1), rgba(37, 244, 238, 0.05));
            border: 1px solid rgba(254, 44, 85, 0.3);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .price-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .price-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(254, 44, 85, 0.4);
        }

        .info-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
        }

        .info-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-key {
            color: var(--text-muted);
        }

        .info-val {
            font-weight: 600;
            color: var(--text-main);
            font-family: monospace;
        }

        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            color: var(--text-muted);
            font-size: 20px;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), #ff4d6d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(254, 44, 85, 0.4);
        }

        .contact-section {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .contact-section a {
            color: var(--accent-secondary);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: opacity 0.2s;
        }

        .contact-section a:hover {
            opacity: 0.8;
        }
    </style>
</head>
