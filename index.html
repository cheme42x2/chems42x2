<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sultana Sanctuary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            background: #050505;
            height: 100%;
            display: flex;
            justify-content: center; align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 50px 30px;
            width: 90%; 
            max-width: 450px; /* تحكمنا في العرض باش يجي "زومي" */
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            transition: 0.5s;
        }

        .crown { font-size: 6rem; margin-bottom: 10px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { color: #ffd700; font-size: 2.8rem; margin: 0; text-shadow: 0 0 20px #ffd700; }
        p { color: #fff; font-size: 1.4rem; margin: 20px 0; }

        .btn {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none; padding: 18px 50px;
            border-radius: 50px; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s; color: black;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ffd700; }

        /* شاشة الدخول السرية */
        #secretZone {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000;
            justify-content: center; align-items: center;
            flex-direction: column;
            color: #ffd700;
            opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="crown">👑</div>
        <h1>مملكة ريري</h1>
        <p>مرحباً بكِ في الملاذ الذهبي. هل أنتِ جاهزة لفتح الباب الملكي؟ ✨</p>
        <button class="btn" onclick="enterKingdom()">دخول العرش</button>
    </div>

    <div id="secretZone">
        <h1 style="font-size: 3rem;">أهلاً بكِ في عرشكِ يا ريري 👑</h1>
        <p style="color:white;">لقد تم فتح الباب.. الملاذ الآن لكِ وحدكِ.</p>
    </div>

    <script>
        function enterKingdom() {
            const card = document.getElementById('mainCard');
            const zone = document.getElementById('secretZone');
            
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.display = 'none';
                zone.style.display = 'flex';
                setTimeout(() => { zone.style.opacity = '1'; }, 50);
            }, 500);
        }
    </script>
</body>
</html>
