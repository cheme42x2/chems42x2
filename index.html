<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن جواهر فري فاير التلقائي</title>
    <style>
        :root {
            --primary-color: #ff6200;
            --secondary-color: #1a1a2e;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #15102a);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--secondary-color);
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 25px rgba(255, 98, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 98, 0, 0.5);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ddd;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #0f0f23;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            transition: 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 98, 0, 0.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            background-color: #0f0f23;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            border-color: #555;
            transform: translateY(-2px);
        }

        .option-card.selected {
            border-color: var(--accent-color);
            background: linear-gradient(90deg, #0f0f23, #112b3c);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .diamonds {
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diamonds::before {
            content: "💎";
        }

        .price {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 16px;
        }

        .btn-pay {
            background: linear-gradient(90deg, #ff6200, #ff8c00);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 98, 0, 0.4);
        }

        .btn-pay:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* واجهات الانتظار والنجاح */
        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--secondary-color);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        /* أنيميشن التحميل */
        .loader {
            border: 5px solid #333;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 60px;
            color: #00ffcc;
            margin-bottom: 20px;
            animation: pop 0.5s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-interface">
            <h2>مركز شحن فري فاير الإحترافي</h2>
            
            <div class="input-group">
                <label for="player-id">أدخل معرف اللاعب (ID):</label>
                <input type="number" id="player-id" placeholder="مثال: 123456789" required>
            </div>

            <label style="text-align: right; display: block; margin-bottom: 8px; font-weight: bold; color: #ddd;">اختر كمية الجواهر:</label>
            <div class="options-grid">
                <div class="option-card" onclick="selectOption(this, '210', '2.99')">
                    <span class="diamonds">210 جوهرة</span>
                    <span class="price">2,99$</span>
                </div>
                <div class="option-card" onclick="selectOption(this, '520', '3.99')">
                    <span class="diamonds">520 جوهرة</span>
                    <span class="price">3.99$</span>
                </div>
                <div class="option-card" onclick="selectOption(this, '1080', '6.99')">
                    <span class="diamonds">1080 جوهرة</span>
                    <span class="price">6.99$</span>
                </div>
                <div class="option-card" onclick="selectOption(this, '2160', '13.99')">
                    <span class="diamonds">2160 جوهرة</span>
                    <span class="price">13.99$</span>
                </div>
            </div>

            <button class="btn-pay" onclick="startProcess()">تأكيد الدفع والشحن</button>
        </div>

        <div id="loading-overlay" class="overlay">
            <div class="loader"></div>
            <h3>جاري معالجة عملية الدفع...</h3>
            <p style="color: #aaa; font-size: 14px;">يرجى الانتظار 5 ثوانٍ، لا تغلق الصفحة.</p>
        </div>

        <div id="success-overlay" class="overlay">
            <div class="success-icon">✔</div>
            <h3 style="color: var(--accent-color);">تم الشحن بنجاح!</h3>
            <p id="success-msg" style="padding: 0 20px; line-height: 1.6;"></p>
            <button class="btn-pay" style="width: auto; padding: 10px 30px; margin-top: 15px; background: #333;" onclick="resetForm()">إغلاق</button>
        </div>
    </div>

    <script>
        let selectedAmount = '';
        let selectedPrice = '';

        function selectOption(element, diamonds, price) {
            // حذف التحديد من الخيارات الأخرى
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
            });
            // إضافة التحديد للبطاقة المضغوطة
            element.classList.add('selected');
            selectedAmount = diamonds;
            selectedPrice = price;
        }

        function startProcess() {
            const playerId = document.getElementById('player-id').value;

            // التحقق من إدخال الـ ID واختيار العرض
            if (!playerId) {
                alert('الرجاء إدخال ID اللاعب أولاً!');
                return;
            }
            if (!selectedAmount) {
                alert('الرجاء اختيار كمية الجواهر المراد شحنها!');
                return;
            }

            // إظهار واجهة الانتظار
            document.getElementById('loading-overlay').style.display = 'flex';

            // انتهاء الـ 5 ثواني
            setTimeout(() => {
                // إخفاء واجهة الانتظار
                document.getElementById('loading-overlay').style.display = 'none';
                
                // تحضير رسالة النجاح وتخصيصها بالـ ID
                const msg = `تم إرسال <b>${selectedAmount} جوهرة</b> بنجاح إلى الحساب ذو المعرف (<b>${playerId}</b>).<br> تم خصم ${selectedPrice}$ من حسابك.`;
                document.getElementById('success-msg').innerHTML = msg;

                // إظهار واجهة النجاح
                document.getElementById('success-overlay').style.display = 'flex';
            }, 5000); // 5000 ميلي ثانية تعني 5 ثواني
        }

        function resetForm() {
            // إعادة ضبط الصفحة للبدء من جديد
            document.getElementById('success-overlay').style.display = 'none';
            document.getElementById('player-id').value = '';
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
            });
            selectedAmount = '';
            selectedPrice = '';
        }
    </script>
</body>
</html>
