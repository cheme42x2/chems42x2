<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 FF SCRIPT PANEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .panel {
            background: #111;
            border: 2px solid #ff2200;
            border-radius: 25px;
            padding: 30px 25px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 50px #ff220055;
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #ff220066;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #ff2200;
            font-size: 28px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #ff2200;
        }
        .header p {
            color: #888;
            font-size: 12px;
            letter-spacing: 2px;
        }
        .feature {
            background: #1a1a1a;
            border-left: 4px solid #ff2200;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .feature .label {
            color: #ccc;
            font-size: 14px;
            font-weight: 600;
        }
        .feature .status {
            color: #0f0;
            font-size: 12px;
            background: #0f0a0a;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #0f0;
        }
        .feature .status.off {
            color: #ff4444;
            border-color: #ff4444;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #ff2200, #cc1100);
            border: none;
            border-radius: 60px;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            box-shadow: 0 0 30px #ff220066;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 60px #ff220099;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .footer {
            text-align: center;
            color: #444;
            font-size: 10px;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        .version {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin: 15px 0 10px;
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="panel">
    <div class="header">
        <h1>🔥 FF SCRIPT</h1>
        <p>⚡ MTH TEAM • PROXY ACTIVE</p>
    </div>

    <div class="feature">
        <span class="label">🔁 Fast Switch</span>
        <span class="status">ON</span>
    </div>
    <div class="feature">
        <span class="label">🦘 Super Pulo</span>
        <span class="status">ON</span>
    </div>
    <div class="feature">
        <span class="label">🎯 Aim Assist</span>
        <span class="status">ON</span>
    </div>
    <div class="feature">
        <span class="label">📈 Sensi Unlock</span>
        <span class="status">ON</span>
    </div>
    <div class="feature">
        <span class="label">💀 HS Alto</span>
        <span class="status">ON</span>
    </div>
    <div class="feature">
        <span class="label">🎯 HS Pescoço</span>
        <span class="status off">OFF</span>
    </div>

    <div class="version">📌 Free Fire v1.128.2</div>

    <!-- زر المواصلة -->
    <button class="btn" onclick="openFreeFire()">▶ المواصلة</button>

    <div class="footer">🔰 KORTESX • SCRIPT LOADED</div>
</div>

<script>
    function openFreeFire() {
        // محاولة فتح Free Fire عبر Intent URL
        window.location.href = "intent://com.dts.freefiremax/#Intent;action=android.intent.action.VIEW;category=android.intent.category.DEFAULT;end";

        // إذا فشل (على متصفح لا يدعم)، نفتح صفحة Google Play
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.dts.freefiremax";
        }, 800);
    }
</script>
</body>
</html>
