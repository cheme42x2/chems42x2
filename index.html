<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Details</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --card-bg: #121212;
            --input-bg: #1a1a1a;
            --border: #333;
            --primary-blue: #2563eb;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-body); display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--text-main);
        }

        /* Container */
        .modal { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; width: 350px; 
            border: 1px solid #222; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.5rem; margin-bottom: 25px; font-weight: 600; }

        /* Form Elements */
        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 10px; color: white; box-sizing: border-box; font-size: 1rem;
        }
        input::placeholder { color: var(--text-dim); }
        
        button { 
            width: 100%; padding: 15px; background: var(--primary-blue); color: white; 
            border: none; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer;
        }

        /* Loading & Success States */
        #loading, #success { display: none; text-align: center; }
        .spinner { 
            border: 4px solid #333; border-top: 4px solid var(--primary-blue); border-radius: 50%; 
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="modal" id="main-card">
    <h2 id="title">Withdrawal Details</h2>
    
    <!-- Form -->
    <div id="form-content">
        <div class="input-group">
            <input type="text" placeholder="Bank Name" id="bank">
        </div>
        <div class="input-group">
            <input type="text" placeholder="Account Number" id="acc">
        </div>
        <div class="input-group">
            <input type="number" placeholder="Amount ($)" id="amount">
        </div>
        <button onclick="processWithdrawal()">Confirm Withdrawal</button>
    </div>

    <!-- Loading State -->
    <div id="loading">
        <div class="spinner"></div>
        <p style="color: var(--text-dim);">Processing transaction...</p>
    </div>

    <!-- Success State -->
    <div id="success">
        <h2 style="color: #22c55e;">Success!</h2>
        <p>Your withdrawal of <span id="final-amount"></span> has been requested.</p>
        <button onclick="location.reload()" style="background: #333;">Close</button>
    </div>
</div>

<script>
    function processWithdrawal() {
        // التحقق من البيانات
        if(document.getElementById('amount').value === "") { alert("Please enter amount"); return; }
        
        // إخفاء الفورم وإظهار الـ Loading
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('title').innerText = "Processing...";
        document.getElementById('loading').style.display = 'block';

        // محاكاة الإرسال
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('title').style.display = 'none';
            document.getElementById('final-amount').innerText = "$" + document.getElementById('amount').value;
            document.getElementById('success').style.display = 'block';
        }, 3000); // 3 ثواني وقت المعالجة
    }
</script>

</body>
</html>
