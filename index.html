<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الحالي - القاهرة</title>
    
    <!-- تحميل ملفات مكتبة Leaflet للخرائط -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* إعدادات الصفحة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الخريطة */
        #map {
            width: 100%;
            height: 100vh; /* ملء الشاشة كاملة لتبدو واقعية */
        }

        /* لوحة معلومات الموقع (تظهر فوق الخريطة) */
        .location-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
            border-right: 5px solid #0078ff;
        }

        .location-panel h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 18px;
        }

        .location-panel p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* تعديل تصميم النافذة المنبثقة داخل الخريطة */
        .leaflet-popup-content-wrapper {
            direction: rtl;
            text-align: right;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- لوحة المعلومات العلوية -->
    <div class="location-panel">
        <h3>نظام تحديد المواقع (GPS)</h3>
        <p><strong>الموقع الحالي:</strong> منطقة 70 مسكن، عين شمس، القاهرة، مصر.</p>
        <p><strong>حالة الاتصال:</strong> نشط الآن</p>
        <span class="status-badge">أنت متواجد هنا حالياً</span>
    </div>

    <!-- حاوية الخريطة -->
    <div id="map"></div>

    <script>
        // إحداثيات منطقة الـ 70 مسكن في عين شمس بالقاهرة
        const latitude = 30.1245;
        const longitude = 31.3395;

        // 1. إنشاء الخريطة وتثبيت الرؤية على الإحداثيات مع درجة تقريب عالية (Zoom = 16) لتبدو دقيقة
        const map = L.map('map').setView([latitude, longitude], 16);

        // 2. إضافة طبقة الخرائط (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. إضافة الدليل (المؤشر الأزرق) لتحديد موقعك بالضبط
        const marker = L.marker([latitude, longitude]).addTo(map);

        // 4. إضافة نافذة منبثقة تفتح تلقائياً لتؤكد سكنك وتواجدك هناك
        marker.bindPopup(`
            <div style="font-family: sans-serif; padding: 5px;">
                <h4 style="margin: 0 0 5px 0; color: #0078ff;">موقعي السكني الحالي</h4>
                <p style="margin: 0; font-size: 13px; color: #555;">
                    <b>العنوان:</b> مساكن الـ 70، القاهرة.<br>
                    <span style="color: #28a745; font-weight: bold;">✓ تم التحقق من الموقع عبر الـ GPS</span>
                </p>
            </div>
        `).openPopup(); // openPopup تجعلها تفتح مباشرة عند تحميل الصفحة

        // 5. إضافة دائرة دقة زرقاء شفافة حول الموقع لتوحي بأن الـ GPS يلتقط إشارتك الحالية واقعياً
        L.circle([latitude, longitude], {
            color: '#0078ff',
            fillColor: '#0078ff',
            fillOpacity: 0.15,
            radius: 100 // قطر الدائرة 100 متر
        }).addTo(map);
    </script>

</body>
</html>
