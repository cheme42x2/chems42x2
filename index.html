<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sakinah | الملاذ الحسي</title>
    <style>
        body { background: #05070a; color: #c5a059; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: background 2s; }
        .menu { text-align: center; z-index: 10; }
        .btn { border: 1px solid #c5a059; padding: 20px 40px; color: #c5a059; cursor: pointer; background: transparent; margin: 10px; transition: 0.5s; font-size: 1.2rem; }
        .btn:hover { background: #c5a059; color: #000; }
        
        #game-area, #sleep-area { display: none; width: 100%; height: 100%; position: absolute; top:0; }
        
        /* شمعة القلق */
        .candle { width: 40px; height: 100px; background: #1a1a1a; display: inline-block; margin: 20px; cursor: pointer; border-radius: 5px; position: relative; }
        .flame { width: 10px; height: 20px; background: #ffcc00; border-radius: 50%; position: absolute; top: -25px; left: 15px; animation: flicker 0.2s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        /* محرك التنويم */
        .hypno { width: 300px; height: 300px; border: 2px solid #c5a059; border-radius: 50%; animation: spin 20s linear infinite; margin: auto; margin-top: 150px; }
        @keyframes spin { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.5); } }
    </style>
</head>
<body>

    <div class="menu" id="main">
        <h1>S A K I N A H</h1>
        <div class="btn" onclick="showGame()">ابدأ تفريغ التوتر (لعبة الشموع)</div>
        <div class="btn" onclick="showSleep()">الدخول في حالة التنويم (نوم عميق)</div>
    </div>

    <div id="game-area">
        <div style="text-align: center; padding-top: 50px;">
            <h2>أطفئ شموع القلق واحدة تلو الأخرى...</h2>
            <div id="candles"></div>
        </div>
    </div>

    <div id="sleep-area" onclick="location.reload()">
        <div class="hypno"></div>
        <p style="text-align: center; margin-top: 50px;">راقب الدوران... لا تقاوم النوم...</p>
    </div>

    <script>
        function showGame() {
            document.getElementById('main').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            for(let i=0; i<10; i++) {
                let c = document.createElement('div');
                c.className = 'candle';
                c.innerHTML = '<div class="flame"></div>';
                c.onclick = function() { this.style.opacity = '0.1'; };
                document.getElementById('candles').appendChild(c);
            }
        }
        function showSleep() {
            document.getElementById('main').style.display = 'none';
            document.getElementById('sleep-area').style.display = 'block';
            document.body.style.background = '#000';
        }
    </script>
</body>
</html>
