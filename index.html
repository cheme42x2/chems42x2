<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
  <title>JADOU | ورشة الفرنسية</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Tajawal', 'Poppins', sans-serif;
      min-height: 100vh;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* خلفية كونية غامرة 4K */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(100, 50, 200, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(10, 180, 220, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 40% 80%, rgba(220, 80, 150, 0.15) 0%, transparent 55%),
        linear-gradient(135deg, #03030f 0%, #0f0b20 40%, #020616 100%);
      background-size: cover;
      z-index: -2;
      will-change: transform;
    }

    /* شبكة ديناميكية ناعمة */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: -1;
      pointer-events: none;
      animation: gridShift 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
    }

    @keyframes gridShift {
      0% { transform: translateY(0px) scale(1); }
      100% { transform: translateY(-10px) scale(1.02); }
    }

    .main-card {
      width: 100%;
      max-width: 850px;
      background: rgba(10, 12, 30, 0.45);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 3.5rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 
        0 35px 70px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 0 40px rgba(255, 255, 255, 0.03);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      color: #f0eefc;
      will-change: transform, box-shadow;
      animation: floatCard 7s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.005); }
    }

    .main-card:hover {
      box-shadow: 0 45px 90px rgba(80, 60, 200, 0.3), 0 0 0 1px rgba(200, 180, 255, 0.25);
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #d9b3ff 0%, #8ec5ff 50%, #fbc2eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(180, 130, 255, 0.5);
      margin-bottom: 0.3rem;
      line-height: 1.2;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
      animation: titleGlow 3s infinite alternate;
    }

    @keyframes titleGlow {
      0% { text-shadow: 0 0 25px rgba(180, 130, 255, 0.4); }
      100% { text-shadow: 0 0 45px rgba(130, 200, 255, 0.7); }
    }

    .sub {
      font-size: 1.2rem;
      color: #b9c2e6;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.03);
      padding: 0.7rem 1.5rem;
      border-radius: 4rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
    }

    .lang-selector {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin: 1.8rem 0 1.5rem;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: rgba(20, 20, 45, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 0.8rem 1.8rem;
      border-radius: 3rem;
      font-weight: bold;
      font-size: 1.2rem;
      color: #e2dcff;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      mix-blend-mode: normal;
      will-change: transform;
    }

    .lang-btn.active {
      background: rgba(140, 100, 250, 0.35);
      border-color: #c7abff;
      box-shadow: 0 0 35px rgba(170, 120, 255, 0.8);
      transform: scale(1.05) translateY(-3px);
      color: white;
      text-shadow: 0 0 12px white;
    }

    .level-badge {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem 0 1.8rem;
    }

    .level-item {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 0.5rem 1.8rem;
      border-radius: 3rem;
      font-weight: 700;
      color: #cfc8ff;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .level-item.highlight {
      background: rgba(240, 200, 255, 0.2);
      border-color: #e2b0ff;
      color: #fff;
      box-shadow: 0 0 28px #b77eff;
      text-shadow: 0 0 10px white;
    }

    .text-card {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 2.5rem;
      padding: 2rem;
      margin: 1.5rem 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.04), 0 25px 40px -15px black;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform: scale(1);
    }

    .french-text {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.6;
      word-break: break-word;
      background: linear-gradient(to right, #f5f0ff, #d9e2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.2rem;
      text-shadow: 0 0 8px rgba(0,0,0,0.5);
      letter-spacing: -0.3px;
    }

    .translation-box {
      background: rgba(10, 5, 30, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      margin: 1.4rem 0;
      font-size: 1.3rem;
      color: #ffe9b6;
      border-right: 4px solid #fbbf24;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      transition: all 0.35s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.8rem;
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.5px;
      transform: translateY(0);
    }

    .action-btn:hover {
      background: rgba(170, 130, 255, 0.3);
      border-color: #cfb3ff;
      box-shadow: 0 0 35px #8b5cf6;
      transform: translateY(-4px) scale(1.03);
    }

    .audio-btn {
      background: rgba(250, 180, 100, 0.2);
      border-color: #ffb27f;
    }

    .audio-btn:hover {
      background: #ff9248;
      box-shadow: 0 0 45px #ff7b2b;
    }

    .key-badge {
      background: linear-gradient(145deg, #2e1a4a, #110b24);
      padding: 0.5rem 2rem;
      border-radius: 3rem;
      display: inline-block;
      font-weight: bold;
      font-size: 0.9rem;
      margin-top: 1.5rem;
      color: #f5e4ff;
      box-shadow: 0 0 25px #a660ff;
      backdrop-filter: blur(10px);
      text-shadow: 0 0 5px black;
    }

    @media (max-width: 550px) {
      .main-card {
        padding: 1.5rem;
      }
      .french-text {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="main-card" id="mainCard">
  <h1>✨ JADOU ✨</h1>
  <div class="sub">
    <span>🔑 KEY : <span style="color:#FFD966;">JAD-2026</span></span>
    <span style="margin-right: auto;">Aura ⚡</span>
  </div>

  <!-- اختيار اللغة -->
  <div class="lang-selector" id="langSelector">
    <button class="lang-btn active" data-lang="fr">🇫🇷 Français</button>
    <button class="lang-btn" data-lang="en">🇬🇧 English</button>
    <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
  </div>

  <!-- المستوى -->
  <div class="level-badge">
    <span class="level-item highlight" id="currentLevelDisplay">A1 · débutant</span>
  </div>

  <!-- بطاقة النص -->
  <div class="text-card" id="textCard">
    <div class="french-text" id="frenchSentence">Bonjour, je m'appelle Jad.</div>
    <div class="translation-box" id="translationContainer" style="display: flex;">
      <span id="translationText">مرحباً، اسمي جاد.</span>
      <span style="opacity:0.7; font-size:0.9rem;">📖 عرض الترجمة</span>
    </div>

    <div class="btn-group">
      <button class="action-btn" id="changeTextBtn"><span>🔄</span> تغيير النص</button>
      <button class="action-btn audio-btn" id="speakBtn"><span>🔊</span> استمع للنطق</button>
    </div>
  </div>

  <div style="text-align: center; margin-top: 0.5rem;">
    <span class="key-badge">🔐 JADOU · ورشة عمل احترافية</span>
  </div>
</div>

<script>
  (function() {
    // --- قاعدة بيانات النصوص متعددة اللغات والمستويات ---
    const textsDB = {
      fr: {
        A1: [
          { text: "Bonjour, je m'appelle Jad.", translation: "مرحباً، اسمي جاد." },
          { text: "J'aime le chocolat.", translation: "أنا أحب الشوكولاتة." },
          { text: "Le chat est petit.", translation: "القط صغير." },
          { text: "Je vais à l'école.", translation: "أنا أذهب إلى المدرسة." }
        ],
        A2: [
          { text: "Hier, j'ai mangé une pizza délicieuse.", translation: "بالأمس، أكلت بيتزا لذيذة." },
          { text: "Je voudrais un verre d'eau, s'il vous plaît.", translation: "أود كأس ماء، من فضلك." }
        ],
        B1: [
          { text: "Si j'avais du temps, je voyagerais en France.", translation: "إذا كان لدي وقت، لسافرت إلى فرنسا." }
        ]
      },
      en: {
        A1: [
          { text: "Hello, my name is Jad.", translation: "مرحباً، اسمي جاد." },
          { text: "I like apples.", translation: "أنا أحب التفاح." }
        ],
        A2: [
          { text: "Yesterday I watched a nice movie.", translation: "بالأمس شاهدت فيلماً لطيفاً." }
        ]
      },
      ru: {
        A1: [
          { text: "Привет, меня зовут Джад.", translation: "مرحباً، اسمي جاد." },
          { text: "Я люблю чай.", translation: "أنا أحب الشاي." }
        ]
      }
    };

    // الحالة الحالية
    let currentLang = 'fr';
    let currentLevel = 'A1'; // يبدأ من A1 كما طلب
    let currentTextObj = { text: "Bonjour, je m'appelle Jad.", translation: "مرحباً، اسمي جاد." };

    // عناصر DOM
    const frenchSentenceEl = document.getElementById('frenchSentence');
    const translationTextEl = document.getElementById('translationText');
    const translationContainer = document.getElementById('translationContainer');
    const currentLevelDisplay = document.getElementById('currentLevelDisplay');
    const langButtons = document.querySelectorAll('.lang-btn');
    const changeTextBtn = document.getElementById('changeTextBtn');
    const speakBtn = document.getElementById('speakBtn');

    // --- دوال مساعدة ---
    function getRandomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // تحديث النص المعروض بناءً على اللغة والمستوى
    function loadRandomText() {
      const langData = textsDB[currentLang];
      if (!langData) return;
      
      // قد لا تحتوي اللغة على جميع المستويات، نضمن وجود احتياطي
      let levelArray = langData[currentLevel];
      if (!levelArray || levelArray.length === 0) {
        // الرجوع لأول مستوى متاح
        const availableLevels = Object.keys(langData);
        if (availableLevels.length > 0) {
          currentLevel = availableLevels[0];
          levelArray = langData[currentLevel];
        } else {
          // حالة نادرة
          frenchSentenceEl.textContent = "Bonjour";
          translationTextEl.textContent = "مرحباً";
          return;
        }
      }
      
      currentTextObj = getRandomItem(levelArray);
      frenchSentenceEl.textContent = currentTextObj.text;
      translationTextEl.textContent = currentTextObj.translation;
      
      // تحديث واجهة المستوى
      currentLevelDisplay.textContent = `${currentLevel} · ${getLevelLabel(currentLang)}`;
    }

    function getLevelLabel(lang) {
      if (lang === 'fr') return 'français';
      if (lang === 'en') return 'english';
      if (lang === 'ru') return 'русский';
      return '';
    }

    // تغيير اللغة مع الحفاظ على مستوى معقول
    function setLanguage(lang) {
      currentLang = lang;
      // إعادة تعيين المستوى إلى A1 تلقائياً عند تغيير اللغة (أو الاحتفاظ إن وجد)
      const langData = textsDB[lang];
      if (langData) {
        if (!langData[currentLevel]) {
          currentLevel = 'A1'; // الرجوع لـ A1 إذا لم يتوفر المستوى الحالي
        }
      }
      updateActiveLangButton();
      loadRandomText();
      // تأثير بصري إضافي
      const card = document.getElementById('mainCard');
      card.style.transform = 'scale(0.98)';
      setTimeout(() => { card.style.transform = ''; }, 150);
    }

    function updateActiveLangButton() {
      langButtons.forEach(btn => {
        const lang = btn.getAttribute('data-lang');
        if (lang === currentLang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // محاكاة تغيير المستوى (عبر ضغطة خاصة أو تلقائي للعرض)
    function cycleLevel() {
      // تدوير بسيط: A1 -> A2 -> B1 -> A1 ...
      const levels = ['A1', 'A2', 'B1'];
      const currentIndex = levels.indexOf(currentLevel);
      const nextIndex = (currentIndex + 1) % levels.length;
      const candidateLevel = levels[nextIndex];
      
      // التأكد من وجود بيانات لهذا المستوى في اللغة الحالية
      if (textsDB[currentLang] && textsDB[currentLang][candidateLevel]) {
        currentLevel = candidateLevel;
      } else {
        // إذا لم يوجد، ارجع لـ A1
        currentLevel = 'A1';
      }
      loadRandomText();
    }

    // النطق باستخدام Web Speech API
    function speakText() {
      if (!window.speechSynthesis) {
        alert("المتصفح لا يدعم النطق الصوتي.");
        return;
      }
      const utterance = new SpeechSynthesisUtterance(currentTextObj.text);
      
      // تحديد اللغة المنطوقة
      const langMap = {
        fr: 'fr-FR',
        en: 'en-US',
        ru: 'ru-RU'
      };
      utterance.lang = langMap[currentLang] || 'fr-FR';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      utterance.volume = 1;
      
      window.speechSynthesis.cancel(); // إلغاء أي نطق سابق
      window.speechSynthesis.speak(utterance);
      
      // تأثير بصري على الزر
      speakBtn.style.transform = 'scale(0.9)';
      setTimeout(() => { speakBtn.style.transform = ''; }, 200);
    }

    // إظهار/إخفاء الترجمة (ميزة عرض الترجمة)
    function toggleTranslation() {
      if (translationContainer.style.display === 'none') {
        translationContainer.style.display = 'flex';
      } else {
        translationContainer.style.display = 'none';
      }
    }

    // --- ربط الأحداث ---
    langButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const lang = e.currentTarget.getAttribute('data-lang');
        if (lang && lang !== currentLang) {
          setLanguage(lang);
        }
      });
    });

    changeTextBtn.addEventListener('click', () => {
      // دوران المستوى تلقائياً مع تغيير النص (لمحاكاة تقدم الورشة)
      cycleLevel();
      // تأثير ضغط
      changeTextBtn.style.transform = 'scale(0.92)';
      setTimeout(() => { changeTextBtn.style.transform = ''; }, 180);
    });

    speakBtn.addEventListener('click', speakText);

    // الضغط على صندوق الترجمة لإخفائه/إظهاره (عرض الترجمة)
    translationContainer.addEventListener('click', (e) => {
      // منع إذا كان النقر على عنصر داخلي غير مقصود لكن نسمح بالتبديل
      toggleTranslation();
    });

    // ميزة إضافية: الضغط المطول على النص الفرنسي لتغيير المستوى يدوياً (ممتع)
    frenchSentenceEl.addEventListener('dblclick', function(e) {
      cycleLevel();
      // تأثير نبض
      frenchSentenceEl.style.transition = '0.2s';
      frenchSentenceEl.style.transform = 'scale(1.02)';
      setTimeout(() => { frenchSentenceEl.style.transform = ''; }, 200);
    });

    // بدء التشغيل: تحميل النص الأول
    loadRandomText();

    // إضافة تأثيرات حركية عند التمرير (requestAnimationFrame لأجل السلاسة)
    function animateShadow() {
      const card = document.getElementById('mainCard');
      if (!card) return;
      // تأثير بسيط يعتمد على الوقت
      const time = Date.now() / 800;
      const glowIntensity = 0.5 + Math.sin(time) * 0.15;
      card.style.boxShadow = `0 35px 70px rgba(80, 50, 180, ${glowIntensity}), 0 0 0 1px rgba(255,255,255,0.1)`;
      requestAnimationFrame(animateShadow);
    }
    animateShadow();

    // التعامل مع key الدخول (موجود في الواجهة)
    console.log("🔐 JADOU · مفتاح الورشة: JAD-2026 | AURA مفعّلة");
  })();
</script>
</body>
</html>
