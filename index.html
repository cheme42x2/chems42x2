<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chems - C42 | قصة الشارع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #f1f1f1;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: #141414;
            border: 2px solid #222;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .lyrics-box {
            background: #1a1a1a;
            border-right: 4px solid #4facfe;
            padding: 20px;
            margin: 20px 0;
            border-radius: 6px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease-in-out;
        }

        .fr-text {
            font-size: 1.3rem;
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .dz-text {
            font-size: 1.1rem;
            color: #a0aec0;
        }

        .btn {
            background: linear-gradient(135deg, #2b5876, #4e4376);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #4e4376, #2b5876);
        }

        footer {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CHEMS - C42</h1>
        <div class="subtitle">واقع الشارع، الهموم وقضية غزة</div>

        <div class="lyrics-box" id="lyricsDisplay">
            <div class="fr-text" id="frLine">اضغط على الزر لتحويل الأبيات...</div>
            <div class="dz-text" id="dzLine">C'est l'84 pas Sinaloa</div>
        </div>

        <button class="btn" onclick="nextLyric()">أغنية المقطع التالي 🎵</button>
    </div>

    <footer>
        تم التصميم خصيصاً لعشاق راب الشارع
    </footer>

    <script>
        const playlist = [
            { fr: "Il croit pas en Dieu son seigneur c'est la pince", dz: "ما يؤمنش بربي، الرب تاعو هو الدراهم." },
            { fr: "Même si ça rapporte j'vois les enfants de Gaza qui meurent", dz: "حتى لو كان (الراب) يدخل دراهم، راني نشوف في أطفال غزة راهم يموتوا." },
            { fr: "J'suis bon qu'à ça un putain d'Arabe", dz: "ما نصلح لغير هذه العفسة، أنا عربي تاع زبل." },
            { fr: "Yema veut pas de royaume / Pour l'rap elle m'a mis à la porte", dz: "يما ما تحوس لا على قصر لا والو، بسبب الراب خرجتني من الدار." },
            { fr: "C'est l'84 pas Sinaloa", dz: "هذا حي 84 ماشي عصابات سينالوا المكسيكية." },
            { fr: "Nos corps sont juste loués", dz: "الأجساد تاعنا راها غير مسلولة ومؤقتة." }
        ];

        let currentIndex = 0;

        function nextLyric() {
            currentIndex = (currentIndex + 1) % playlist.length;
            
            const frElem = document.getElementById('frLine');
            const dzElem = document.getElementById('dzLine');
            const box = document.getElementById('lyricsDisplay');

            // تأثير انتقال خفيف
            box.style.opacity = 0;
            
            setTimeout(() => {
                frElem.innerText = playlist[currentIndex].fr;
                dzElem.innerText = playlist[currentIndex].dz;
                box.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
