<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفكرتي</title>
<style>
  :root{
    --paper:#faf6ef;
    --ink:#2b2620;
    --line:#e4dcc9;
    --accent:#6b7a5e;
    --accent-dark:#4d5a43;
    --muted:#8a8270;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      linear-gradient(var(--line) 1px, transparent 1px);
    background-size: 100% 34px;
    background-color: var(--paper);
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 40px 16px;
  }
  .book{
    width:100%;
    max-width: 480px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
  }
  .title-row h1{
    font-size: 22px;
    margin:0;
    letter-spacing: 1px;
  }
  .title-row span{
    font-size: 12px;
    color: var(--muted);
  }
  textarea{
    width:100%;
    min-height: 170px;
    resize: vertical;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 18px;
    line-height: 34px;
    color: var(--ink);
    padding: 0;
  }
  textarea::placeholder{
    color: var(--muted);
  }
  .divider{
    height: 1px;
    background: var(--line);
    margin: 6px 0 18px;
  }
  .actions{
    display:flex;
    gap:10px;
    margin-bottom: 18px;
  }
  button{
    font-family: inherit;
    cursor:pointer;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    padding: 12px 16px;
    transition: transform .12s ease, opacity .12s ease;
  }
  button:active{ transform: scale(0.97); }
  #saveBtn{
    flex:1;
    background: var(--ink);
    color: var(--paper);
  }
  #saveBtn:disabled{
    opacity:.5;
    cursor:default;
  }
  .result-card{
    display:none;
    background:#fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 18px;
    box-shadow: 0 2px 0 var(--line);
  }
  .result-card.show{ display:block; }
  .result-label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
    direction: ltr;
    text-align: left;
  }
  .result-text{
    direction: ltr;
    text-align: left;
    font-size: 16px;
    line-height: 26px;
    color: var(--ink);
  }
  #shareBtn{
    width:100%;
    background: var(--accent);
    color: #fff;
    font-weight: bold;
    display:none;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  #shareBtn.show{ display:flex; }
  #shareBtn:hover{ background: var(--accent-dark); }
  .status{
    font-size: 12px;
    color: var(--muted);
    text-align:center;
    margin-top: 10px;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="book">
  <div class="title-row">
    <h1>مفكرتي</h1>
    <span id="dateLabel"></span>
  </div>

  <textarea id="noteInput" placeholder="اكتب ملاحظتك هنا..."></textarea>
  <div class="divider"></div>

  <div class="actions">
    <button id="saveBtn">حفظ الملاحظة</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">Saved note</div>
    <div class="result-text" id="resultText"></div>
  </div>

  <button id="shareBtn">📌 مشاركة على TikTok</button>
  <div class="status" id="statusMsg"></div>
</div>

<script>
  const noteInput = document.getElementById('noteInput');
  const saveBtn = document.getElementById('saveBtn');
  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');
  const shareBtn = document.getElementById('shareBtn');
  const statusMsg = document.getElementById('statusMsg');
  const dateLabel = document.getElementById('dateLabel');

  dateLabel.textContent = new Date().toLocaleDateString('ar-EG', { day:'numeric', month:'long' });

  let lastTranslation = '';

  async function translateText(text){
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ar|en';
    const res = await fetch(url);
    if(!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    if(!data || !data.responseData || !data.responseData.translatedText){
      throw new Error('bad response');
    }
    return data.responseData.translatedText;
  }

  saveBtn.addEventListener('click', async () => {
    const text = noteInput.value.trim();
    if(!text){
      statusMsg.textContent = 'اكتب شيئًا أولاً';
      return;
    }
    saveBtn.disabled = true;
    saveBtn.textContent = 'جارٍ الحفظ...';
    statusMsg.textContent = '';

    try{
      const translated = await translateText(text);
      lastTranslation = translated;
      resultText.textContent = translated;
      resultCard.classList.add('show');
      shareBtn.classList.add('show');
      statusMsg.textContent = 'تم الحفظ';
    }catch(err){
      statusMsg.textContent = 'حدث خطأ: ' + err.message;
    }finally{
      saveBtn.disabled = false;
      saveBtn.textContent = 'حفظ الملاحظة';
    }
  });

  shareBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(lastTranslation);
      statusMsg.textContent = 'تم نسخ النص، جارٍ التوجيه إلى TikTok...';
    }catch(err){
      statusMsg.textContent = 'جارٍ التوجيه إلى TikTok...';
    }
    setTimeout(() => {
      window.open('https://www.tiktok.com', '_blank');
    }, 400);
  });
</script>

</body>
</html>
