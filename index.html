<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزل Chems الملعون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI';
        }

        body {
            background: #000000;
            color: #ff0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* أنيميشن الضباب والأجواء المظلمة */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 0, 0, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* كود تساقط الدماء البرمجي */
        .blood-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
        }

        .blood-drop {
            position: absolute;
            background: linear-gradient(to bottom, #8b0000, #4a0000);
            width: 3px;
            border-radius: 0 0 5px 5px;
            animation: drip linear infinite;
        }

        @keyframes drip {
            0% { top: -10%; height: 0px; }
            50% { height: 50px; }
            100% { top: 110%; height: 10px; }
        }

        /* حاوية الرعب الرئيسية */
        .horror-box {
            background: rgba(10, 0, 0, 0.95);
            border: 1px solid #4a0000;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.5);
            border-radius: 5px;
            padding: 50px 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            z-index: 2;
            border-left: 4px solid #8b0000;
        }

        .horror-icon {
            font-size: 3rem;
            color: #8b0000;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 20px;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #8b0000;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        p {
            color: #999;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 45%;
            background: #000;
            border: 1px solid #4a0000;
            color: #8b0000;
        }

        .btn:hover {
            color: #fff;
            background: #8b0000;
            box-shadow: 0 0 15px #ff0000;
            border-color: #ff0000;
        }

        /* تأثير اهتزاز الشاشة عند الموت */
        .shake {
            animation: shakeEffect 0.3s ease-in-out;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-5px, 5px); }
            40%, 80% { transform: translate(5px, -5px); }
        }
    </style>
</head>
<body>

    <div class="blood-container" id="blood"></div>

    <div class="horror-box" id="mainBox">
        <div class="horror-icon">💀</div>
        <h1>منزل Chems الملعون</h1>
        <p>هل أنت موافق على الدخول؟ لأنك ستندم لاحقاً...</p>
        
        <div class="btn-group">
            <button class="btn" onclick="triggerHorror('yes')">نعم، أدخل</button>
            <button class="btn" onclick="triggerHorror('no')">لا، هروب</button>
        </div>
    </div>

    <script>
        // توليد قطرات الدم عشوائياً
        const bloodContainer = document.getElementById('blood');
        for (let i = 0; i < 15; i++) {
            const drop = document.createElement('div');
            drop.classList.add('blood-drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = (Math.random() * 3 + 2) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            bloodContainer.appendChild(drop);
        }

        function triggerHorror(choice) {
            const box = document.getElementById('mainBox');
            box.classList.add('shake');
            setTimeout(() => box.classList.remove('shake'), 300);

            if(choice === 'yes') {
                alert('لقد خطوت خطوتك الأخيرة.. الأرواح الميتة في منزل شمس تنتظرك الآن بالداخل! 🩸🧟‍♂️');
            } else {
                alert('ظننت أنك تستطيع الهروب؟ لقد أُغلق الباب خلفك والموت يلاحقك! ⚰️👻');
            }
        }
    </script>

</body>
</html>
