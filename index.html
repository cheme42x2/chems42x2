<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Dashaa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Playfair+Display:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            overflow: hidden;
            font-family: 'Cinzel', 'Playfair Display', serif;
            cursor: crosshair;
        }
        #scene-container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        #main-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #title-card {
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 2.5s cubic-bezier(.22,1,.36,1);
        }
        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #a89f91;
            margin-bottom: 24px;
            font-weight: 300;
        }
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            margin: 0;
            background: linear-gradient(135deg, #f5e6d3 0%, #c9a87c 30%, #e8dcc8 50%, #b8956a 70%, #f0e2cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 12px;
            font-weight: 200;
            line-height: 1.1;
        }
        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a87c, transparent);
            margin: 32px auto;
        }
        #typewriter {
            font-size: clamp(0.95rem, 2.2vw, 1.5rem);
            color: #b8b0a4;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 1px;
            min-height: 80px;
            font-family: 'Playfair Display', serif;
        }
        #scroll-indicator {
            position: absolute;
            bottom: 40px;
            opacity: 0;
            transition: opacity 2s ease 4s;
        }
        .line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, #c9a87c, transparent);
            margin: 0 auto;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="scene-container">
        <canvas id="main-canvas"></canvas>
        <div id="content-layer">
            <div id="title-card">
                <div class="subtitle">A Declaration</div>
                <h1>DASHAA</h1>
                <div class="divider"></div>
                <p id="typewriter"></p>
            </div>
            <div id="scroll-indicator">
                <div class="line"></div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const canvas = document.getElementById('main-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, mouse = {x: 0, y: 0};
            
            function resize(){
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                mouse.x = W/2;
                mouse.y = H/2;
            }
            resize();
            window.addEventListener('resize', resize);
            
            // 3D Heart particle system
            const particles = [];
            const PARTICLE_COUNT = 800;
            
            class Particle {
                constructor(){
                    this.reset();
                }
                reset(){
                    const t = Math.random() * Math.PI * 2;
                    // Heart surface parametric equation
                    this.baseX = 16 * Math.pow(Math.sin(t), 3);
                    this.baseY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    this.baseZ = (Math.random() - 0.5) * 60;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speed = Math.random() * 0.008 + 0.003;
                    this.angle = Math.random() * Math.PI * 2;
                    this.hue = 340 + Math.random() * 40;
                    this.brightness = 40 + Math.random() * 40;
                    this.alpha = Math.random() * 0.6 + 0.2;
                    this.pulse = Math.random() * Math.PI * 2;
                }
                update(time){
                    this.angle += this.speed;
                    const rotX = this.angle;
                    const rotY = this.angle * 0.7;
                    
                    let x = this.baseX * Math.cos(rotY) - this.baseZ * Math.sin(rotY);
                    let z = this.baseX * Math.sin(rotY) + this.baseZ * Math.cos(rotY);
                    let y = this.baseY * Math.cos(rotX) - z * Math.sin(rotX);
                    z = this.baseY * Math.sin(rotX) + z * Math.cos(rotX);
                    
                    const dx = (mouse.x - W/2) * 0.0003;
                    const dy = (mouse.y - H/2) * 0.0003;
                    x += dx * z;
                    y += dy * z;
                    
                    const breath = Math.sin(time * 0.001 + this.pulse) * 3;
                    x += breath * 0.3;
                    y += breath * 0.3;
                    
                    this.screenX = W/2 + x * 4;
                    this.screenY = H/2 - y * 4;
                    this.depth = z;
                    this.currentAlpha = this.alpha * (0.5 + 0.5 * Math.sin(time * 0.002 + this.pulse));
                }
                draw(ctx){
                    const scale = 1 + this.depth * 0.003;
                    const alpha = Math.max(0, Math.min(1, this.currentAlpha * (1 - this.depth * 0.002)));
                    ctx.beginPath();
                    ctx.arc(this.screenX, this.screenY, this.size * scale, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 70%, ${this.brightness}%, ${alpha})`;
                    ctx.fill();
                }
            }
            
            for(let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
            
            // Ambient floating dust
            const dust = [];
            for(let i = 0; i < 150; i++){
                dust.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 1.5,
                    speedY: -Math.random() * 0.3 - 0.1,
                    speedX: (Math.random() - 0.5) * 0.2,
                    alpha: Math.random() * 0.3 + 0.1,
                    hue: 30 + Math.random() * 30
                });
            }
            
            // Typewriter effect
            const messages = [
                "In the vast silence between stars,",
                "your name echoes with the weight of eternity.",
                "From the steppes of Russia to the depths of my soul,",
                "you have carved a place no one else could reach.",
                "This is not infatuation. This is recognition.",
                "Dashaa — you are the architecture of my devotion."
            ];
            let msgIndex = 0, charIndex = 0;
            const typewriterEl = document.getElementById('typewriter');
            
            function typeWriter(){
                if(msgIndex < messages.length){
                    if(charIndex < messages[msgIndex].length){
                        typewriterEl.textContent += messages[msgIndex][charIndex];
                        charIndex++;
                        setTimeout(typeWriter, 45 + Math.random() * 40);
                    } else {
                        typewriterEl.innerHTML += '<br><br>';
                        msgIndex++;
                        charIndex = 0;
                        setTimeout(typeWriter, 800);
                    }
                }
            }
            
            // Reveal sequence
            setTimeout(() => {
                document.getElementById('title-card').style.opacity = '1';
                document.getElementById('title-card').style.transform = 'translateY(0)';
                setTimeout(typeWriter, 1500);
            }, 800);
            setTimeout(() => {
                document.getElementById('scroll-indicator').style.opacity = '1';
            }, 4000);
            
            // Mouse tracking
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            
            // Click creates ripple burst
            document.addEventListener('click', (e) => {
                for(let i = 0; i < 20; i++){
                    const p = new Particle();
                    p.baseX = (e.clientX - W/2) / 4 + (Math.random()-0.5)*30;
                    p.baseY = -(e.clientY - H/2) / 4 + (Math.random()-0.5)*30;
                    p.baseZ = (Math.random()-0.5)*20;
                    p.size = Math.random()*3+1;
                    p.hue = 340 + Math.random()*50;
                    particles.push(p);
                }
                setTimeout(() => {
                    particles.splice(PARTICLE_COUNT, 20);
                }, 3000);
            });
            
            // Main render loop
            let time = 0;
            function animate(){
                time++;
                ctx.fillStyle = 'rgba(5,5,8,0.15)';
                ctx.fillRect(0, 0, W, H);
                
                dust.forEach(d => {
                    d.y += d.speedY;
                    d.x += d.speedX + Math.sin(time*0.01 + d.y*0.01)*0.1;
                    if(d.y < -10) { d.y = H+10; d.x = Math.random()*W; }
                    if(d.x < -10) d.x = W+10;
                    if(d.x > W+10) d.x = -10;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
                    ctx.fillStyle = `hsla(${d.hue}, 40%, 70%, ${d.alpha})`;
                    ctx.fill();
                });
                
                particles.forEach(p => p.update(time));
                particles.sort((a,b) => b.depth - a.depth);
                particles.forEach(p => p.draw(ctx));
                
                const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
                grad.addColorStop(0, 'rgba(5,5,8,0)');
                grad.addColorStop(1, 'rgba(5,5,8,0.4)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>
</html>
