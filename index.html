<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزل Chems الرقمي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            width: 90%;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(to left, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-yes {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="questionText">هل تريد الدخول لمنزل Chems؟</h1>
        <div class="btn-container" id="btnGroup">
            <button class="btn btn-yes" onclick="joinHome()">نعم</button>
            <button class="btn btn-no" onclick="leaveHome()">لا</button>
        </div>
    </div>

    <script>
        function joinHome() {
            document.getElementById('questionText').innerHTML = "✨ لقد تم الانضمام بنجاح ✨";
            document.getElementById('questionText').style.background = "linear-gradient(to left, #4ade80, #2dd4bf)";
            document.getElementById('questionText').style.webkitBackgroundClip = "text";
            document.getElementById('btnGroup').classList.add('hidden');
        }

        function leaveHome() {
            document.getElementById('questionText').innerHTML = "شكراً لزيارتك، يمكنك العودة في أي وقت!";
            document.getElementById('questionText').style.background = "linear-gradient(to left, #94a3b8, #cbd5e1)";
            document.getElementById('questionText').style.webkitBackgroundClip = "text";
            document.getElementById('btnGroup').classList.add('hidden');
        }
    </script>

</body>
</html>
