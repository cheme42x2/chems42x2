<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADOU | Underground Slang Translator</title>
    <!-- Google Fonts for Luxury Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Noto+Sans+Arabic:wght@300;600;900&display=swap" rel="family">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0a0b0d;
            --premium-gold: #d4af37;
            --premium-red: #8b0000;
            --text-light: #e6e6e6;
            --panel-bg: rgba(18, 18, 24, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Arabic', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Luxury Autumn Leaves Animation Background */
        #autumn-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #d35400; /* Autumn orange */
            opacity: 0.6;
            border-radius: 0 70% 0 70%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* Premium Cyber-Underground Interface */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 950px;
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(139, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        /* Chinese Calligraphy Background Accent */
        .container::before {
            content: "翻訳";
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            color: rgba(139, 0, 0, 0.05);
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--premium-gold);
            text-shadow: 0px 0px 15px rgba(212, 175, 55, 0.5);
            display: inline-block;
        }

        .status-badge {
            display: block;
            margin-top: 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3333;
            font-weight: bold;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* Translation Grid */
        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .translator-grid { grid-template-columns: 1fr; }
        }

        .box {
            position: relative;
            background: rgba(10, 11, 13, 0.9);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .box:focus-within {
            border-color: var(--premium-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .box-label {
            font-size: 0.8rem;
            color: var(--premium-gold);
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chinese-sub {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-light);
            font-size: 1.1rem;
            resize: none;
            line-height: 1.6;
        }

        .output-text {
            color: #50fa7b; /* Gangsta neon green for illegal look */
            font-family: 'Courier New', Courier, monospace;
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            bottom: 15px;
            left: 25px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--premium-gold);
            color: var(--premium-gold);
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .copy-btn:hover {
            background: var(--premium-gold);
            color: var(--bg-dark);
        }

        /* TikTok CTA Button */
        .tiktok-footer {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .tiktok-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(45deg, #ff0050, #00f2fe);
            color: #fff;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 0, 80, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tiktok-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.5);
        }

        /* Disclaimer Footer */
        .system-foot {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Leaf Drops Effect -->
    <div id="autumn-container"></div>

    <div class="container">
        <header>
            <div class="brand-name">JADOU</div>
            <div class="status-badge"><i class="fa-solid fa-circle-nodes"></i> شبكة ترجمة موازية غير قانونية عابرة للقارات v3.9</div>
        </header>

        <div class="translator-grid">
            <!-- Input (Arabic) -->
            <div class="box">
                <div class="box-label">
                    <span>النص الأصلي (العربية)</span>
                    <span class="chinese-sub">输入 (العربية)</span>
                </div>
                <textarea id="src-text" placeholder="اكتب كلامك هنا خويا... (مثال: واش كاين، خويا، دراهم، بوليس...)"></textarea>
            </div>

            <!-- Output (Ghetto English) -->
            <div class="box">
                <div class="box-label">
                    <span>ترجمة العصابات والشوارع الأمريكية (Bronx Slang)</span>
                    <span class="chinese-sub">地下翻译 (Slang)</span>
                </div>
                <textarea id="res-text" class="output-text" readonly placeholder="The street talk appears here..."></textarea>
                <button class="copy-btn" onclick="copyTranslation()">
                    <i class="fa-regular fa-copy"></i> نسخ كود الشارع
                </button>
            </div>
        </div>

        <!-- TikTok Jump Action -->
        <div class="tiktok-footer">
            <a href="https://www.tiktok.com" target="_blank" class="tiktok-btn">
                <i class="fa-brands fa-tiktok"></i> دخول فوري لمنصة TIKTOK
            </a>
        </div>

        <div class="system-foot">
            CHINESE AUTUMN PARALLEL SERVER • SECURED BY JADOU • TRADUCTION ILLÉGALE
        </div>
    </div>

    <script>
        // Real-time Ultra Fast Mapping Dictionary (Gangsta/Bronx Slang)
        const gangstaDictionary = {
            "خويا": "my brother -> my brotha / my slime 🐍 / details: word on the street is he's family",
            "واش كاين": "what's up -> what's good, gang? / what's poppin'?",
            "صاحبي": "my friend -> my homie / my day one 💯",
            "دراهم": "money -> them bands / racks / dough 💵",
            "البوليس": "police -> the feds / 12 / 🛑 12 is hot on the block",
            "شرطة": "police -> the 12 / opps",
            "حومة": "hood -> the block / the trenches 🏙️",
            "هدرة": "talking -> straight yappin' / talkin' heavy",
            "مليح": "good -> straight fire 🔥 / bussin'",
            "راني هنا": "I'm here -> I'm posted up on the block 📍",
            "تخاف": "scared -> you trippin' / u a cop out",
            "سكت": "shut up -> zip it up / hold that thought for the feds",
            "تلفون": "phone -> the trap phone 📱",
            "بزاف": "a lot -> deadass mad / odee",
            "صح": "really -> deadass? / word to my momma 💯",
            "شكون": "who -> who dat pullin' up?",
            "هرب": "run -> dip / skate out 🏃‍♂️",
            "مكاش": "no way -> zero chance, fam / street denied it"
        };

        const srcInput = document.getElementById('src-text');
        const resOutput = document.getElementById('res-text');

        // Lightning-Fast Translator Mechanism
        srcInput.addEventListener('input', () => {
            let currentVal = srcInput.value.trim();
            if(!currentVal) {
                resOutput.value = '';
                return;
            }

            // Splitting words and matching the street rules instantly
            let words = currentVal.split(/\s+/);
            let translatedArr = words.map(word => {
                // Clean punctuation for matching
                let cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                if(gangstaDictionary[cleanWord]) {
                    return gangstaDictionary[cleanWord];
                }
                // Fallback for missing words to mimic "illegal hacker decoding"
                return `[${word} -> raw_slang_undetected]`;
            });

            // Fast output delivery
            resOutput.value = `[BROKER_LOG]: TRANSLATION TERMINATED.\n\n` + translatedArr.join(' ');
        });

        // Copy Feature
        function copyTranslation() {
            if(!resOutput.value) return;
            resOutput.select();
            document.execCommand('copy');
            
            let btn = document.querySelector('.copy-btn');
            btn.innerHTML = `<i class="fa-solid fa-check"></i> تم النسخ بنجاح`;
            setTimeout(() => {
                btn.innerHTML = `<i class="fa-regular fa-copy"></i> نسخ كود الشارع`;
            }, 2000);
        }

        // Autumn Leaves Generator (Chinatown Autumn Vibe)
        function createAutumnVibe() {
            const container = document.getElementById('autumn-container');
            const leafCount = 25;
            
            // Premium autumn colors
            const colors = ['#d35400', '#e67e22', '#b71540', '#f39c12'];

            for (let i = 0; i < leafCount; i++) {
                let leaf = document.createElement('div');
                leaf.classList.add('leaf');
                
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = (Math.random() * 5 + 5) + 's'; 
                leaf.style.animationDelay = (Math.random() * 5) + 's';
                leaf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                leaf.style.transform = `scale(${Math.random() * 0.8 + 0.4})`;

                container.appendChild(leaf);
            }
        }
        
        // Execute autumn animation on boot
        createAutumnVibe();
    </script>
</body>
</html>
