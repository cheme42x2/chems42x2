<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADOU | THE ULTIMATE AURA HUB</title>
    <style>
        /* 15, 16, 19. Premium Background & Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #0d0e15 0%, #020205 100%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 13. Advanced Canvas Particle Animation in Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            /* 20. Pointer events none for background interactives */
            pointer-events: none;
        }

        /* 20. Custom Glowing Mouse Cursor */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: #45f3ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            /* 3. Box Shadow Glow */
            box-shadow: 0 0 20px #45f3ff, 0 0 40px #45f3ff;
            /* 6, 7, 8. Elastic Elastic Movement */
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -50%);
            /* 5. Blend Mode Overlay */
            mix-blend-mode: overlay;
            /* 14. Performance Tweak */
            will-change: transform;
            display: none;
        }

        /* 1, 2. Glassmorphic Aura Container */
        .aura-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 550px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            will-change: transform, opacity;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 17, 18, 4. Holographic Text Effects */
        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffe066 0%, #fcc419 50%, #ff922b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(252, 196, 25, 0.4);
            margin-bottom: 5px;
            animation: pulseAura 3s infinite alternate;
        }

        @keyframes pulseAura {
            0% { transform: scale(1); text-shadow: 0 0 30px rgba(252, 196, 25, 0.3); }
            100% { transform: scale(1.02); text-shadow: 0 0 50px rgba(252, 196, 25, 0.6); }
        }

        .tagline {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #45f3ff;
            text-transform: uppercase;
            margin-bottom: 35px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.5);
        }

        /* Forms & Interactive Input Group */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .aura-input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .aura-input:focus {
            border-color: #45f3ff;
            box-shadow: 0 0 20px rgba(69, 243, 255, 0.2);
        }

        /* 9, 10, 11, 12. Futuristic Premium Buttons */
        .aura-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 16px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        .aura-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 242, 254, 0.6);
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
        }

        /* Language Hub Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .lang-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lang-card:hover {
            border-color: #ff922b;
            box-shadow: 0 0 25px rgba(255, 146, 43, 0.3);
            transform: translateY(-3px);
        }

        /* Levels Screen Container */
        .level-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #aaa;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #ff922b;
            color: #000;
            border-color: #ff922b;
            box-shadow: 0 0 15px rgba(255, 146, 43, 0.4);
        }

        /* Holographic Text Display Box */
        .display-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 5px solid #45f3ff;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .main-text {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .translation-text {
            font-size: 1.1rem;
            color: #ff922b;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            width: 100%;
            display: none;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .action-btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .btn-audio { background: #51cf66; box-shadow: 0 0 15px rgba(81, 207, 102, 0.3); }
        .btn-next { background: #339af0; box-shadow: 0 0 15px rgba(51, 154, 240, 0.3); }
        .btn-view { background: #cc5de8; box-shadow: 0 0 15px rgba(204, 93, 232, 0.3); grid-column: span 2; }
        .btn-back { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); width: 100%; }

        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="stars"></canvas>

    <!-- STEP 1: KEY GATEWAY LOCK -->
    <div class="aura-container" id="lock-screen">
        <h1 class="brand-title">JADOU</h1>
        <p class="tagline">ENTER ACCESS KEY</p>
        <div class="input-group">
            <input type="password" id="gate-key" class="aura-input" placeholder="••••••••" autocomplete="off">
        </div>
        <button class="aura-btn" onclick="verifyKey()">INITIALIZE SYSTEM</button>
    </div>

    <!-- STEP 2: PREMIUM LANGUAGE HUB -->
    <div class="aura-container hidden" id="lobby-screen">
        <h1 class="brand-title">JADOU</h1>
        <p class="tagline">SELECT CORE LANGUAGE</p>
        <div class="grid-layout">
            <button class="lang-card" onclick="selectLanguage('fr')">Français <span>🇫🇷</span></button>
            <button class="lang-card" onclick="selectLanguage('en')">English <span>🇺🇸</span></button>
            <button class="lang-card" onclick="selectLanguage('ru')">Русский <span>🇷🇺</span></button>
        </div>
    </div>

    <!-- STEP 3: MATRIX LEVEL ENGINE -->
    <div class="aura-container hidden" id="engine-screen">
        <div class="level-tabs">
            <button class="tab active" id="tabA1" onclick="changeLevel('A1')">Miveau A1</button>
            <button class="tab" id="tabA2" onclick="changeLevel('A2')">Niveau A2</button>
        </div>
        
        <div class="display-box">
            <div class="main-text" id="foreign-display">...</div>
            <div class="translation-text" id="native-display">...</div>
        </div>

        <div class="control-grid">
            <button class="action-btn btn-audio" onclick="speakText()">🔊 ÉCOUTER</button>
            <button class="action-btn btn-next" onclick="rotateText()">🔄 NEXT TEXT</button>
            <button class="action-btn btn-view" onclick="revealTranslation()">👁️ REVEAL TRANSLATION</button>
        </div>
        <button class="action-btn btn-back" onclick="returnToLobby()">↩️ BACK TO TERMINAL</button>
    </div>

    <script>
        // 21. requestAnimationFrame Core & Background Logic
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let starsArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speed = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(69, 243, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<100; i++) { starsArray.push(new Star()); }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            starsArray.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // Cursor Tracker Logic
        const cursor = document.getElementById('custom-cursor');
        if(window.matchMedia('(pointer: fine)').matches) {
            cursor.style.display = 'block';
            window.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // Multi-Language Database (A1 simple up to A2 tougher sentences)
        const matrixDatabase = {
            fr: {
                A1: [
                    { f: "Bonjour mon ami, tu vas bien aujourd'hui ?", n: "صباح الخير صاحبي، راك غاير اليوم؟", code: "fr-FR" },
                    { f: "J'apprends le français avec mes frères.", n: "راني نتعلم الفرونسي مع خاوتي.", code: "fr-FR" },
                    { f: "Où se trouve la gare s'il vous plaît ?", n: "وين جاية لاgار تع الماشينة تعيش؟", code: "fr-FR" }
                ],
                A2: [
                    { f: "Nous devons travailler ensemble pour réussir ce projet complexe.", n: "لازم نخدمو كيف كيف باش نفرزو هاد البروجي الصعيب.", code: "fr-FR" },
                    { f: "Bien que ce soit difficile, j'ai décidé de ne pas abandonner mon travail.", n: "مالغري عفسة واعرة، ديسيديت ما نطيش تعبي وقرايتي.", code: "fr-FR" }
                ]
            },
            en: {
                A1: [
                    { f: "Hello bro, welcome to our world.", n: "مرحباً يا خويا، أهلاً بيك في عالمنا.", code: "en-US" },
                    { f: "What is your name and where do you live ?", n: "واش اسمك ووين راك ساكن ديريكت؟", code: "en-US" }
                ],
                A2: [
                    { f: "Everything seemed impossible until we successfully executed the code.", n: "كل عفسة كانت تبان مستحيلة حتى فرزنا الكود بنجاح.", code: "en-US" }
                ]
            },
            ru: {
                A1: [
                    { f: "Привет мой друг, как твои дела ?", n: "أهلاً صديقي، كيفاش راهي أحوالك؟", code: "ru-RU" },
                    { f: "Я изучаю этот язык каждый день.", n: "راني نتعلم هاد اللغة كل يوم.", code: "ru-RU" }
                ],
                A2: [
                    { f: "Мы должны усердно учиться, чтобы построить наше светлое будущее.", n: "لازم نقروا ونزيروا روحنا باش نبنوا المستقبل ديالنا المفرز.", code: "ru-RU" }
                ]
            }
        };

        let activeLang = '';
        let activeLevel = 'A1';
        let activeIndex = 0;

        // Gate Access Mechanism
        function verifyKey() {
            const inputKey = document.getElementById('gate-key').value;
            const target = document.getElementById('lock-screen');
            // 22. getBoundingClientRect tracking check
            const rect = target.getBoundingClientRect();
            
            if(inputKey === "JADOU123") {
                target.classList.add('hidden');
                setTimeout(() => {
                    target.style.display = 'none';
                    const lobby = document.getElementById('lobby-screen');
                    lobby.style.display = 'block';
                    setTimeout(() => lobby.classList.remove('hidden'), 50);
                }, 600);
            } else {
                alert("ACCESS KEY DENIED | WRONG AURA CODE");
            }
        }

        function selectLanguage(lang) {
            activeLang = lang;
            activeLevel = 'A1';
            activeIndex = 0;
            
            document.getElementById('tabA1').classList.add('active');
            document.getElementById('tabA2').classList.remove('active');
            
            shiftScreen('lobby-screen', 'engine-screen');
            renderEngine();
        }

        function changeLevel(lvl) {
            activeLevel = lvl;
            activeIndex = 0;
            document.getElementById('tabA1').classList.toggle('active', lvl === 'A1');
            document.getElementById('tabA2').classList.toggle('active', lvl === 'A2');
            renderEngine();
        }

        function renderEngine() {
            const dataSet = matrixDatabase[activeLang][activeLevel];
            document.getElementById('foreign-display').innerText = dataSet[activeIndex].f;
            document.getElementById('native-display').innerText = dataSet[activeIndex].n;
            document.getElementById('native-display').style.display = 'none';
        }

        function rotateText() {
            const dataSet = matrixDatabase[activeLang][activeLevel];
            activeIndex = (activeIndex + 1) % dataSet.length;
            renderEngine();
        }

        function revealTranslation() {
            const box = document.getElementById('native-display');
            box.style.display = (box.style.display === 'none') ? 'block' : 'none';
        }

        // Web Speech API Integration for Global Text Pronunciation
        function speakText() {
            const dataSet = matrixDatabase[activeLang][activeLevel];
            const currentItem = dataSet[activeIndex];
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop running threads
                const utterance = new SpeechSynthesisUtterance(currentItem.f);
                utterance.lang = currentItem.code;
                utterance.rate = 0.85; // Natural smooth rate
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Speech Engine missing on this browser.");
            }
        }

        function returnToLobby() {
            window.speechSynthesis.cancel();
            shiftScreen('engine-screen', 'lobby-screen');
        }

        function shiftScreen(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            
            hideEl.classList.add('hidden');
            setTimeout(() => {
                hideEl.style.display = 'none';
                showEl.style.display = 'block';
                setTimeout(() => showEl.classList.remove('hidden'), 50);
            }, 600);
        }
    </script>
</body>
</html>
