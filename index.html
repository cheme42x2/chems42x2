<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOGGAR BET - Apple Predictor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f0c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #151c18, #0e1310);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 2px solid #1f2d25;
        }

        /* واجهة تسجيل الدخول والبرومو كود */
        #login-screen {
            text-align: center;
            padding: 20px 10px;
        }

        .promo-box {
            background-color: #1a241e;
            border: 1px dashed #2ecc71;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .promo-title {
            font-size: 14px;
            color: #2ecc71;
            margin-bottom: 8px;
        }

        .promo-code-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .code-text {
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            color: #fff;
        }

        .copy-btn {
            background-color: #2ecc71;
            color: #000;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aab0;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #1a241e;
            border: 1px solid #2d3f35;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2ecc71;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #2ecc71, #28b463);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* واجهة اللعبة الرئيسية */
        #main-screen {
            display: none;
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .info-card {
            flex: 1;
            background-color: #161f1a;
            border: 1px solid #223028;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }

        .info-label {
            font-size: 11px;
            color: #88958e;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: bold;
        }

        .time-box {
            background-color: #161f1a;
            border: 1px solid #223028;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
        }

        .time-value {
            color: #2ecc71;
            font-weight: bold;
            font-size: 16px;
            margin-top: 2px;
        }

        /* شبكة التفاح */
        .grid-container {
            background-color: #111814;
            border: 1px solid #223028;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .grid-row:last-child {
            margin-bottom: 0;
        }

        .multiplier {
            width: 50px;
            font-size: 11px;
            color: #2ecc71;
            font-weight: bold;
            text-align: left;
        }

        .cells-row {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: space-between;
        }

        .cell {
            width: 42px;
            height: 42px;
            background: radial-gradient(circle, #87362c, #5c2018);
            border-radius: 50%;
            border: 1px solid #3a1510;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* ستيل التفاحة المكشوفة */
        .cell.apple {
            background: radial-gradient(circle, #2ecc71, #1e8449) !important;
            border: 2px solid #58d68d !important;
            box-shadow: 0 0 10px #2ecc71;
            position: relative;
        }

        .cell.apple::after {
            content: "🍎";
            font-size: 18px;
        }

        /* الأزرار السفلى */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .btn-predict {
            background: linear-gradient(to bottom, #58d68d, #2ecc71);
            color: #000;
        }

        .btn-action {
            background-color: #222b25;
            color: #f1c40f;
            border: 1px solid #38473d;
        }

        .btn-new {
            background-color: #1f2521;
            color: #fff;
            border: 1px solid #2d3630;
        }

        .btn-logout {
            background-color: #241619;
            color: #e74c3c;
            border: 1px solid #3a1f23;
        }

        .note-text {
            font-size: 11px;
            color: #7f8c8d;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        /* التذييل والاشعار السفلي */
        .footer {
            text-align: center;
            font-size: 10px;
            color: #555;
            margin-top: 10px;
        }

        #status-toast {
            background-color: #000;
            border: 1px solid #2ecc71;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-container">

    <!-- 1. واجهة الدخول والبرومو كود -->
    <div id="login-screen">
        <div class="promo-box">
            <div class="promo-title">كود برو ملو للتفعيل والاستفادة:</div>
            <div class="promo-code-row">
                <span class="code-text" id="promo-code">1x_5139877</span>
                <button class="copy-btn" onclick="copyPromo()">نسخ الكود</button>
            </div>
        </div>

        <div class="input-group">
            <label for="user-id">أدخل المعرف الخاص بك (ID):</label>
            <input type="number" id="user-id" placeholder="مثال: 1684923" required>
        </div>

        <button class="login-btn" onclick="login()">دخول إلى السيرفر</button>
    </div>


    <!-- 2. واجهة التوقعات الرئيسية -->
    <div id="main-screen">
        <!-- معلومات الحساب العليا -->
        <div class="top-info">
            <div class="info-card">
                <div class="info-label">الشركة</div>
                <div class="info-value">1XBET</div>
            </div>
            <div class="info-card">
                <div class="info-label">الحساب</div>
                <div class="info-value" id="display-id">16***69</div>
            </div>
        </div>

        <div class="time-box">
            <div class="info-label" style="font-size: 12px;">الوقت المتبقي</div>
            <div class="time-value">غير محدود</div>
        </div>

        <!-- شبكة الخانات (5 أعمدة × 7 أسطر) -->
        <div class="grid-container" id="game-grid">
            <div class="grid-row" data-row="7"><div class="multiplier">x11.18</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="6"><div class="multiplier">x6.71</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="5"><div class="multiplier">x4.02</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="4"><div class="multiplier">x2.41</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="3"><div class="multiplier">x1.93</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="2"><div class="multiplier">x1.54</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
            <div class="grid-row" data-row="1"><div class="multiplier">x1.23</div><div class="cells-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div></div>
        </div>

        <!-- أزرار التحكم -->
        <div class="buttons-grid">
            <button class="btn btn-predict" onclick="generateApples()">عرض التفاحات</button>
            <button class="btn btn-new" onclick="resetGrid()">رهان جديد</button>
            <button class="btn btn-action" onclick="alert('تواصل مع الدعم لتفعيل الميزات المتقدمة')">تواصل للتفعيل</button>
            <button class="btn btn-logout" onclick="logout()">تسجيل الخروج</button>
        </div>

        <div class="note-text">
            ملاحظة: أي مخالفة للقواعد لعب التي ارسلتها لك لا يشتغل معك وشكرا.
        </div>

        <!-- اشعار سفلي عند التفعيل -->
        <div id="status-toast">🍏 تم عرض التفاحات من السيرفر</div>
    </div>

    <div class="footer">
        HOGGAR BET — All Rights Reserved 2026 ©
    </div>

</div>

<script>
    function copyPromo() {
        const promoText = document.getElementById('promo-code').innerText;
        navigator.clipboard.writeText(promoText).then(() => {
            alert('تم نسخ كود البرومو بنجاح: ' + promoText);
        });
    }

    function login() {
        const idInput = document.getElementById('user-id').value;
        if (idInput.trim() === "") {
            alert("يرجى إدخال الـ ID الخاص بك أولاً!");
            return;
        }
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        
        if(idInput.length > 4) {
            document.getElementById('display-id').innerText = idInput.substring(0, 2) + "***" + idInput.substring(idInput.length - 2);
        } else {
            document.getElementById('display-id').innerText = idInput + "***";
        }
    }

    function generateApples() {
        resetGrid();
        const rows = document.querySelectorAll('.grid-row');
        
        rows.forEach(row => {
            const cells = row.querySelectorAll('.cell');
            const randomIndex = Math.floor(Math.random() * 5);
            
            setTimeout(() => {
                cells[randomIndex].classList.add('apple');
            }, 100);
        });

        const toast = document.getElementById('status-toast');
        toast.style.display = 'block';
    }

    function resetGrid() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(cell => {
            cell.classList.remove('apple');
        });
        document.getElementById('status-toast').style.display = 'none';
    }

    function logout() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('user-id').value = '';
        resetGrid();
    }
</script>

</body>
</html>
