<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP UNBAN - ULTIMATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        :root { --gold: #FFD700; --bg: #050505; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }

        .card { position: relative; z-index: 2; width: 90%; max-width: 380px; background: rgba(0,0,0,0.7); border: 2px solid var(--gold); padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 0 30px rgba(255,215,0,0.2); }

        h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 15px var(--gold); }

        .btn { display: block; width: 100%; padding: 18px; margin: 15px 0; background: #111; border: 1px solid var(--gold); color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* الـ Modal المخصص (بديل الـ alert) */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 80%; }

        .footer { position: absolute; bottom: 10px; font-size: 0.7rem; color: var(--gold); }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="card">
    <h1>VIP UNBAN</h1>
    <p>نظام الاسترداد السحابي الخارق</p>
    <div class="btn" onclick="showModal()">استرداد وفك حظر الحساب</div>
    <div class="btn" onclick="showModal()">فك قيود البث المباشر (LIVE)</div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold)">جاري المعالجة...</h2>
        <p>يتم الآن حقن أكواد الـ VIP في السيرفر...</p>
        <div class="btn" onclick="closeModal()">حسناً</div>
    </div>
</div>

<div class="footer">نظام حماية مشفر 256-بت | بروتوكول VIP © 2026</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {"particles": {"number": {"value": 50}, "color": {"value": "#FFD700"}, "move": {"enable": true, "speed": 1}}});
    function showModal() { document.getElementById('custom-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
</script>
</body>
</html>
