<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADOU - Aura Language Hub</title>
    <style>
        /* ديزاين الـ Aura والـ Dark Mode */
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* أنميشن لـ اسم JADOU الـ Neon Gold */
        .brand-title {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ffbd59, 0 0 20px #ffbd59, 0 0 40px #ffbd59;
            animation: pulse 2s infinite alternate;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #45f3ff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* كارت اختيار اللغات */
        .lang-container {
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: transparent;
            border: 2px solid #45f3ff;
            color: #45f3ff;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.2);
        }

        /* تأثير الـ Hover اللي يعطي الـ Aura للزر */
        .lang-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 25px #45f3ff;
            transform: translateY(-5px);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- اسم البروجي المفرز -->
    <div class="brand-title">JADOU</div>
    <div class="subtitle">Aura Language Platform</div>

    <!-- واجهة اختيار اللغات -->
    <div class="lang-container">
        <button class="lang-btn" onclick="selectLanguage('fr')">Français 🇫🇷</button>
        <button class="lang-btn" onclick="selectLanguage('en')">English 🇺🇸</button>
        <button class="lang-btn" onclick="selectLanguage('ru')">Русский 🇷🇺</button>
    </div>

    <script>
        function selectLanguage(lang) {
            alert('تم اختيار اللغة: ' + lang.toUpperCase() + '! دروك نوجدو لك مستوى A1 المفرز.');
            // هنا المرة الجاية نربطوها باش تديك ديريكت لصفحة النصوص والمستويات
        }
    </script>

</body>
</html>
