<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Las Vegas Live Roulette</title>
    <style>
        /* تصميم كازينو رسمي فاخر مخصص للهواتف */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-user-select: none; user-select: none; }
        body { background: #05020a; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* شاشة تسجيل الدخول الصارمة */
        #loginScreen { position: fixed; inset: 0; background: radial-gradient(circle, #110524 0%, #020106 100%); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-card { background: rgba(14, 7, 28, 0.95); padding: 40px 30px; border-radius: 12px; border: 2px solid #ffdf00; box-shadow: 0 0 30px rgba(255, 223, 0, 0.3); text-align: center; width: 90%; max-width: 380px; }
        .login-card h1 { color: #ffdf00; font-size: 24px; margin-bottom: 25px; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255, 223, 0, 0.5); }
        .input-group input { width: 100%; padding: 14px; background: #000; border: 1px solid #ff007f; border-radius: 6px; color: #fff; font-size: 16px; margin-bottom: 20px; text-align: center; outline: none; }
        .input-group input:focus { box-shadow: 0 0 15px #ff007f; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #ffdf00, #ff007f); border: none; border-radius: 6px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; }
        #errorMsg { color: #ff3333; font-weight: bold; margin-top: 15px; display: none; }

        /* الشاشة الأساسية للكازينو */
        #casinoScreen { display: none; flex-direction: column; height: 100vh; }
        
        /* البار العلوي */
        .header-bar { background: #0d081b; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffdf00; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo-text { color: #ffdf00; font-weight: bold; font-size: 16px; letter-spacing: 1px; }
        .balance-container { background: #000; padding: 8px 16px; border-radius: 20px; border: 1px solid #00ff66; display: flex; align-items: center; gap: 5px; }
        .balance-container span { color: #00ff66; font-weight: bold; font-size: 18px; }

        /* منطقة الفيديو اللايف (المحاكاة السينمائية) */
        .video-container { position: relative; width: 100%; height: 210px; background: #000; border-bottom: 2px solid #22153c; overflow: hidden; }
        .live-video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .live-badge { position: absolute; top: 10px; right: 10px; background: #ff3333; color: #fff; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-weight: bold; letter-spacing: 1px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* لوحة الرهان الرقمية الاحترافية (Roulette Layout) */
        .board-container { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; background: linear-gradient(180deg, #0f0720 0%, #050209 100%); }
        .roulette-table { display: grid; grid-template-columns: 40px repeat(12, 1fr); border: 1.5px solid #fff; border-radius: 4px; width: 100%; max-width: 480px; background: #061109; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .cell { height: 42px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border: 0.5px solid rgba(255,255,255,0.25); cursor: pointer; position: relative; }
        .cell.red { background: #d31d1d; }
        .cell.black { background: #111111; }
        .cell.green { background: #008000; grid-row: span 3; height: 126px; }
        .cell.selected { box-shadow: inset 0 0 0 3px #ffdf00; background: rgba(255, 223, 0, 0.3) !important; }

        /* الفيشات (Chips) من تحت */
        .chips-container { display: flex; gap: 12px; margin: 10px 0; justify-content: center; width: 100%; }
        .chip { width: 45px; height: 45px; border-radius: 50%; border: 3px dashed #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #fff; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .chip-100 { background: #0099ff; }
        .chip-500 { background: #ff007f; }
        .chip-1000 { background: #ffdf00; color: #000; border-color: #000; }
        .chip-5000 { background: #00ff66; color: #000; border-color: #000; }
        .chip.active { transform: scale(1.18); border-style: solid; box-shadow: 0 0 15px rgba(255,255,255,0.8); }

        /* أزرار التحكم اللحظي */
        .controls { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 10px; padding: 5px 0; }
        .spin-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #ffdf00, #00ff66); border: none; border-radius: 6px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,255,102,0.3); }
        .info-bar { text-align: center; font-size: 15px; font-weight: bold; min-height: 22px; color: #ffdf00; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <!-- 1. شاشة الدخول المؤمنة بالبيانات الدقيقة -->
    <div id="loginScreen">
        <div class="login-card">
            <h1>CHEMS CASINO LOBBY</h1>
            <div class="input-group"><input type="text" id="username" placeholder="USERNAME"></div>
            <div class="input-group"><input type="password" id="password" placeholder="PASSWORD"></div>
            <button class="login-btn" onclick="checkAccess()">ACCESS LIVE FLOOR</button>
            <p id="errorMsg">INVALID CREDENTIALS.</p>
        </div>
    </div>

    <!-- 2. واجهة الكازينو الحقيقية -->
    <div id="casinoScreen">
        <div class="header-bar">
            <div class="logo-text">ROULETTE LIVE</div>
            <div class="balance-container">رصيد د.ج: <span id="walletDisplay">17,450</span></div>
        </div>

        <!-- البث السينمائي الحقيقي (امرأة تدور العجلة والكعبورة) -->
        <div class="video-container">
            <div class="live-badge">● LIVE</div>
            <video id="rouletteVideo" class="live-video" loop muted playsinline>
                <!-- رابط فيديو حقيقي بجودة عالية لعجلة روليت رسمية تدور مع الكروبر -->
                <source src="https://assets.mixkit.co/videos/preview/mixkit-spinning-roulette-wheel-in-a-casino-close-up-39958-large.mp4" type="video/mp4">
            </video>
        </div>

        <div class="board-container">
            <!-- جدول الرولات الرسمي الفخم مخصص للتيلفون بالعرض -->
            <div class="roulette-table" id="tableGrid">
                <!-- الـ 0 الأخضر -->
                <div class="cell green" onclick="betNumber(0)">0</div>
                <!-- تعمير الخلايا الحقيقية بذكاء الجافاسكريبت سطر بسطر -->
            </div>

            <!-- الفيشات الكازينو الإحترافية للرهان -->
            <div class="chips-container">
                <div class="chip chip-100 active" onclick="selectChip(100, this)">100</div>
                <div class="chip chip-500" onclick="selectChip(500, this)">500</div>
                <div class="chip chip-1000" onclick="selectChip(1000, this)">1K</div>
                <div class="chip chip-5000" onclick="selectChip(5000, this)">5K</div>
            </div>

            <div class="controls">
                <button class="spin-btn" onclick="startLiveSpin()">PLACE BET & SPIN 🎡</button>
                <div class="info-bar" id="logConsole">اختر فيشة واضغط على رقم للرهان</div>
            </div>
        </div>
    </div>

    <script>
        let balance = 17450; // الرصيد الرسمي الدقيق
        let activeChipValue = 100;
        let selectedNumber = null;
        let isSpinning = false;

        const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        // بناء جدول الرولات الحقيقي بـ 3 أسطر متوازية كيما التطبيق الرسمي
        const grid = document.getElementById("tableGrid");
        let rows = [[], [], []];
        
        for (let i = 1; i <= 36; i++) {
            let rowIdx = (3 - (i % 3)) % 3;
            rows[rowIdx].push(i);
        }

        // دمج الأسطر بالترتيب الصحيح لداخل لوحة الـ HTML
        for(let r=0; r<3; r++) {
            rows[r].forEach(num => {
                const isRed = redNumbers.includes(num);
                const colorClass = isRed ? 'red' : 'black';
                const cell = document.createElement('div');
                cell.className = `cell ${colorClass}`;
                cell.innerText = num;
                cell.onclick = () => betNumber(num, cell);
                grid.appendChild(cell);
            });
        }

        function checkAccess() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            if(u === "chems" && p === "84city") {
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("casinoScreen").style.display = "flex";
                document.getElementById("rouletteVideo").play(); // تشغيل البث المباشر الهادئ
                updateUI();
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        function updateUI() {
            document.getElementById("walletDisplay").innerText = balance.toLocaleString();
        }

        function selectChip(val, element) {
            if(isSpinning) return;
            activeChipValue = val;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
        }

        function betNumber(num, element) {
            if(isSpinning) return;
            selectedNumber = num;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            if(element) element.classList.add('selected');
            document.getElementById("logConsole").innerText = `رقم الرهان الحالي: ${num} | قيمة الفيشة: ${activeChipValue} د.ج`;
        }

        // تشغيل نظام الدوران السينمائي مع الفيديو الحقيقي
        function startLiveSpin() {
            if(isSpinning) return;
            if(selectedNumber === null) {
                document.getElementById("logConsole").innerText = "❌ لازم تخير رقم تحط فيه الفيشة أولاً!";
                return;
            }
            if(activeChipValue > balance) {
                document.getElementById("logConsole").innerText = "❌ الرصيد المتبقي لا يكفي لهذا الرهان!";
                return;
            }

            isSpinning = true;
            balance -= activeChipValue;
            updateUI();

            const video = document.getElementById("rouletteVideo");
            const log = document.getElementById("logConsole");
            
            // تسريع الفيديو لإعطاء تأثير إطلاق الكعبورة الحقيقي بقوة ممتعة للعين
            video.playbackRate = 2.5; 
            log.innerText = "🎡 الكروبر تطلق الكعبورة... ترقب النتيجة لايف!";

            setTimeout(() => {
                video.playbackRate = 1.0; // إرجاع سرعة البث العادية
                evaluateLiveResult();
            }, 4000); // 4 ثواني كاملة تع دوران حقيقي
        }

        function evaluateLiveResult() {
            const winningNum = Math.floor(Math.random() * 37); // سحب الرقم الفائز حقيقياً من 0 لـ 36
            const isRed = redNumbers.includes(winningNum);
            const colorText = winningNum === 0 ? "أخضر" : (isRed ? "أحمر" : "أسود");
            const log = document.getElementById("logConsole");

            if(selectedNumber === winningNum) {
                const winAmount = activeChipValue * 35; // قانون الرولات العالمي: الرقم المباشر يعطيك 35 ضعف!
                balance += winAmount;
                log.style.color = "#00ff66";
                log.innerText = `🎉 ضربت الرقم الصحيح! خرج ${winningNum} (${colorText}). ربحت ${winAmount.toLocaleString()} د.ج!`;
            } else {
                log.style.color = "#ff3333";
                log.innerText = `❌ خرج رقم ${winningNum} (${colorText}). خسرت الرهان الحالي.`;
            }

            balance = Math.max(0, balance); // حماية الرصيد
            updateUI();
            
            // إعادة ضبط الخانات بعد ثانية ونصف للاستعداد للجولة القادمة
            setTimeout(() => {
                if(balance <= 0) balance = 17450; // ريفريش تلقائي للرصيد إذا تصفّرت الطابلة
                log.style.color = "#ffdf00";
                log.innerText = "اختر فيشة واضغط على رقم لبدء جولة مراهنة جديدة...";
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
                selectedNumber = null;
                isSpinning = false;
                updateUI();
            }, 2500);
        }
    </script>
</body>
</html>
