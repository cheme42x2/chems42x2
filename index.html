<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Royal Sanctuary - RIRI</title>
    <style>
        /* جلب خط إيموجيات الآيفون والخطوط الاحترافية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Noto+Color+Emoji&display=swap');

        /* تصفير الإعدادات وقفل الشاشة مسمار */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #02040a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif, 'Apple Color Emoji', 'Noto Color Emoji';
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            perspective: 2000px;
        }

        /* الطبقة الضبابية الكونية المتحركة في الخلفية */
        .cosmic-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0, 191, 255, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #030712 0%, #010206 100%);
            z-index: 0;
            animation: cosmicShift 25s infinite ease-in-out;
        }

        @keyframes cosmicShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.08); }
        }

        /* حاوية الإيموجيات المتساقطة بستايل iOS الفخم */
        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ios-particle {
            position: absolute;
            font-size: 1.8rem;
            will-change: transform, top;
            filter: drop-shadow(0 0 12px rgba(0, 191, 255, 0.6));
            font-family: 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
            opacity: 0;
        }

        /* بطاقة الزجاج الفاخرة النيونية */
        .royal-card {
            background: linear-gradient(135deg, rgba(6, 11, 28, 0.82) 0%, rgba(2, 4, 12, 0.95) 100%);
            border: 1px solid rgba(0, 191, 255, 0.4);
            border-top: 1px solid rgba(0, 191, 255, 0.8);
            border-bottom: 1px solid rgba(138, 43, 226, 0.6);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8),
                0 0 50px rgba(0, 191, 255, 0.15),
                inset 0 0 30px rgba(0, 191, 255, 0.05);
            border-radius: 30px;
            padding: 45px 30px;
            text-align: center;
            max-width: 400px;
            width: 88%;
            z-index: 2;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transform: translateZ(0);
            animation: cardGlow Breathing 4s infinite ease-in-out;
        }

        @keyframes cardGlowBreathing {
            0%, 100% { border-color: rgba(0, 191, 255, 0.4); box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 191, 255, 0.15); }
            50% { border-color: rgba(138, 43, 226, 0.6); box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 60px rgba(138, 43, 226, 0.25); }
        }

        /* دائرة الصورة الأسطورية مع حماية الفشل الذكي */
        .avatar-frame {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, #00bfff, #8a2be2);
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.5);
            animation: avatarFloat 4s infinite ease-in-out;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #060b1c;
            position: relative;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background-image: url('1000002315.jpg'); /* نداء الصورة المحلية من الجيت هاب ديريكت */
            background-size: cover;
            background-position: center;
        }

        /* محرك الحماية الاحتياطي في حال غياب الصورة: تظهر فراشة فيكتورية مضيئة ديريكت */
        .avatar-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #040814;
            z-index: -1;
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        /* النصوص والعناوين الفخمة */
        h1 {
            font-size: 2.1rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(to left, #ffffff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        }

        .riri-badge {
            color: #00bfff;
            position: relative;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.6);
        }

        .lead-text {
            color: #b4c6ef;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 35px;
            min-height: 60px; /* الحفاظ على الهيكل أثناء أنيميشن الكتابة */
        }

        /* زر النيون السائل الملكي */
        .royal-btn {
            background: linear-gradient(135deg, #00bfff 0%, #4b0082 100%);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 191, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .royal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .royal-btn:hover::before {
            left: 100%;
        }

        .royal-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
        }

        /* واجهة السر السعيدة المخفية */
        #secretZone {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .secret-title {
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(to left, #00bfff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .secret-box {
            font-size: 1.25rem;
            color: #f0f4ff;
            line-height: 1.9;
            background: rgba(0, 191, 255, 0.05);
            border: 1px solid rgba(0, 191, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0, 191, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="cosmic-bg"></div>

    <div class="rain-container" id="rainBox"></div>

    <div class="royal-card" id="mainCard">
        <div id="initZone">
            <div class="avatar-frame">
                <div class="avatar-inner">
                    <img src="1000002315.jpg" alt="Riri" class="avatar-img" onerror="this.style.opacity='0';">
                    <div class="avatar-fallback">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#00bfff" stroke-width="1.5">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="rgba(0,191,255,0.2)"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <h1>سموّ الأميرة <span class="riri-badge">ريري 🦋</span></h1>
            <div class="lead-text" id="typewriterText"></div>
            <button class="royal-btn" onclick="triggerCosmicSecret()">دخول الملاذ السري 💎</button>
        </div>

        <div id="secretZone">
            <div class="avatar-frame" style="width:110px; height:110px;">
                <div class="avatar-inner">
                    <img src="1000002315.jpg" alt="Riri" class="avatar-img" onerror="this.style.opacity='0';">
                    <div class="avatar-fallback">
                        <span style="font-size:2rem;">🐈</span>
                    </div>
                </div>
            </div>
            <div class="secret-title">أجمل تونسية 🇹🇳💙</div>
            <div class="secret-box">
                الكون يبتسم عندما تبتسمين.. 💎<br>
                أهلاً بكِ في عالم Chems الفخم والمظلم، نورتِ المكان بوجودكِ النادر والراقي يا ريري! ✨🐈👑💙
            </div>
        </div>
    </div>

    <script>
        // إيموجيات آيفون المفضلة والمدمجة بفخامة
        const emojis = ['🐈', '🦋', '💎', '💙', '✨', '💎', '💙'];
        const rainBox = document.getElementById('rainBox');

        // محرك سقوط الإيموجيات المتطور
        function createParticle(isBurst = false) {
            const p = document.createElement('div');
            p.classList.add('ios-particle');
            p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            if (!isBurst) {
                p.style.left = Math.random() * 95 + '%';
                p.style.top = '-50px';
                const duration = Math.random() * 4 + 4;
                p.style.animation = `iosFall ${duration}s linear infinite`;
                p.style.animationDelay = Math.random() * 6 + 's';
            } else {
                // إعدادات الانفجار الكوني عند النقر
                p.style.left = '50%';
                p.style.top = '40%';
                p.style.transform = 'translate(-50%, -50%)';
                p.style.animation = `iosBurstAnimation 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
            }
            
            rainBox.appendChild(p);
            if(isBurst) setTimeout(() => p.remove(), 2000);
        }

        // توليد المطر المستمر
        for (let i = 0; i < 40; i++) { createParticle(); }

        // إضافة الأنيميشن برمجياً للحفاظ على الأداء ونقاء الكود
        const styleSheet = document.styleSheets[0];
        styleSheet.insertRule(`
            @keyframes iosFall {
                0% { top: -50px; transform: translateX(0) rotate(0deg); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { top: 105vh; transform: translateX(30px) rotate(360deg); opacity: 0; }
            }
        `, styleSheet.cssRules.length);

        styleSheet.insertRule(`
            @keyframes iosBurstAnimation {
                0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
                15% { opacity: 1; }
                100% { transform: translate(calc(-50% + ${Math.random() * 400 - 200}px), calc(-50% + ${Math.random() * 400 - 200}px)) scale(1.5) rotate(${Math.random() * 720}deg); opacity: 0; }
            }
        `, styleSheet.cssRules.length);

        // تأثير كتابة الآلة السحرية (Typing Animation) الهدرة الفخمة
        const textToType = "الأجواء غامضة و VIP.. هناك سر كوني مخبأ هنا من أجلكِ فقط في زوايا هذا الملاذ.. هل أنتِ مستعدة لاكتشافه؟ ✨";
        let textIndex = 0;
        function typeWriter() {
            if (textIndex < textToType.length) {
                document.getElementById("typewriterText").innerHTML += textToType.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 45);
            }
        }
        window.onload = typeWriter;

        // هندسة الانفجار الكوني والتحول الكامل الواجهة عند النقرة
        function triggerCosmicSecret() {
            // توليد انفجار كثيف للألماس والقلوب
            for(let i=0; i<35; i++) { createParticle(true); }

            // اختفاء وظهور كلاس عالي النقاء
            const initZone = document.getElementById('initZone');
            const secretZone = document.getElementById('secretZone');
            
            initZone.style.transition = 'all 0.5s ease';
            initZone.style.opacity = '0';
            
            setTimeout(() => {
                initZone.style.display = 'none';
                secretZone.style.display = 'block';
                setTimeout(() => {
                    secretZone.style.opacity = '1';
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
