<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Apple of Fortune Clone</title>
    <style>
        body { background-color: #0b1a0b; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* الهيدر */
        .header { background: #1c3d1c; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; border: 1px solid #3c6e3c; }
        
        /* الشبكة */
        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .cell { width: 50px; height: 50px; background: #3d2b1f; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #5e4533; }
        .cell.revealed { background: #2a1f18; }
        
        /* التحكم */
        .controls { background: #1a2a1a; padding: 15px; border-radius: 10px; width: 300px; text-align: center; }
        .bet-button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">الرصيد: 3000 دج</div>

    <div class="game-board" id="board"></div>

    <div class="controls">
        <input type="number" value="50" style="width: 80%; padding: 5px;" placeholder="أدخل مبلغ الرهان">
        <button class="bet-button" onclick="startGame()">ابدأ الرهان</button>
    </div>

    <script>
        // إعدادات المخاطرة: كل رقم يمثل عدد التفاحات المعضوضة في السطر
        const trapConfig = [1, 1, 2, 2, 3, 3, 4]; 
        const boardElement = document.getElementById('board');

        function startGame() {
            boardElement.innerHTML = '';
            for (let row = 0; row < trapConfig.length; row++) {
                let traps = trapConfig[row];
                let rowArray = Array(5).fill('safe'); // 5 خانات
                
                // توزيع التفاحات المعضوضة عشوائياً
                for(let i=0; i<traps; i++) { rowArray[i] = 'trap'; }
                rowArray.sort(() => Math.random() - 0.5);

                rowArray.forEach(type => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => reveal(cell, type);
                    boardElement.appendChild(cell);
                });
            }
        }

        function reveal(cell, type) {
            cell.classList.add('revealed');
            cell.innerHTML = (type === 'trap') ? '🍏' : '🍎';
            if(type === 'trap') alert('خسرت! حظاً أوفر.');
        }

        startGame();
    </script>
</body>
</html>
